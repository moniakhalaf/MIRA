  onbCustomDel(i){ onb.custom.splice(i, 1); render(); },
  onbDone,

  toggleDS(){ R.deepSolve = !R.deepSolve; render(); const ta = $("#chatIn"); if (ta) ta.focus(); },
  toggleWeb(){
    S.settings.webSearch = !S.settings.webSearch;
    save(); render();
    toast(S.settings.webSearch ? "Live web search on — MIRA verifies against the internet." : "Live web search off — MIRA answers from verified knowledge.");
  },
  actEmail(p){
    const f = JSON.parse(decodeURIComponent(p));
    location.href = "mailto:" + encodeURIComponent(f.to || "").replace(/%40/g, "@").replace(/%2C/g, ",") +
      "?subject=" + encodeURIComponent(f.subject || "") + "&body=" + encodeURIComponent(f.body || "");
  },
  async actCopy(p){
    const f = JSON.parse(decodeURIComponent(p));
    const text = f.to !== undefined
      ? `To: ${f.to}\nSubject: ${f.subject}\n\n${f.body}`
      : `${f.title}\n${f.start}${f.end ? " → " + f.end : ""}${f.location ? "\n" + f.location : ""}\n\n${f.body}`.trim();
    try { await navigator.clipboard.writeText(text); toast("Copied."); }
    catch (e) { toast("Could not copy on this browser."); }
  },
  actIcs(p){
    const f = JSON.parse(decodeURIComponent(p));
    const parse = s => { const d = new Date(String(s || "").replace(" ", "T")); return isNaN(d) ? null : d; };
    const start = parse(f.start) || new Date();
    const end = parse(f.end) || new Date(start.getTime() + 3600000);
    const fm = d => d.getFullYear() + String(d.getMonth() + 1).padStart(2, "0") + String(d.getDate()).padStart(2, "0") +
      "T" + String(d.getHours()).padStart(2, "0") + String(d.getMinutes()).padStart(2, "0") + "00";
    const ei = s => String(s || "").replace(/\\/g, "\\\\").replace(/;/g, "\\;").replace(/,/g, "\\,").replace(/\n/g, "\\n");
    const ics = ["BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//MIRA//EN", "BEGIN:VEVENT",
      "UID:" + uid() + "@mira", "DTSTAMP:" + fm(new Date()), "DTSTART:" + fm(start), "DTEND:" + fm(end),
      "SUMMARY:" + ei(f.title), f.location ? "LOCATION:" + ei(f.location) : "", f.body ? "DESCRIPTION:" + ei(f.body) : "",
      "END:VEVENT", "END:VCALENDAR"].filter(Boolean).join("\r\n");
    const blob = new Blob([ics], {type: "text/calendar"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = (f.title || "event").replace(/[^\w؀-ۿ -]/g, "").slice(0, 40) + ".ics";
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 4000);
    toast("Calendar file ready — open it to add the event.");
  },
  send: sendChat,
  suggest(btn){ render(); const ta = $("#chatIn"); if (ta){ ta.value = btn.textContent; ta.focus(); } },
  attach(){ pickFile(f => { R.attach = f; render(); toast(`Attached: ${f.name}`); }); },
  attachClear(){ R.attach = null; render(); },

  water(i){
    const t = todayStr();
    const cur = S.water[t] || 0;
    S.water[t] = (i + 1 === cur) ? i : i + 1;
    buzz();
    save(); render();
  },
  regen: regenLast,
  editLast(cid){
    if (R.busy) return;
    const conv = S.convs.find(c => c.id === cid);
    if (!conv) return;
    const m = conv.msgs;
    if (m[m.length - 1]?.role === "assistant") m.pop();
    const u = m[m.length - 1];
    if (!u || u.role !== "user"){ render(); return; }
    m.pop();
    save(); render();
    const ta = $("#chatIn");
    if (ta){
      ta.value = u.content;
      ta.style.height = "auto"; ta.style.height = Math.min(ta.scrollHeight, 120) + "px";
      ta.focus();
    }
  },
  dailyBrief(domId){
    if (R.busy) return;
    if (!S.settings.apiKey){ toast("Add your API key in Settings first."); R.tab = "set"; R.homeCat = null; render(); return; }
    if (domId) R.mode = domId;
    R.tab = "chat"; R.homeCat = null; R.convId = null; render();
    const ta = $("#chatIn");
    if (ta) ta.value = "Give me my daily brief.";
    sendChat();
  },
  async shareConv(id){
    const c = S.convs.find(x => x.id === id);
    if (!c) return;
    const dom = S.domains.find(d => d.id === c.dom);
    const text = `MIRA — ${dom ? dom.name : ""} — ${new Date(c.ts).toLocaleDateString("en-GB")}\n\n` +
      c.msgs.map(m => (m.role === "user" ? "You: " : "MIRA: ") + m.content).join("\n\n");
    if (navigator.share){
      try { await navigator.share({title: c.title || "MIRA chat", text}); } catch (e) {}
    } else {
      const blob = new Blob([text], {type: "text/plain"});
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = (c.title || "mira-chat").replace(/[^\w؀-ۿ -]/g, "").slice(0, 40) + ".txt";
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 4000);
      toast("Chat exported as a text file.");
    }
  },
  copyYesterday(){
    const t = todayStr();
    const prevDays = [...new Set(S.foods.map(f => f.date))].filter(d => d < t).sort();
    const src = prevDays[prevDays.length - 1];
    if (!src){ toast("No previous day to copy."); return; }
    const items = S.foods.filter(f => f.date === src);
    items.forEach(f => S.foods.push({...f, id: uid(), date: t, ts: Date.now()}));
    R.openDays.add(t);
    buzz(); save(); render();
    toast(`Copied ${items.length} items from ${fmtDate(src)} ✓`);
  },
  mealSaveToday(){
    const items = dayFoods(todayStr());
    if (!items.length){ toast("Nothing logged today yet."); return; }
    const name = prompt('Name this meal (e.g. "My usual breakfast"):');
    if (!name || !name.trim()) return;
    S.meals.unshift({id: uid(), name: name.trim(),
      items: items.map(f => ({name: f.name, amount: f.amount, kcal: f.kcal, p: f.p, c: f.c, f: f.f}))});
    save(); render();
    toast(`Meal saved: ${name.trim()} ✓`);
  },
  mealLog(i){
    const ml = S.meals[i];
    if (!ml) return;
    ml.items.forEach(it => S.foods.push({id: uid(), date: todayStr(), name: it.name, amount: it.amount,
      kcal: num(it.kcal), p: num(it.p), c: num(it.c), f: num(it.f), conf: "user", ts: Date.now()}));
    R.openDays.add(todayStr());
    buzz(); save(); render();
    toast(`Logged: ${ml.name} (${ml.items.length} items) ✓`);
  },
  mealDel(i){
    if (confirm(`Delete the meal "${S.meals[i].name}"?`)){ S.meals.splice(i, 1); save(); render(); }
  },
  mealsToggle(){ R.mealsOpen = !R.mealsOpen; render(); },
  barcode: scanBarcode,
  quickWeight(){
    const v = num(($("#qw") || {}).value);
    if (v < 20 || v > 400){ toast("Enter a weight in kg."); return; }
    S.inbody.push({id: uid(), date: todayStr(), weight: v, score: null, bfm: null, smm: null, vfa: null, pa: null});
    buzz(); save(); render();
    toast(`Weight logged: ${n1(v)} kg ✓`);
  },
  async copyMsg(cid, i){
    const conv = S.convs.find(c => c.id === cid);
    const m = conv && conv.msgs[i];
    if (!m) return;
    try { await navigator.clipboard.writeText(m.content); buzz(); toast("Reply copied."); }
    catch (e) { toast("Could not copy on this browser."); }
  },
  dayToggle(d){ R.openDays.has(d) ? R.openDays.delete(d) : R.openDays.add(d); render(); },
  ffName(v){ foodForm.name = v; acRender(v); },
  acHide(){ const el = $("#acList"); if (el) el.innerHTML = ""; },
  acPick(i){
    const f = S.savedFoods[i];
    if (!f) return;
    Object.assign(foodForm, {name: f.name, amount: f.amount, kcal: f.kcal, p: f.p, c: f.c, f: f.f, conf: "user"});
    render();
    toast("Filled from saved foods ✓");
  },
  scToggle(){ foodForm.scOpen = !foodForm.scOpen; render(); },
  scApply(){
    const base = num(foodForm.scBase), eat = num(foodForm.scEat);
    if (base <= 0 || eat <= 0){ toast("Enter the base amount and the amount eaten."); return; }
    const r = eat / base;
    foodForm.kcal = Math.round(num(foodForm.scK) * r);
    foodForm.p = Math.round(num(foodForm.scP) * r * 10) / 10;
    foodForm.c = Math.round(num(foodForm.scC) * r * 10) / 10;
    foodForm.f = Math.round(num(foodForm.scF) * r * 10) / 10;
    if (!foodForm.amount) foodForm.amount = `${eat} ${foodForm.scBaseUnit || "g"}`;
    foodForm.scOpen = false;
    render();
    toast(`Scaled to ${eat}/${base} ✓`);
  },
  foodSave: foodSaveDirect,
  foodDel(id){ S.foods = S.foods.filter(f => f.id !== id); save(); render(); },
  findMacros,
  extractPhoto,
  reviewAccept(i){
    const it = reviewItems[i];
    const s = sanity(it);
    if (s.errors.length){ toast(s.errors[0], 4200); render(); return; }
    logFood(it);
    reviewItems.splice(i, 1);
    if (!reviewItems.length) reviewItems = null;
    render();
  },
  reviewDrop(i){ reviewItems.splice(i, 1); if (!reviewItems.length) reviewItems = null; render(); },

  ibSave(){
    if (ibSaveEntry({...ibForm, date: ibForm.date || todayStr()})){
      Object.keys(ibForm).forEach(k => ibForm[k] = "");
      render();
    }
  },
  ibDel(id){ if (confirm("Delete this scan?")){ S.inbody = S.inbody.filter(e => e.id !== id); save(); render(); } },
  ibPhoto,
  ibReviewAccept(){ if (ibSaveEntry(ibReview)){ ibReview = null; render(); } },
  ibAnalyse(){
    if (!S.inbody.length){ toast("Add at least one scan first."); return; }
    const fit = S.domains.find(d => d.id === "fitness") || S.domains[0];
    R.mode = fit.id; R.tab = "chat"; R.homeCat = null;
    render();
    const ta = $("#chatIn");
    if (ta){ ta.value = "Analyse my body-composition trend from my InBody log: what is going well, what needs attention, and what should I change?"; ta.focus(); }
  },

  set(k, v){ S.settings[k] = v; save(); render(); },
  theme(v){ S.settings.theme = v; save(); applyTheme(); render(); },
  signup(){
    const email = ($("#suEmail") ? $("#suEmail").value : "").trim().toLowerCase();
    const name = ($("#suName") ? $("#suName").value : "").trim();
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email)){ toast("Enter a valid email address."); return; }
    S.settings.account = {email, name, created: Date.now()};
    if (name && !S.settings.name) S.settings.name = name;
    if (name) onb.name = name;
    save(); render();
    toast("Account created on this device ✓");
  },
  signupSkip(){ S.settings.account = {guest: true, created: Date.now()}; save(); render(); },
  domAdd(){
    const inp = $("#newDom");
    const name = (inp ? inp.value : "").trim();
    if (!name){ toast("Type a domain name."); return; }
    const d = {id: uid(), name, color: DOMAIN_COLORS[S.domains.length % DOMAIN_COLORS.length],
      desc: `Senior specialist work in "${name}": embody the field's professional fully — its frameworks, terminology, trusted sources and deliverables. Apply MIRA's full source-verification standard: verified facts with citations, honest estimates labelled as such.`};
    S.domains.push(d);
    save(); render();
    toast(`Domain added: ${name} ✓`);
    genPersona(d);
  },
  domDel(i){
    const d = S.domains[i];
    if (!confirm(`Remove the ${d.name} domain? Its chat history is deleted too.`)) return;
    S.convs = S.convs.filter(c => c.dom !== d.id);
    S.domains.splice(i, 1);
    if (R.mode === d.id){ R.mode = S.domains[0].id; R.convId = null; }
    save(); render();
  },
  savedDel(i){ S.savedFoods.splice(i, 1); save(); render(); },

  async pinSet(){
    const p1 = prompt("New 4-digit PIN:");
    if (!p1) return;
    if (!/^\d{4}$/.test(p1)){ toast("PIN must be exactly 4 digits."); return; }
    const p2 = prompt("Repeat the PIN:");
    if (p1 !== p2){ toast("PINs did not match."); return; }
    S.settings.pinHash = await sha256("mira:" + p1);
    R.unlocked = true;
    save(); render();
    toast("PIN set ✓");
  },
  pinOff(){ if (confirm("Remove the PIN lock?")){ S.settings.pinHash = null; save(); render(); } },
  pinForgot(){
    if (!confirm("The PIN cannot be recovered. The only way back in is to erase ALL MIRA data on this device and start fresh. Erase everything?")) return;
    if (!confirm("Really erase all data? This cannot be undone.")) return;
    localStorage.removeItem("mira.data");
    S = BLANK(); window.S = S;
    R.unlocked = true; R.tab = "chat"; R.mode = "work"; R.convId = null; R.sheet = null; R.pending = "";
    applyTheme(); render();
    toast("MIRA was reset.");
  },

  backup, restore,
  wipe(){
    if (!confirm("Erase ALL MIRA data on this device? Export a backup first if you want to keep anything.")) return;
    if (!confirm("Really erase everything? This cannot be undone.")) return;
    localStorage.removeItem("mira.data");
    S = BLANK();
    window.S = S;
    R.unlocked = true; R.tab = "chat"; R.mode = "work"; R.convId = null; R.sheet = null;
    applyTheme();
    render();
    toast("Everything erased.");
  },
};

/* ---------------- boot ---------------- */
applyTheme();
bindViewport();
/* start on a fresh chat each launch — previous conversations stay in the log */
R.convId = null;
render();
</script>
</body>
</html>
