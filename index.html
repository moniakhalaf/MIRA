/* ---------------- Insights tab (trends over time) ---------------- */
function last14Dates(){ const o = []; for (let k = 13; k >= 0; k--) o.push(new Date(Date.now() - k * 864e5).toLocaleDateString("en-CA")); return o; }
// Insights window: N most-recent calendar days (oldest first). insRange 0 = all
// time, anchored to the earliest logged date across food/sleep/check-ins.
function insDates(n){
  if (!n){
    const all = [...(S.foods || []).map(f => f.date), ...(S.sleep || []).map(s => s.date), ...(S.checkins || []).map(c => c.date), ...(S.inbody || []).map(e => e.date)].filter(Boolean).sort();
    if (all.length){ const first = new Date(all[0]); n = Math.min(365, Math.max(14, Math.round((Date.now() - first.getTime()) / 864e5) + 1)); }
    else n = 14;
  }
  const o = []; for (let k = n - 1; k >= 0; k--) o.push(new Date(Date.now() - k * 864e5).toLocaleDateString("en-CA")); return o;
}
// Bars for a per-day series; honest empty state handled by caller.
function barsSVG(vals, opt){
  opt = opt || {};
  const W = 300, H = 96, pad = 4, n = vals.length, gap = n > 20 ? 2 : 3;
  const bw = (W - gap * (n - 1)) / n;
  const target = opt.target || 0;
  const max = Math.max(target, ...vals, 1) * 1.08;
  let bars = "";
  vals.forEach((v, i) => {
    const bh = v > 0 ? Math.max(2, (v / max) * (H - pad)) : 0;
    const x = i * (bw + gap), y = H - bh;
    bars += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="1.6" fill="${opt.color || "var(--acc)"}" opacity="${v > 0 ? 0.9 : 0}"/>`;
  });
  let tl = "";
  if (target){ const ty = H - (target / max) * (H - pad); tl = `<line x1="0" y1="${ty.toFixed(1)}" x2="${W}" y2="${ty.toFixed(1)}" stroke="var(--txt2)" stroke-width="1" stroke-dasharray="3 3" opacity="0.6"/>`; }
  return `<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" role="img">${tl}${bars}</svg>`;
}
// Line for a sparse (date,val) series.
function lineSVG(pts, opt){
  opt = opt || {};
  const W = 300, H = 96, pad = 6, n = pts.length;
  const vals = pts.map(p => p.v);
  const min = Math.min(...vals), max = Math.max(...vals), span = (max - min) || 1;
  const X = i => n === 1 ? W / 2 : (i / (n - 1)) * W;
  const Y = v => H - pad - ((v - min) / span) * (H - pad * 2);
  let dpath = "", dots = "";
  pts.forEach((p, i) => { const x = X(i), y = Y(p.v); dpath += (i ? "L" : "M") + x.toFixed(1) + " " + y.toFixed(1) + " "; dots += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="2.4" fill="${opt.color || "var(--acc)"}"/>`; });
  return `<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" role="img"><path d="${dpath}" fill="none" stroke="${opt.color || "var(--acc)"}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>${dots}</svg>`;
}
function trendCard(title, sub, body){
  return `<div class="card trend-card"><div class="tc-h"><span class="tc-t">${title}</span>${sub ? `<span class="tc-s">${sub}</span>` : ""}</div>${body}</div>`;
}
function trendEmpty(msg){ return `<div class="tc-empty">${msg}</div>`; }
// Scale row under a bar chart: peak / average (logged points only) so the
// unlabeled bars read against real numbers. Charts stretch (preserveAspectRatio
// none), so labels live in HTML rather than distorted SVG text.
function barsMeta(vals, unit){
  const nz = vals.filter(v => v > 0);
  if (nz.length < 2) return "";
  const peak = Math.max(...nz), avg = nz.reduce((a, b) => a + b, 0) / nz.length;
  return `<div class="tc-meta"><span>peak <b>${n0(peak)}${unit}</b></span><span>avg <b>${n0(avg)}${unit}</b></span><span>${nz.length} logged</span></div>`;
}
function lineMeta(pts, unit){
  if (pts.length < 2) return "";
  const vals = pts.map(p => p.v), lo = Math.min(...vals), hi = Math.max(...vals);
  return `<div class="tc-meta"><span>low <b>${n1(lo)}${unit}</b></span><span>high <b>${n1(hi)}${unit}</b></span><span>${pts.length} points</span></div>`;
}
const INS_RANGES = [[7, "7d"], [14, "14d"], [30, "30d"], [90, "90d"], [0, "All"]];
function insRangeBarHTML(){
  const cur = R.insRange == null ? 14 : R.insRange;
  return `<div class="seg ins-range">${INS_RANGES.map(([v, l]) =>
    `<button class="${cur === v ? "on" : ""}" onclick="M.insRange(${v})">${l}</button>`).join("")}</div>`;
}
function trendsHTML(){
  if (R.reviewOpen) return weeklyReviewHTML();
  const range = R.insRange == null ? 14 : R.insRange;
  const days = insDates(range);
  const dn = days.length;
  const lab = range === 0 ? "all time" : dn + " days";
  const tg = S.settings.targets || {};
  const cards = [];

  // Weight (line, from InBody), windowed to the range
  const from = days[0];
  const wl = [...(S.inbody || [])].filter(e => e.weight && (range === 0 || e.date >= from)).sort((a, b) => a.date < b.date ? -1 : 1).slice(-40).map(e => ({d: e.date, v: +e.weight}));
  cards.push(trendCard(tr("Weight"), wl.length ? `${wl[0].v} → ${wl[wl.length - 1].v} kg` : "kg",
    wl.length >= 2 ? lineSVG(wl, {color: "#e8863d"}) + lineMeta(wl, " kg") : trendEmpty("Log at least 2 weight entries to see your trend.")));

  // Calories/day
  const kcals = days.map(d => Math.round(dayTotals(d).kcal));
  const kcalDays = kcals.filter(v => v > 0).length;
  cards.push(trendCard(tr("Calories") + " · " + lab, tg.kcal ? `target ${n0(tg.kcal)}` : "per day",
    kcalDays >= 2 ? barsSVG(kcals, {color: "#3bb273", target: tg.kcal}) + barsMeta(kcals, "") : trendEmpty("Log food on at least 2 days to see your calorie trend.")));

  // Protein/day
  const prot = days.map(d => Math.round(dayTotals(d).p));
  const protDays = prot.filter(v => v > 0).length;
  cards.push(trendCard(tr("Protein") + " · " + lab, tg.protein ? `target ${n0(tg.protein)} g` : "g per day",
    protDays >= 2 ? barsSVG(prot, {color: "#4c7fe0", target: tg.protein}) + barsMeta(prot, " g") : trendEmpty("Log food on at least 2 days to see your protein trend.")));

  // Sleep hours
  const sleepMap = {}; (S.sleep || []).forEach(e => { sleepMap[e.date] = +e.hours || 0; });
  const sleeps = days.map(d => sleepMap[d] || 0);
  const sleepDays = sleeps.filter(v => v > 0).length;
  cards.push(trendCard(tr("Sleep") + " · " + lab, "hours per night",
    sleepDays >= 2 ? barsSVG(sleeps, {color: "#b57edc"}) + barsMeta(sleeps, " h") : trendEmpty("Log at least 2 nights of sleep to see your trend.")));

  // Wellness score (line, from check-ins)
  const ciPts = days.map(d => { const c = (S.checkins || []).find(x => x.date === d); return c ? {d, v: checkinScore(c)} : null; }).filter(p => p && p.v != null);
  cards.push(trendCard(tr("Wellness") + " · " + lab, "daily score /100",
    ciPts.length >= 2 ? lineSVG(ciPts, {color: "#3bb273"}) + lineMeta(ciPts, "") : trendEmpty("Do at least 2 wellness check-ins to see your mood trend.")));

  // Training sets per week — scale week count to the range
  const nWeeks = Math.min(26, Math.max(6, Math.ceil((range || dn) / 7)));
  const weeks = []; for (let w = nWeeks - 1; w >= 0; w--){ const start = new Date(Date.now() - (w * 7 + 6) * 864e5).toLocaleDateString("en-CA"); const end = new Date(Date.now() - (w * 7) * 864e5).toLocaleDateString("en-CA"); weeks.push({start, end}); }
  const setSeries = weeks.map(wk => { let s = 0; (S.workouts || []).filter(x => x.date >= wk.start && x.date <= wk.end).forEach(x => (x.items || []).forEach(it => s += (it.sets || []).length)); return s; });
  const setWeeks = setSeries.filter(v => v > 0).length;
  cards.push(trendCard(`${tr("Training volume")} · ${nWeeks} ${tr("weeks")}`, "sets per week",
    setWeeks >= 2 ? barsSVG(setSeries, {color: "#e8863d"}) + barsMeta(setSeries, " sets") : trendEmpty("Log workouts across at least 2 weeks to see your volume trend.")));

  return `
    ${weekReviewCardHTML()}
    ${weightProjectionHTML()}
    ${patternsCardHTML()}
    <div class="ins-range-row"><span class="tiny" style="color:var(--txt2)">${tr("Time range")}</span>${insRangeBarHTML()}</div>
    <div class="wr-note">${ic("check", 13)} Trends are drawn only from what you logged. A chart appears once there are at least two data points; until then it says so.</div>
    ${cards.join("")}
    <div class="tiny" style="text-align:center;margin:4px 0 2px;color:var(--txt2)">More data, sharper trends. Keep logging and these fill in automatically.</div>`;
}
// Honest weight-goal projection: measures the real rate from the user's own
// weight log (least-squares slope) and extrapolates to their goal weight.
// Never a promise — always labelled an estimate; refuses when the trend is
// flat, moving away, or the data is too thin/short to be meaningful.
function weightProjectionHTML(){
  const goal = +(S.settings.goalWeight || 0);
  const pts = [...(S.inbody || [])].filter(e => e.weight).map(e => ({t: new Date(e.date).getTime() / 864e5, v: +e.weight})).sort((a, b) => a.t - b.t);
  if (!goal || pts.length < 2) return "";
  const w0 = pts[pts.length - 1].v;
  // least-squares slope (kg per day) over logged points
  const nP = pts.length, mt = pts.reduce((a, p) => a + p.t, 0) / nP, mv = pts.reduce((a, p) => a + p.v, 0) / nP;
  let num = 0, den = 0; pts.forEach(p => { num += (p.t - mt) * (p.v - mv); den += (p.t - mt) * (p.t - mt); });
  const spanDays = pts[nP - 1].t - pts[0].t;
  const slope = den ? num / den : 0;           // kg/day
  const perWk = slope * 7;
  if (Math.abs(w0 - goal) < 0.3) return projCard(`You're essentially at your goal of ${goal} kg. Nice.`, goal, w0, perWk);
  if (spanDays < 7 || Math.abs(perWk) < 0.05) return projCard(`Your weight is holding steady, so there's no reliable ETA yet. Keep logging — a trend needs a couple of weeks of movement.`, goal, w0, perWk);
  const towardGoal = (goal < w0 && slope < 0) || (goal > w0 && slope > 0);
  if (!towardGoal) return projCard(`Your recent trend is moving away from ${goal} kg, so no ETA — worth a look at intake vs output.`, goal, w0, perWk);
  const weeks = Math.abs((goal - w0) / perWk);
  const eta = new Date(Date.now() + weeks * 7 * 864e5);
  const etaStr = eta.toLocaleDateString("en-GB", {day: "numeric", month: "long", year: "numeric"});
  const wkTxt = weeks < 1.5 ? "about a week" : `~${Math.round(weeks)} weeks`;
  return projCard(`At your recent rate of ${perWk > 0 ? "+" : ""}${perWk.toFixed(2)} kg/week, reaching ${goal} kg would take ${wkTxt} — around ${etaStr}.`, goal, w0, perWk, weeks);
}
function projCard(msg, goal, w0, perWk, weeks){
  const gap = goal - w0;
  return `<div class="card">
    <h3>${ic("trend", 16)} ${tr("Weight projection")} <span class="badge" style="margin-inline-start:auto">${tr("estimate")}</span></h3>
    <div class="rev-grid" style="margin-bottom:10px">
      <div class="rev-stat"><div class="rv">${w0} kg</div><div class="rl">${tr("Now")}</div></div>
      <div class="rev-stat"><div class="rv">${goal} kg</div><div class="rl">${tr("Goal")}</div></div>
      <div class="rev-stat"><div class="rv">${gap > 0 ? "+" : ""}${gap.toFixed(1)}</div><div class="rl">${tr("To go (kg)")}</div></div>
      ${weeks ? `<div class="rev-stat"><div class="rv">${weeks < 1.5 ? "~1" : "~" + Math.round(weeks)}</div><div class="rl">${tr("Weeks")}</div></div>` : ""}
    </div>
    <div class="wr-note">${ic("check", 13)} ${esc(msg)}</div>
    <div class="tiny" style="margin-top:9px;color:var(--txt2)">Projected from your own logged weight trend, not a guarantee — real progress varies with training, sleep, water and adherence. Set your goal weight in Settings → Daily targets.</div>
  </div>`;
}
// Honest cross-signal observations + streaks — associations from the user's own
// logs, each gated behind enough data so nothing is invented.
function logStreak(getHas){
  let streak = 0;
  for (let i = 0; i < 400; i++){
    const d = new Date(Date.now() - i * 864e5).toLocaleDateString("en-CA");
    if (getHas(d)) streak++;
    else if (i === 0) continue;   // "not done yet today" doesn't break a streak that ran through yesterday
    else break;
  }
  return streak;
}
function patternsCardHTML(){
  const tiles = [], notes = [];
  const foodStreak = logStreak(d => S.foods.some(f => f.date === d));
  if (foodStreak >= 2) tiles.push(["Food log streak", foodStreak + " day" + (foodStreak === 1 ? "" : "s")]);
  const ciStreak = logStreak(d => (S.checkins || []).some(c => c.date === d));
  if (ciStreak >= 2) tiles.push(["Check-in streak", ciStreak + " day" + (ciStreak === 1 ? "" : "s")]);
  const wStreak = logStreak(d => (S.workouts || []).some(w => w.date === d));
  if (wStreak >= 2) tiles.push(["Training streak", wStreak + " day" + (wStreak === 1 ? "" : "s")]);

  // Sleep → next-day wellness (paired days only)
  const paired = (S.checkins || []).map(c => {
    const s = (S.sleep || []).find(x => x.date === c.date); const sc = (typeof checkinScore === "function") ? checkinScore(c) : null;
    return (s && +s.hours && sc != null) ? {h: +s.hours, score: sc} : null;
  }).filter(Boolean);
  if (paired.length >= 4){
    const good = paired.filter(p => p.h >= 7), poor = paired.filter(p => p.h < 7);
    if (good.length >= 2 && poor.length >= 2){
      const avg = a => Math.round(a.reduce((x, y) => x + y.score, 0) / a.length);
      const g = avg(good), p = avg(poor);
      if (Math.abs(g - p) >= 3) notes.push(`Your wellness score averages ${g}/100 on nights of 7 h+ sleep vs ${p}/100 after shorter nights.`);
    }
  }
  // Protein on training vs rest days (last 30 days, days with food logged)
  const since = new Date(Date.now() - 29 * 864e5).toLocaleDateString("en-CA");
  const byDay = {};
  S.foods.filter(f => f.date >= since).forEach(f => { (byDay[f.date] = byDay[f.date] || {p: 0}).p += num(f.p); });
  const train = [], rest = [];
  Object.keys(byDay).forEach(d => { const isW = (S.workouts || []).some(w => w.date === d); (isW ? train : rest).push(byDay[d].p); });
  if (train.length >= 2 && rest.length >= 2){
    const avg = a => Math.round(a.reduce((x, y) => x + y, 0) / a.length);
    const tP = avg(train), rP = avg(rest);
    if (Math.abs(tP - rP) >= 8) notes.push(`You average ${tP} g protein on training days vs ${rP} g on rest days.`);
  }

  if (!tiles.length && !notes.length) return "";
  return `<div class="card">
    <h3>${ic("chart", 16)} Patterns &amp; streaks</h3>
    ${tiles.length ? `<div class="rev-grid" style="margin-bottom:${notes.length ? "10px" : "0"}">${tiles.map(([l, v]) => `<div class="rev-stat"><div class="rv">${esc(v)}</div><div class="rl">${esc(l)}</div></div>`).join("")}</div>` : ""}
    ${notes.map(n => `<div class="wr-note" style="margin-top:8px">${ic("check", 13)} ${esc(n)}</div>`).join("")}
    <div class="tiny" style="margin-top:9px;color:var(--txt2)">Associations from your own logs — patterns to notice, not medical advice. They appear only once there's enough data.</div>
  </div>`;
}

function searchAll(q){
  const query = q.trim().toLowerCase();
  if (!query) return [];
  const hit = s => s && String(s).toLowerCase().includes(query);
  const out = [];
  const push = (type, id, icon, label, sub, go) => out.push({type, id, icon, label, sub, go});
  // navigation / feature jumps first
  SEARCH_NAV.filter(n => (n.label + " " + n.kw).toLowerCase().includes(query)).slice(0, 5).forEach(n => push("nav", null, n.icon, n.label, n.sub, n.go));
  (S.recipes || []).filter(r => hit(r.name) || (r.tags || []).some(t => hit(t)) || (r.ingredients || []).some(i => hit(i))).slice(0, 5).forEach(r => push("recipe", r.id, "book", r.name, `Recipe · ${n0(r.per.kcal)} kcal`));
  (S.tasks || []).filter(t => hit(t.title)).slice(0, 6).forEach(t => push("task", t.id, "checkSquare", t.title, t.done ? "Task · done" : "Task" + (t.due ? " · due " + t.due : "")));
  (S.notes || []).filter(n => hit(n.title) || hit(n.body)).slice(0, 6).forEach(n => push("note", n.id, "fileText", n.title || "Untitled note", "Note"));
  (S.savedFoods || []).filter(f => hit(f.name)).slice(0, 6).forEach(f => push("food", null, "food", f.name, `${n0(f.kcal)} kcal · ${n1(f.p)}P`));
  (S.workouts || []).filter(w => hit(w.name) || w.items.some(it => hit(it.name))).slice(0, 5).forEach(w => push("workout", w.id, "barbell", w.name, `Workout · ${fmtDate(w.date)}`));
  (S.exercises || []).filter(e => hit(e.n)).slice(0, 4).forEach(e => push("exercise", e.id, "list", e.n, "Exercise"));
  (S.supplements || []).filter(s => hit(s.name)).slice(0, 4).forEach(s => push("supp", s.id, "pill", s.name, "Supplement"));
  (S.bills || []).filter(b => hit(b.name)).slice(0, 5).forEach(b => push("bill", b.id, "creditCard", b.name, "Bill · " + b.cycle));
  (S.trips || []).filter(t => hit(t.dest) || hit(t.notes)).slice(0, 4).forEach(t => push("trip", t.id, "plane", t.dest || "Trip", "Trip"));
  (S.compares || []).filter(c => hit(c.title) || c.options.some(o => hit(o.name))).slice(0, 4).forEach(c => push("compare", c.id, "scale", c.title, "Comparison"));
  (S.decisions || []).filter(d => hit(d.title) || hit(d.options) || hit(d.why)).slice(0, 4).forEach(d => push("decision", d.id, "target", d.title, "Decision"));
  (S.convs || []).filter(c => hit(c.title) || c.msgs.some(m => hit(m.content))).slice(0, 6).forEach(c => {
    const dom = S.domains.find(d => d.id === c.dom);
    push("chat", c.id, "chat", c.title || "Chat", "Chat · " + (dom ? dom.name : ""));
  });
  return out.slice(0, 40);
}

/* ---------------- voice input (Web Speech API) ---------------- */
function startVoice(cb){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR){ toast("Voice input isn't supported on this browser."); return; }
  try {
    const r = new SR();
    r.lang = S.settings.lang === "ar" ? "ar-SA" : (S.settings.lang && S.settings.lang !== "match" ? S.settings.lang : (navigator.language || "en-US"));
    r.interimResults = false; r.maxAlternatives = 1;
    r.onresult = e => cb(e.results[0][0].transcript);
    r.onerror = ev => { if (ev.error !== "aborted") toast("Didn't catch that — try again."); };
    r.start();
    toast("Listening…", 1600);
  } catch (e) { toast("Voice input unavailable."); }
}

async function pinPress(d){
  if (R.pending.length >= 4) return;
  R.pending += d;
  const dots = $("#pinDots");
  if (dots) dots.innerHTML = [0,1,2,3].map(i => `<i class="${i < R.pending.length ? "f" : ""}"></i>`).join("");
  if (R.pending.length === 4){
    const h = await sha256("mira:" + R.pending);
    if (h === S.settings.pinHash){
      const lock = $("#lock");
      if (lock) lock.classList.add("open");
      setTimeout(() => { R.unlocked = true; R.pending = ""; render(); }, 380);
    } else {
      if (dots){ dots.classList.add("err"); }
      if (navigator.vibrate) navigator.vibrate(120);
      setTimeout(() => { R.pending = ""; render(); }, 420);
    }
  }
}

  if (!S.domains.length) S.domains = JSON.parse(JSON.stringify(DEFAULT_DOMAINS));
  S.onboarded = true;
  R.mode = S.domains[0].id;
  save(); render();
  toast(`Welcome${S.settings.name ? ", " + S.settings.name : ""}.`);
}

<script>
"use strict";
/* ---------------- live-data context + system prompt ---------------- */
function dayFoods(date){ return S.foods.filter(f => f.date === date); }

}
function liveContext(){

  const gl = S.water[t] || 0;

    const t = todayStr(); const todaySet = new Set(S.suppLog[t] || []);
    lines.push(`Supplements: ${S.supplements.map(s => `${s.name}${s.timing ? ` (${s.timing})` : ""}`).join(", ")}. Taken today: ${S.supplements.filter(s => todaySet.has(s.id)).map(s => s.name).join(", ") || "none yet"}. 7-day adherence ${total ? Math.round(taken / total * 100) : 0}%.`);

  }
  if (Array.isArray(S.mood) && S.mood.length){ const m = [...S.mood].sort((a, b) => a.date < b.date ? -1 : 1).slice(-3); lines.push(`Mood/energy (recent): ${m.map(e => `${e.date} mood ${e.mood}/5, energy ${e.energy}/5`).join("; ")}.`); }

  L.push(s.sl ? `Sleep: ${s.sl} night(s) logged, avg ${dp(s.avgSleep)} h.` : `Sleep: nothing logged this week.`);

/* ---------------- action cards (agent capability) ---------------- */
const unesc = s => String(s).replace(/&amp;/g, "&").replace(/&lt;/g, "<").replace(/&gt;/g, ">").replace(/&quot;/g, '"').replace(/&#39;/g, "'");
function parseAction(raw){
  const parts = raw.split(/^---$/m);
  const fields = {};
  parts[0].trim().split("\n").forEach(l => {
    const m = l.match(/^(\w+):\s*(.*)$/);
    if (m) fields[m[1].toLowerCase()] = unesc(m[2].trim());
  });
  fields.body = unesc(parts.slice(1).join("---").trim());
  return fields;
}
const actPayload = f => encodeURIComponent(JSON.stringify(f)).replace(/'/g, "%27");
function actionCardHTML(kind, raw){
  const f = parseAction(raw);
  const p = actPayload(f);
  if (kind === "email"){
    return `<div class="action-card">
      <div class="ach">${ic("mail", 15)} Email draft — ready to send</div>
      <div class="acf"><b>To:</b> <span dir="auto">${esc(f.to || "—")}</span></div>
      <div class="acf"><b>Subject:</b> <span dir="auto">${esc(f.subject || "—")}</span></div>
      <div class="acb" dir="auto">${esc(f.body).replace(/\n/g, "<br>")}</div>
      <div class="row" style="margin-top:10px">
        <button class="btn sm" onclick="M.actEmail('${p}')">${ic("mail", 14)} Open in Mail</button>
        <button class="btn sm sec" onclick="M.actCopy('${p}')">${ic("copy", 14)} Copy</button>
      </div>
      <div class="tiny" style="margin-top:7px">Sends from your own mail account — nothing goes out until you press send there.</div>
    </div>`;
  }
  return `<div class="action-card">
    <div class="ach">${ic("calendar", 15)} Calendar event — ready to add</div>
    <div class="acf"><b>Title:</b> <span dir="auto">${esc(f.title || "—")}</span></div>
    <div class="acf"><b>When:</b> ${esc(f.start || "—")}${f.end ? " → " + esc(f.end) : ""}</div>
    ${f.location ? `<div class="acf"><b>Where:</b> <span dir="auto">${esc(f.location)}</span></div>` : ""}
    ${f.body ? `<div class="acb" dir="auto">${esc(f.body).replace(/\n/g, "<br>")}</div>` : ""}
    <div class="row" style="margin-top:10px">
      <button class="btn sm" onclick="M.actIcs('${p}')">${ic("calendar", 14)} Add to calendar</button>
      <button class="btn sm sec" onclick="M.actCopy('${p}')">${ic("copy", 14)} Copy</button>
    </div>
  </div>`;
}

/* ---------------- markdown (minimal, safe) ---------------- */
function md(src){
  let s = esc(src);
  // agent action blocks first, then normal code blocks
  s = s.replace(/```action:(email|event)\n([\s\S]*?)```/g, (_, kind, raw) => actionCardHTML(kind, raw));
  s = s.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, l, c) => `<pre><code>${c}</code></pre>`);
  // tables
  s = s.replace(/((?:^\|.*\|\s*$\n?)+)/gm, block => {
    const rows = block.trim().split("\n").map(r => r.trim()).filter(r => r.startsWith("|"));
    if (rows.length < 2) return block;
    const cells = r => r.replace(/^\||\|$/g, "").split("|").map(c => c.trim());
    const head = cells(rows[0]);
    const bodyRows = rows.slice(/^\|[\s:\-|]+\|$/.test(rows[1]) ? 2 : 1);
    return `<div class="tbl-scroll"><table><thead><tr>${head.map(h => `<th>${h}</th>`).join("")}</tr></thead><tbody>${
      bodyRows.map(r => `<tr>${cells(r).map(c => `<td>${c}</td>`).join("")}</tr>`).join("")}</tbody></table></div>`;
  });
  s = s.replace(/^#{1,4}\s+(.+)$/gm, "<h3>$1</h3>");
  s = s.replace(/^&gt;\s?(.+)$/gm, "<blockquote>$1</blockquote>");
  // lists
  s = s.replace(/((?:^[ \t]*[-*•]\s+.+$\n?)+)/gm, b => `<ul>${b.trim().split("\n").map(l => `<li>${l.replace(/^[ \t]*[-*•]\s+/, "")}</li>`).join("")}</ul>`);
  s = s.replace(/((?:^[ \t]*\d+[.)]\s+.+$\n?)+)/gm, b => `<ol>${b.trim().split("\n").map(l => `<li>${l.replace(/^[ \t]*\d+[.)]\s+/, "")}</li>`).join("")}</ol>`);
  // inline
  s = s.replace(/\*\*([^*]+)\*\*/g, "<b>$1</b>");
  s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, "$1<i>$2</i>");
  s = s.replace(/`([^`\n]+)`/g, "<code>$1</code>");
  s = s.replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g, `<a href="$2" target="_blank" rel="noopener">$1</a>`);
  s = s.replace(/(^|[\s(])(https?:\/\/[^\s<)]+)/g, `$1<a href="$2" target="_blank" rel="noopener">$2</a>`);
  // paragraphs
  return s.split(/\n{2,}/).map(p =>
    /^<(h3|ul|ol|pre|table|blockquote|div)/.test(p.trim()) ? p : `<p>${p.trim().replace(/\n/g, "<br>")}</p>`
  ).join("");
}

/* ---------------- API ---------------- */
const API_SLEEP = ms => new Promise(r => setTimeout(r, ms));
async function apiCall(body, onDelta){
  const headers = {
    "content-type": "application/json",
    "x-api-key": S.settings.apiKey,
    "anthropic-version": "2023-06-01",
    "anthropic-dangerous-direct-browser-access": "true",
  };
  // Transient upstream conditions (server overloaded / rate limited / gateway) are
  // retried automatically with exponential backoff before the error reaches the user.
  const RETRYABLE = new Set([408, 429, 500, 502, 503, 529]);
  const MAX_TRIES = 4;
  let res;
  for (let attempt = 0; ; attempt++){
    try {
      res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST", headers, body: JSON.stringify(body),
      });
    } catch (netErr){
      if (attempt < MAX_TRIES - 1){ await API_SLEEP(700 * 2 ** attempt + Math.random() * 400); continue; }
      throw new Error("Couldn't reach Anthropic — check your internet connection and try again.");
    }
    if (res.ok) break;
    let msg = `API error ${res.status}`, type = "";
    try { const ej = await res.json(); msg = ej.error?.message || msg; type = ej.error?.type || ""; } catch (e) {}
    const overloaded = res.status === 529 || type === "overloaded_error" || /overload/i.test(msg);
    const retryable = RETRYABLE.has(res.status) || overloaded;
    if (retryable && attempt < MAX_TRIES - 1){
      const ra = parseFloat(res.headers.get("retry-after"));
      await API_SLEEP(Number.isFinite(ra) ? ra * 1000 : 700 * 2 ** attempt + Math.random() * 400);
      continue;
    }
    if (overloaded){
      const e = new Error("Anthropic's servers are busy right now (overloaded). MIRA already retried a few times — please try again in a moment."); e.status = 529; throw e;
    }
    if (res.status === 401 || res.status === 403){
      const e = new Error("Your API key was rejected — check it in Settings."); e.status = res.status; throw e;
    }
    if (res.status === 429){
      const e = new Error("Rate limit reached on your API key — wait a moment and try again."); e.status = 429; throw e;
    }
    const e = new Error(msg); e.status = res.status; throw e;
  }
  if (!body.stream) {
    const j = await res.json();
    return (j.content || []).filter(b => b.type === "text").map(b => b.text).join("");
  }
  const reader = res.body.getReader();
  const dec = new TextDecoder();
  let buf = "", full = "";
  for (;;){
    const {done, value} = await reader.read();
    if (done) break;
    buf += dec.decode(value, {stream: true});
    const lines = buf.split("\n");
    buf = lines.pop();
    for (const line of lines){
      if (!line.startsWith("data:")) continue;
      const data = line.slice(5).trim();
      if (!data || data === "[DONE]") continue;
      try {
        const ev = JSON.parse(data);
        if (ev.type === "content_block_delta" && ev.delta?.text){
          full += ev.delta.text;
          if (onDelta) onDelta(full);
        }
        if (ev.type === "error") throw new Error(ev.error?.message || "stream error");
      } catch (e) { if (e instanceof SyntaxError) continue; throw e; }
    }
  }
  return full;
}

function historyBlocks(msgs){

}

async function sendChat(){
  if (R.busy) return;
  const ta = $("#chatIn");
  const text = (ta ? ta.value : "").trim();
  if (!text && !R.attach) return;
  if (!S.settings.apiKey){ toast("Add your API key in Settings first."); R.tab = "set"; render(); return; }

  if (ta) ta.value = "";
  const dom = curDomain();
  const ds = R.deepSolve;
  const att = R.attach;
  const useWeb = S.settings.webSearch || R.forceWeb;
  R.attach = null; R.deepSolve = false; R.forceWeb = false;
  let conv = activeConv();
  if (!conv){
    conv = {id: uid(), dom: dom.id, title: String(text || (att ? att.name : "") || "New chat").slice(0, 48), ts: Date.now(), msgs: []};
    S.convs.unshift(conv);
    R.convId = conv.id;
  }
  conv.ts = Date.now();
  const msgs = conv.msgs;
  msgs.push({role: "user", content: text || "(see attachment)", ts: Date.now(), att: att ? att.name : null});
  save();
  R.busy = true;
  render();

  // build request
  const hist = historyBlocks(msgs.slice(0, -1));
  const userText = (ds ? "[DEEP SOLVE] " : "") + (text || "Please read the attached file and respond in the current mode.");
  let lastContent;
  if (att){
    const block = att.kind === "pdf"
      ? {type: "document", source: {type: "base64", media_type: "application/pdf", data: att.data}}
      : {type: "image", source: {type: "base64", media_type: att.media_type, data: att.data}};
    lastContent = [block, {type: "text", text: userText}];
  } else lastContent = userText;

  const holder = {role: "assistant", content: "", ts: Date.now(), ds};
  msgs.push(holder);
  render();
  const msgsEl = $("#msgs");
  if (msgsEl){
    const el = msgsEl.lastElementChild;
    el.innerHTML = `<div class="who">MIRA${ds ? " · DEEP SOLVE" : ""}</div><div class="typing"><i></i><i></i><i></i></div>`;
  }

  try {
    const full = await apiCall({
      model: S.settings.model, max_tokens: ds ? 8000 : 4000, stream: true,
      system: systemPrompt(dom),
      ...(useWeb ? {tools: [{type: "web_search_20250305", name: "web_search", max_uses: 6}]} : {}),
      messages: [...hist, {role: "user", content: lastContent}],
    }, partial => {
      holder.content = partial;
      const msgsEl2 = $("#msgs");
      if (msgsEl2){
        const el = msgsEl2.lastElementChild;
        el.innerHTML = `<div class="who">MIRA${ds ? " · DEEP SOLVE" : ""}</div>${md(partial)}`;
        const c = $("#content");
        if (c && c.scrollHeight - c.scrollTop - c.clientHeight < 300) c.scrollTop = c.scrollHeight;
      }
    });
    holder.content = full || "(no response)";
  } catch (e) {
    holder.content = `**Could not reach the API.** ${e.message}\n\nCheck your key, model and connection in Settings, then try again.`;
  }
  R.busy = false;
  save(); render();
}

async function regenLast(cid){

"use strict";
/* ---------------- macro sanity checking ---------------- */
function sanity(m){
  const out = {errors: [], warnings: []};
  const has = v => v !== "" && v !== null && v !== undefined && isFinite(+v);
  if (![m.kcal, m.p, m.c, m.f].every(has))
    out.errors.push("All four values (kcal, protein, carbs, fat) must be present — enter 0 where it truly is 0.");
  const kcal = num(m.kcal), p = num(m.p), c = num(m.c), f = num(m.f);
  if ([kcal, p, c, f].some(v => v < 0)) out.errors.push("Negative values are impossible.");
  if (kcal > 6000) out.warnings.push("Over 6,000 kcal for one item — double-check this.");
  const expected = 4 * p + 4 * c + 9 * f;
  if (kcal > 20 && expected > 0){
    const diff = Math.abs(kcal - expected) / Math.max(kcal, expected);
    if (diff > 0.35) out.errors.push(`Energy inconsistent with macros: 4×${n1(p)}P + 4×${n1(c)}C + 9×${n1(f)}F = ${n0(expected)} kcal, but ${n0(kcal)} kcal entered (${n0(diff * 100)}% apart).`);
    else if (diff > 0.18) out.warnings.push(`Energy slightly off macros (expected ≈${n0(expected)} kcal from 4P+4C+9F). Fibre/alcohol/rounding can explain small gaps.`);
  }
  if (kcal > 0 && p > kcal / 3.2) out.errors.push("Protein grams implausibly high for this energy (protein alone would exceed the calories).");
  return out;
}

/* ---------------- 7-day insights ---------------- */
function insightsHTML(){
  const tg = S.settings.targets;
  const days = [...Array(7)].map((_, k) => {
    const d = new Date(Date.now() - (6 - k) * 864e5).toLocaleDateString("en-CA");
    return {d, tot: dayTotals(d), waterMl: (S.water[d] || 0) * 250};
  });
  const logged = days.filter(x => x.tot.kcal > 0);
  if (!logged.length && !S.foods.length) return "";
  const avg = arr => arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : 0;
  const avgK = avg(logged.map(x => x.tot.kcal));
  const avgP = avg(logged.map(x => x.tot.p));
  const onTarget = tg.kcal ? logged.filter(x => x.tot.kcal >= tg.kcal * 0.9 && x.tot.kcal <= tg.kcal * 1.1).length : 0;

  let streak = 0;
  for (let k = 0; ; k++){
    const d = new Date(Date.now() - k * 864e5).toLocaleDateString("en-CA");
    if (dayTotals(d).kcal > 0) streak++;
    else if (k === 0) continue;   // today may not be logged yet
    else break;
  }
  const max = Math.max(tg.kcal || 0, ...days.map(x => x.tot.kcal), 1) * 1.05;
  const bars = days.map((x, k) => {
    const h = Math.max(1.5, (x.tot.kcal / max) * 38);

      fill="${over ? "var(--amber)" : good ? "var(--green)" : "var(--acc)"}" opacity="${x.d === todayStr() ? 1 : .55}"/>`;
  }).join("");
  const tLine = tg.kcal ? `<line x1="0" y1="${44 - (tg.kcal / max) * 38}" x2="154" y2="${44 - (tg.kcal / max) * 38}" stroke="var(--txt3)" stroke-width="1" stroke-dasharray="3 3"/>` : "";
  return `<div class="card">
    <h3>${ic("chart", 16)} Last 7 days ${streak > 1 ? `<span class="badge" style="margin-inline-start:auto">${streak}-day streak</span>` : ""}</h3>
    <svg viewBox="0 0 154 46" style="width:100%;height:56px;display:block;margin:4px 0 8px">${tLine}${bars}</svg>
    <div class="muted" style="font-size:12.5px">
      Avg <b>${n0(avgK)} kcal</b> · <b>${n1(avgP)} g protein</b> on logged days${tg.kcal ? ` · on target <b>${onTarget}/${logged.length}</b>` : ""} · water goal hit <b>${waterHit}/7</b>
    </div>
  </div>`;
}

function macroBar(label, val, target, unit){
  if (!target) return "";
  const pct = Math.min(100, target ? (val / target) * 100 : 0);
  const done = val >= target, over = val > target * 1.1;
  const cls = over ? "over" : done ? "done" : "";
  const st = over ? "over" : done ? "✓" : "";
  return `<div class="bar-line ${cls}">
    <div class="bar-top"><span class="lab">${label}</span>
      <span class="val">${unit === "kcal" ? n0(val) : n1(val)} / ${n0(target)} ${unit} <span class="st">${st}</span></span></div>
    <div class="bar"><i style="width:${pct}%"></i></div>
  </div>`;
}

/* Suggest foods/mini-meals to finish the day's remaining macros, using the food log + last-meal time */
function finishDayCardHTML(){
  const ds = todayStr();
  const tot = dayTotals(ds), tg = S.settings.targets || {};
  if (!tg.kcal) return "";                              // needs a calorie target to be meaningful
  const today = dayFoods(ds);
  if (!today.length) return "";                         // nothing eaten yet — nothing to "finish"
  const remK = tg.kcal - tot.kcal;
  if (remK <= 60) return "";                            // effectively at/over target — no nudge
  const remP = (tg.protein || 0) - tot.p, remC = (tg.carbs || 0) - tot.c, remF = (tg.fat || 0) - tot.f;
  const last = today.reduce((a, b) => (b.ts || 0) > (a.ts || 0) ? b : a, today[0]);
  const ideas = R.finishIdeas || [];
  const chip = (lbl, val, unit) => `<span class="fd-chip"><b>${n0(Math.max(0, val))}${unit}</b> ${lbl}</span>`;
  return `<div class="card">
    <div class="card-h-row"><h3>${ic("target", 16)} ${t("Finish your day")}</h3>${last ? `<span class="set-status"><span class="dot"></span>${t("last meal")} ${esc(entryTime(last))}</span>` : ""}</div>
    <div class="muted" style="margin:9px 0 10px">${t("You still have room today — here's what's left to hit your targets:")}</div>
    <div class="fd-chips">${chip("kcal", remK, "")}${tg.protein ? chip(t("Protein"), remP, "g") : ""}${tg.carbs ? chip(t("Carbs"), remC, "g") : ""}${tg.fat ? chip(t("Fat"), remF, "g") : ""}</div>
    <button class="btn sm" style="margin-top:12px" onclick="M.finishSuggest()" ${R.finishBusy ? "disabled" : ""}>${R.finishBusy ? "Thinking…" : ic("search", 15) + (ideas.length ? " " + t("Suggest again") : " " + t("Suggest what to eat"))}</button>
    ${ideas.length ? `<div class="ideas-head"><span>${t("Ideas to fill the gap")}</span><button class="ideas-x" onclick="M.finishClear()">${ic("x", 15)} ${t("Dismiss")}</button></div>
    <div class="snack-grid">${ideas.map((s, i) => `<div class="snack-card ai">
      <div class="sc-top"><div class="sc-nm" dir="auto">${esc(s.name)}</div></div>
      <div class="sc-macros">${n0(s.kcal)} kcal · ${n0(s.p)}P · ${n0(s.c)}C · ${n0(s.f)}F${s.amount ? ` <span class="sc-amt">· ${esc(s.amount)}</span>` : ""}</div>

      <button class="btn sm sec" onclick="M.finishLog(${i})">${ic("plus", 14)} ${t("Log this")}</button>
    </div>`).join("")}</div>
    <div class="tiny" style="margin-top:8px;color:var(--txt2)">Macros are estimates, logged with the current time. These clear when you leave the page.</div>` : ""}
  </div>`;
}

/* ---------------- food-log report (date range, multi-format) ---------------- */
function foodRange(){
  const to = R.frTo || todayStr();
  const from = R.frFrom || new Date(Date.now() - 6 * 864e5).toLocaleDateString("en-CA");
  return from <= to ? {from, to} : {from: to, to: from};
}
function foodRangeStats(from, to){
  const inRange = S.foods.filter(f => f.date >= from && f.date <= to);
  const byDay = {};
  inRange.forEach(f => { (byDay[f.date] = byDay[f.date] || []).push(f); });
  const days = Object.keys(byDay).sort().map(d => {
    const items = byDay[d];
    const t = items.reduce((a, x) => ({kcal: a.kcal + num(x.kcal), p: a.p + num(x.p), c: a.c + num(x.c), f: a.f + num(x.f)}), {kcal: 0, p: 0, c: 0, f: 0});
    return {date: d, items, ...t};
  });
  const n = days.length;
  const tot = days.reduce((a, d) => ({kcal: a.kcal + d.kcal, p: a.p + d.p, c: a.c + d.c, f: a.f + d.f}), {kcal: 0, p: 0, c: 0, f: 0});
  return {from, to, days, n, entries: inRange.length,
    avgKcal: n ? tot.kcal / n : 0, avgP: n ? tot.p / n : 0, avgC: n ? tot.c / n : 0, avgF: n ? tot.f / n : 0, tot};
}
function foodReportText(from, to){
  const s = foodRangeStats(from, to);
  const tg = S.settings.targets || {};
  const L = [];
  L.push(`MIRA — Food log${S.settings.name ? " · " + S.settings.name : ""}`);
  L.push(`${fmtDate(from)} → ${fmtDate(to)}  (${s.n} day${s.n === 1 ? "" : "s"} logged)`);
  L.push("");
  if (!s.n){ L.push("No food logged in this range."); return L.join("\n"); }
  L.push(`Daily average: ${n0(s.avgKcal)} kcal · ${n0(s.avgP)}P · ${n0(s.avgC)}C · ${n0(s.avgF)}F`);
  if (tg.kcal) L.push(`Targets: ${n0(tg.kcal)} kcal · ${n0(tg.protein)}P${tg.carbs ? ` · ${n0(tg.carbs)}C` : ""}${tg.fat ? ` · ${n0(tg.fat)}F` : ""}`);
  L.push("");
  s.days.forEach(d => {
    L.push(`▪ ${fmtDate(d.date)} — ${n0(d.kcal)} kcal · ${n1(d.p)}P · ${n1(d.c)}C · ${n1(d.f)}F`);
    d.items.forEach(it => L.push(`   · ${it.name}${it.amount ? ` (${it.amount})` : ""} — ${n0(it.kcal)} kcal / ${n1(it.p)}P / ${n1(it.c)}C / ${n1(it.f)}F${it.conf && it.conf !== "user" ? ` [${it.conf}]` : ""}`));
  });
  L.push("");
  L.push("Generated by MIRA. Figures reflect logged entries; items marked [estimate] are approximate.");
  return L.join("\n");
}
function foodReportCSV(from, to){
  const s = foodRangeStats(from, to);
  const esc = v => { const t = String(v ?? ""); return /[",\n]/.test(t) ? '"' + t.replace(/"/g, '""') + '"' : t; };
  const rows = [["Date", "Item", "Amount", "Calories", "Protein_g", "Carbs_g", "Fat_g", "Source"]];
  s.days.forEach(d => d.items.forEach(it => rows.push([d.date, it.name, it.amount || "", n0(it.kcal), n1(it.p), n1(it.c), n1(it.f), it.conf || "user"])));
  rows.push([]);
  rows.push(["Daily average", "", "", n0(s.avgKcal), n1(s.avgP), n1(s.avgC), n1(s.avgF), ""]);
  rows.push(["Total", "", "", n0(s.tot.kcal), n1(s.tot.p), n1(s.tot.c), n1(s.tot.f), ""]);
  return rows.map(r => r.map(esc).join(",")).join("\n");
}

function escp(s){ return String(s ?? "").replace(/[&<>"]/g, c => ({"&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;"}[c])); }

function foodReportImage(from, to){
  return new Promise(resolve => {

      const rr = (x, y, w, h, r) => { g.beginPath(); g.moveTo(x + r, y); g.arcTo(x + w, y, x + w, y + h, r); g.arcTo(x + w, y + h, x, y + h, r); g.arcTo(x, y + h, x, y, r); g.arcTo(x, y, x + w, y, r); g.closePath(); };

      // KPI boxes

      kpis.forEach((k, i) => {

        g.fillStyle = "#F6F7F9"; rr(x, kpiTop, bw, kpiH, 12); g.fill();
        g.strokeStyle = "#E7E9EE"; g.lineWidth = 1; rr(x, kpiTop, bw, kpiH, 12); g.stroke();

        g.fillText(k[1], x + 14, kpiTop + 62);
      });
      // per-day summary rows
      let y = daysTop;
      (s.days.length ? s.days : [{date: from, kcal: 0, p: 0, c: 0, f: 0}]).forEach(d => {
        g.strokeStyle = "#EEF0F3"; g.lineWidth = 1; g.beginPath(); g.moveTo(pad, y); g.lineTo(W - pad, y); g.stroke();
        g.fillStyle = "#161B26"; g.font = "700 17px -apple-system, Segoe UI, Roboto, Arial, sans-serif";
        g.fillText(fmtDate(d.date), pad, y + 26);
        g.fillStyle = "#5B6270"; g.font = "400 15px -apple-system, Segoe UI, Roboto, Arial, sans-serif";

      g.strokeStyle = "#EEF0F3"; g.beginPath(); g.moveTo(pad, y); g.lineTo(W - pad, y); g.stroke();
      g.fillStyle = "#9AA0AB"; g.font = "400 13px -apple-system, Segoe UI, Roboto, Arial, sans-serif";
      g.fillText("Generated by MIRA · figures reflect logged entries; estimates are approximate.", pad, y + 34);

/* find and parse the JSON payload in a model reply that may also contain prose */
function tryParseJson(t){
  if (t == null) throw new Error("empty reply");
  // 1) fenced ```json blocks, last one first
  const fenced = t.match(/```(?:json)?\s*([\s\S]*?)```/g) || [];
  for (const block of fenced.reverse()){
    try { return JSON.parse(block.replace(/^```(?:json)?\s*/, "").replace(/```$/, "")); } catch (e) {}
  }
  // 2) balanced-brace forward scan: walk every {/[ and find its matching close,
  //    honouring strings and escapes so braces inside quotes don't derail it.
  //    Try whichever opener appears FIRST in the text — otherwise a bare array
  //    reply like [{...},{...}] matches its first inner object and every other
  //    item is silently dropped.
  const oi = t.indexOf("{"), ai = t.indexOf("[");
  const openers = ai >= 0 && (oi < 0 || ai < oi) ? ["[", "{"] : ["{", "["];
  for (const open of openers){
    const close = open === "{" ? "}" : "]";
    for (let start = t.indexOf(open); start >= 0; start = t.indexOf(open, start + 1)){
      let depth = 0, inStr = false, esc = false;
      for (let j = start; j < t.length; j++){
        const c = t[j];
        if (inStr){
          if (esc) esc = false;
          else if (c === "\\") esc = true;
          else if (c === '"') inStr = false;
        } else if (c === '"') inStr = true;
        else if (c === open) depth++;
        else if (c === close){
          depth--;
          if (depth === 0){
            try { return JSON.parse(t.slice(start, j + 1)); } catch (e) {}
            break;
          }
        }
      }
    }
  }
  // 3) backward last-open scan (handles truncated / nested prose) — same
  //    first-opener preference as above
  for (const [open, close] of (openers[0] === "[" ? [["[", "]"], ["{", "}"]] : [["{", "}"], ["[", "]"]])){
    const end = t.lastIndexOf(close);
    let i = t.length;
    for (let n = 0; n < 16 && (i = t.lastIndexOf(open, i - 1)) >= 0; n++){
      if (end > i){ try { return JSON.parse(t.slice(i, end + 1)); } catch (e) {} }
      if (i === 0) break;
    }
  }
  throw new Error("could not read structured data from the reply");
}

// Pull every complete {...} object out of text, even when the surrounding
// array was cut off mid-stream (max_tokens truncation). The last, partial
// object is simply dropped — complete suggestions are never lost with it.
function salvageObjects(t){
  const out = [];
  for (let start = t.indexOf("{"); start >= 0; start = t.indexOf("{", start + 1)){
    let depth = 0, inStr = false, escp = false;
    for (let j = start; j < t.length; j++){
      const c = t[j];
      if (inStr){ if (escp) escp = false; else if (c === "\\") escp = true; else if (c === '"') inStr = false; continue; }
      if (c === '"') inStr = true;
      else if (c === "{") depth++;
      else if (c === "}"){ depth--; if (!depth){ try { const o = JSON.parse(t.slice(start, j + 1)); if (o && typeof o === "object") out.push(o); } catch (e) {} start = j; break; } }
    }
  }
  return out;
}
// Structured JSON calls don't need chain-of-thought. On thinking-enabled
// models (Claude 5 family) the hidden reasoning silently eats the whole
// max_tokens budget and the reply comes back as EMPTY text — which is what
// made lookups slow and "could not read structured data" frequent. Disable
// thinking explicitly; if a model rejects the parameter, retry once without.
async function llmJsonCall(system, content, maxTokens, extra){
  const base = {model: S.settings.model, max_tokens: maxTokens, system,
    messages: [{role: "user", content}], ...(extra || {})};
  try { return await apiCall({...base, thinking: {type: "disabled"}}); }
  catch (e){ if (e.status === 400) return apiCall(base); throw e; }
}
// Ask the model for a JSON array, robustly and WITHOUT assistant prefill
// (some models reject prefill). Firm instruction + tolerant parser + salvage
// of complete items from a truncated reply, with one retry only if that
// still yields nothing.
async function llmJsonArray(system, userMsg, maxTokens){
  let lastErr;
  for (let attempt = 0; attempt < 2; attempt++){
    const content = attempt === 0 ? userMsg
      : userMsg + "\n\nIMPORTANT: reply with ONLY a JSON array — no preamble, no explanation, no code fence.";
    // the retry also gets a much bigger budget in case the first reply was truncated
    const reply = await llmJsonCall(system, content, attempt === 0 ? maxTokens : Math.round(maxTokens * 2.5));
    try {
      const j = tryParseJson(reply);
      const arr = Array.isArray(j) ? j
        : (j && (Array.isArray(j.items) || Array.isArray(j.snacks) || Array.isArray(j.recipes)))
          ? (j.items || j.snacks || j.recipes)
          : (j && j.name ? [j] : []);
      if (Array.isArray(arr) && arr.length) return arr;
      lastErr = new Error("no items");
    } catch (e){ lastErr = e; }
    // Full parse failed (usually truncation) — salvage the complete objects
    // instead of paying for a whole second call.
    const sal = salvageObjects(reply).filter(o => o.name);
    if (sal.length) return sal;
    console.log("MIRA suggest: unusable reply (attempt " + (attempt + 1) + "):", String(reply).slice(0, 300));
  }
  throw lastErr || new Error("no items");
}

// Offline fallback for the suggesters: picks that actually fit the remaining
// macros, drawn from the user's own saved foods, recipe box and the curated
// snack list. Instant, deterministic, honest about its source — used whenever
// the AI call fails so the button never comes back empty-handed.
function localFinishIdeas(remK, remP){
  const cands = [];
  (S.savedFoods || []).forEach(f => { if (num(f.kcal) > 0) cands.push({name: f.name, amount: f.amount || "", kcal: num(f.kcal), p: num(f.p), c: num(f.c), f: num(f.f), src: "your saved foods"}); });
  (S.recipes || []).forEach(r => { if (r.per && num(r.per.kcal) > 0) cands.push({name: r.name, amount: "1 serving", kcal: num(r.per.kcal), p: num(r.per.p), c: num(r.per.c), f: num(r.per.f), src: "your recipes"}); });
  (typeof SNACK_IDEAS !== "undefined" ? SNACK_IDEAS : []).forEach(s => cands.push({name: s.name, amount: s.amount, kcal: s.kcal, p: s.p, c: s.c, f: s.f, src: "curated snacks"}));
  const roomK = remK > 0 ? remK + 60 : 400;
  const fit = cands.filter(x => x.kcal <= roomK);
  const wantProtein = remP >= 15;
  fit.sort((a, b) => wantProtein ? (b.p - a.p) : (Math.abs(a.kcal - roomK / 2) - Math.abs(b.kcal - roomK / 2)));
  const seen = new Set(), out = [];
  for (const x of fit){
    const k = x.name.toLowerCase(); if (seen.has(k)) continue; seen.add(k);
    out.push({name: x.name, amount: x.amount, kcal: x.kcal, p: x.p, c: x.c, f: x.f,
      why: `Fits your remaining room — offline pick from ${x.src}.`});
    if (out.length >= 4) break;
  }
  return out;
}

async function findMacros(){
  // Be forgiving about which field the food went in: if "Food name" is empty
  // but the user typed something in "Amount eaten", treat that as the food.
  const nameField = foodForm.name.trim();
  const amtField = foodForm.amount.trim();
  const name = nameField || amtField;
  if (!name){ toast("Type what you ate first."); return; }
  // Only treat the amount field as a quantity when it's separate from the food name.
  const userAmount = nameField ? amtField : "";
  if (!S.settings.apiKey){ toast("Add your API key in Settings first."); return; }
  findBusy = true; render();
  try {
    const txt = await llmJsonCall(`You are MIRA's nutrition lookup with broad food knowledge across cuisines: Gulf/Khaleeji (machboos/majboos, harees, jireesh, balaleet, luqaimat, thareed, madhrooba, gabout, khubz), Levantine (mansaf, mujadara, tabbouleh, fattoush, kibbeh, shawarma, manakish, labneh), Egyptian (koshari, ful medames, ta'meya, molokhia), Iraqi/Yemeni/North-African, and the full range of international foods — Western, Indian/South-Asian, East & Southeast Asian, Mediterranean, Latin, fast food and packaged products. Understand Arabic script AND transliteration, and account for cooking method (مشوي grilled / مقلي fried / مسلوق boiled / محشي stuffed / roasted). For a dish, reconstruct from its typical ingredients; for a combination the user names (e.g. "dates + walnuts"), sum the components.
IMPORTANT — coverage: almost every real, identifiable food HAS a reasonable, useful macro estimate from standard food-composition data (USDA, McCance & Widdowson, regional tables). Default to giving a clearly-labelled **"estimate"** for any recognizable food or dish, at a sensible standard serving if no amount is given. Reserve **"unavailable"** ONLY for input that is genuinely unidentifiable (gibberish, not a food) — never refuse a real food just because exact figures aren't published.${S.settings.webSearch ? ` You have web search: for a specific branded/restaurant item, check the venue's or manufacturer's OFFICIALLY published nutrition first, then fall back to an estimate.` : ""} Confidence: "official" ONLY if the venue or manufacturer actually publishes these values${S.settings.webSearch ? " (verified via search or known)" : " and you know them"}; otherwise "estimate". Never invent official figures, but a good estimate is expected and welcome. After any research, end your reply with ONLY a JSON object: {"name":str,"amount":str,"kcal":num,"p":num,"c":num,"f":num,"conf":"official"|"estimate"|"unavailable","note":str(short, includes the basis/serving assumed)}. Energy must be consistent: kcal ≈ 4p+4c+9f.${replyLangNote()}`,
      `Food: ${name}${userAmount ? ` — amount: ${userAmount} (return macros for THIS amount, and echo it back in "amount")` : ""}`,
      1600,
      S.settings.webSearch ? {tools: [{type: "web_search_20250305", name: "web_search", max_uses: 3}]} : undefined);
    let j = tryParseJson(txt);
    // If it refuses a real food, ask once more for an explicit best-effort estimate
    // before giving up — most identifiable foods have a usable composition estimate.
    if (j.conf === "unavailable"){
      try {
        const txt2 = await llmJsonCall(
          `Give your best clearly-labelled ESTIMATE of the macros for the food below from standard food-composition data, at a sensible standard serving. Only answer "unavailable" if this is truly not an identifiable food (gibberish). Reply with ONLY JSON: {"name":str,"amount":str,"kcal":num,"p":num,"c":num,"f":num,"conf":"estimate"|"unavailable","note":str(basis/serving)}. kcal ≈ 4p+4c+9f.${replyLangNote()}`,
          `Food: ${name}${userAmount ? ` — amount: ${userAmount}` : ""}`, 800);
        const j2 = tryParseJson(txt2);
        if (j2 && j2.conf !== "unavailable") j = j2;
      } catch (e) {}
    }
    if (j.conf === "unavailable"){
      reviewItems = null;
      toast(`Couldn't identify "${name.slice(0, 40)}" as a food — check the spelling, or enter the macros yourself.`, 5000);
    } else {
      // Keep the amount the user actually entered (pieces / grams / ml) so it never
      // gets replaced by the model's default serving; fall back to the model's only if empty.
      reviewItems = [{name: j.name || name, amount: userAmount || j.amount || "", kcal: j.kcal, p: j.p, c: j.c, f: j.f,
        conf: j.conf === "official" ? "official" : "estimate", note: j.note || ""}];
    }
  } catch (e) {
    toast(e.status ? e.message : "Couldn't read the macros back — please try again.", 5000);
  }
  findBusy = false; render();
}

/* ---------------- "I cooked this": dish built from ingredients ---------------- */
function dishTotals(){
  const t = {kcal: 0, p: 0, c: 0, f: 0};
  ((dishForm.res && dishForm.res.items) || []).forEach(x => { t.kcal += num(x.kcal); t.p += num(x.p); t.c += num(x.c); t.f += num(x.f); });
  return t;
}
function dishMakes(){ return Math.max(1, num(dishForm.makes) || 1); }
function dishAte(){ return num(dishForm.ate) > 0 ? num(dishForm.ate) : 1; }
function dishPerText(){
  const t = dishTotals(), mk = dishMakes();
  return `${n0(t.kcal / mk)} kcal · ${n1(t.p / mk)}P · ${n1(t.c / mk)}C · ${n1(t.f / mk)}F`;
}
function dishMineText(){
  const t = dishTotals(), mk = dishMakes(), k = dishAte() / mk;
  return `${n1(dishAte())} of ${n0(mk)} — ${n0(t.kcal * k)} kcal · ${n1(t.p * k)}P · ${n1(t.c * k)}C · ${n1(t.f * k)}F`;
}

function dishHTML(){

  const dt = res ? dishTotals() : null;
  return `
  <div class="review-item" style="margin-top:12px">

    <div class="tiny" style="margin-bottom:8px">List what went into the pot — MIRA estimates each ingredient's macros from standard food-composition data, sums the dish, and splits it into servings.</div>

      <div class="dish-line tot"><span>${t("Whole dish")}</span><span>${n0(dt.kcal)} kcal · ${n1(dt.p)}P · ${n1(dt.c)}C · ${n1(dt.f)}F</span></div>
      <div class="dish-line tot"><span>${t("Per serving")}</span><span id="dishPer">${dishPerText()}</span></div>

async function dishMacros(){
  const ings = dishForm.ings.map(g => ({n: (g.n || "").trim(), a: (g.a || "").trim()})).filter(g => g.n);
  if (!ings.length){ toast("Add at least one ingredient first."); return; }
  if (!S.settings.apiKey){ toast("Add your API key in Settings first."); return; }
  dishBusy = true; render();
  try {
    const arr = await llmJsonArray(
      `You are MIRA's home-cooking nutrition analyst. The user cooked a dish and lists the ingredients that went into it. For EACH ingredient, give the macros for the STATED amount using standard food-composition data (USDA, McCance & Widdowson, regional Middle-East tables). You know worldwide and Arab/Gulf cuisines and understand Arabic script, transliteration and kitchen units (tbsp, tsp, cup, حبة, ملعقة, كوب). Rules: amounts are raw/as-purchased unless stated cooked; ALL cooking fat added to the pot counts (for deep-frying, count the typically-absorbed amount and say so in the note); water and cooking losses do not change macros; if an amount is missing, assume a typical amount for this dish and put the assumption in "amount". Reply with ONLY a JSON array, one object per ingredient in the SAME order as given: [{"name":str,"amount":str(amount actually counted),"kcal":num,"p":num,"c":num,"f":num,"note":str(short basis or assumption, may be "")}]. Per item kcal ≈ 4p+4c+9f.${replyLangNote()}`,
      `Dish: ${dishForm.name.trim() || "(unnamed home-cooked dish)"}\nIngredients as they went into the pot:\n${ings.map(g => `- ${g.n}${g.a ? ` — ${g.a}` : ""}`).join("\n")}`,
      Math.min(3000, 500 + ings.length * 140));
    const items = arr.filter(o => o && o.name).map(o => ({name: String(o.name), amount: String(o.amount || ""),
      kcal: num(o.kcal), p: num(o.p), c: num(o.c), f: num(o.f), note: String(o.note || "")}));
    if (!items.length) throw new Error("no items");
    dishForm.res = {items};
  } catch (e) {
    toast(e.status ? e.message : "Couldn't work out the ingredient macros — try again, or simplify the amounts.", 4500);
  }
  dishBusy = false; render();
}

function dishLogPortion(){
  if (!dishForm.res) return;
  const t = dishTotals(), mk = dishMakes(), ate = dishAte(), k = ate / mk;
  reviewItems = [{
    name: dishForm.name.trim() || "Home-cooked dish",
    amount: mk > 1 || ate !== 1 ? `${n1(ate)} of ${n0(mk)} servings` : "whole dish",
    kcal: Math.round(t.kcal * k), p: +(t.p * k).toFixed(1), c: +(t.c * k).toFixed(1), f: +(t.f * k).toFixed(1),
    conf: "estimate",
    note: `Built from ${dishForm.res.items.length} ingredients — whole dish ≈ ${n0(t.kcal)} kcal · ${n1(t.p)}P · ${n1(t.c)}C · ${n1(t.f)}F.`,
  }];
  dishForm.open = false;
  render();
  const z = $("#reviewZone"); if (z) z.scrollIntoView({behavior: "smooth", block: "nearest"});
}

function dishSaveToRecipes(){
  if (!dishForm.res) return;
  const t = dishTotals(), mk = dishMakes();
  saveRecipe({name: dishForm.name.trim() || "Home-cooked dish", servings: mk, tags: ["home-cooked"],
    per: {kcal: Math.round(t.kcal / mk), p: +(t.p / mk).toFixed(1), c: +(t.c / mk).toFixed(1), f: +(t.f / mk).toFixed(1)},
    ingredients: dishForm.res.items.map(x => x.name + (x.amount ? ` — ${x.amount}` : ""))});
  save(); render();
  toast("Saved to your recipe box ✓");
}

// Patch the serving/portion lines in place — a full render() mid-keystroke
// would drop keyboard focus and make the page jump on iOS.
function dishScalePatch(){
  if (!dishForm.res) return;
  const per = $("#dishPer"), mine = $("#dishMine");
  if (per) per.textContent = dishPerText();
  if (mine) mine.textContent = dishMineText();
}

async function scanBarcode(){
  if (!S.settings.apiKey){ toast("Add your API key in Settings first."); return; }
  pickFile(async file => {
    if (file.kind === "pdf"){ toast("Photograph the barcode itself."); return; }
    barcodeBusy = true; render();
    try {
      const txt = await llmJsonCall(
        `Read the retail barcode (EAN-13 / EAN-8 / UPC) in the photo. Reply with ONLY JSON: {"code":"digits"} — or {"code":null} if no barcode is clearly readable. Never guess digits.`,
        [{type: "image", source: {type: "base64", media_type: file.media_type, data: file.data}},
         {type: "text", text: "What are the barcode digits?"}],
        200);
      const code = String(tryParseJson(txt).code || "").replace(/\D/g, "");
      if (!code){ toast("Could not read a barcode in that photo — try a closer, sharper shot."); }
      else {
        const res = await fetch(`https://world.openfoodfacts.org/api/v2/product/${code}.json?fields=product_name,brands,nutriments,serving_size`);
        const j = await res.json();
        if (j.status !== 1 || !j.product){
          toast(`Barcode ${code} isn't in the OpenFoodFacts database — try "Find macros" instead.`, 4800);
        } else {
          const p = j.product, nu = p.nutriments || {};
          const kcal = nu["energy-kcal_100g"] ?? (nu["energy_100g"] ? nu["energy_100g"] / 4.184 : 0);
          reviewItems = [{
            name: [p.brands, p.product_name].filter(Boolean).join(" — ") || `Product ${code}`,
            amount: "100 g", kcal: Math.round(kcal || 0),
            p: nu.proteins_100g ?? 0, c: nu.carbohydrates_100g ?? 0, f: nu.fat_100g ?? 0,
            conf: "official",
            note: `OpenFoodFacts ${code} — per 100 g${p.serving_size ? `; serving ${p.serving_size}` : ""}. Use the portion scaler for your amount.`,
          }];
        }
      }
    } catch (e) { toast("Barcode lookup failed: " + e.message, 4200); }
    barcodeBusy = false; render();
  });
}

async function extractPhoto(){
  if (!S.settings.apiKey){ toast("Add your API key in Settings first."); return; }
  pickFile(async file => {
    extractBusy = true; render();
    try {
      const block = file.kind === "pdf"
        ? {type: "document", source: {type: "base64", media_type: "application/pdf", data: file.data}}
        : {type: "image", source: {type: "base64", media_type: file.media_type, data: file.data}};
      const txt = await llmJsonCall(`You are MIRA's food photo analyst. The image is ONE of these — detect which and act accordingly:
1) A PRINTED NUTRITION LABEL: use its values EXACTLY (conf "official"). The macros MUST correspond to "basis" of "unit": if the label gives values per reference amount, set "basis" to that number and "unit" to g/ml/serving/piece and put the per-basis macros in kcal/p/c/f (per 100 ml → basis 100, unit "ml"). If the package's total net quantity is printed (a 320 ml can, a 200 g bag), set "pkg" to that number in the SAME unit. Never guess a printed value you cannot read.
2) A PHOTO OF ACTUAL FOOD (a plate, dish, snack, drink, meal): identify each food you can see — you know cuisines worldwide, including Gulf/Khaleeji (machboos, harees, luqaimat…), Levantine, Egyptian, pan-Arab and all international foods. Estimate the visible portion size from visual cues (plate/bowl size, cutlery, hand, packaging). For a mixed plate, list each component as its own item (e.g. rice, grilled chicken, salad) so the user can adjust or drop parts. Base macros on standard food-composition data (USDA and regional tables) for the estimated portion — conf "estimate", and state the identified dish and assumed portion in "note". Cooking method matters (grilled vs fried). Estimating from a photo is expected and welcome — do it for any recognizable food; only skip an item you genuinely cannot identify.
3) A MENU, RECEIPT OR APP SCREENSHOT listing foods: extract the items with estimated macros per typical serving (conf "estimate").
Reply with ONLY a JSON array: [{"name":str,"amount":str,"kcal":num,"p":num,"c":num,"f":num,"conf":"official"|"estimate","note":str,"basis":num,"unit":str,"pkg":num}]. Omit basis/unit/pkg for estimated food photos (they are for labels). Energy consistent: kcal ≈ 4p+4c+9f.${replyLangNote()}`,
        [block, {type: "text", text: "Read this image. If it's a nutrition label, extract it exactly with the per-amount basis and package total. If it's a photo of actual food, identify the dishes and estimate portions and macros."}],
        1600);
      let arr;
      try { arr = tryParseJson(txt); }
      catch (e) { arr = salvageObjects(txt).filter(o => o.name); if (!arr.length) throw e; }
      reviewItems = (Array.isArray(arr) ? arr : [arr]).map(j => {
        const it = {name: j.name || "Item", amount: j.amount || "", kcal: j.kcal, p: j.p, c: j.c, f: j.f,
          conf: j.conf === "official" ? "official" : "estimate", note: j.note || ""};
        const basis = num(j.basis), unit = String(j.unit || "").trim().toLowerCase();
        if (basis > 0 && unit){
          it.basis = basis; it.unit = unit; it.pkg = num(j.pkg) || 0;
          it.baseMacros = {kcal: num(j.kcal), p: num(j.p), c: num(j.c), f: num(j.f)};
          it.had = String(basis);
          if (!it.amount) it.amount = basis + " " + unit;
        }
        return it;
      });
      if (!reviewItems.length){ reviewItems = null; toast("Could not read any items from that file."); }
    } catch (e) { toast("Could not read the file: " + e.message, 4000); }
    extractBusy = false; render();
  });
}
</script>

  {n:"Thruster",m:"Olympic",e:"Barbell",c:"Front squat into overhead press in one fluid drive."},
];

/* combined library: built-in + user-added (user entries flagged) */
function libAll(){
  return EXERCISE_LIBRARY.concat(S.exercises.map(x => ({...x, user: true})));
}

/* ---- progress math ---- */
const e1rm = s => num(s.weight) * (1 + num(s.reps) / 30);          // Epley estimate
const woVolume = w => (w.items || []).reduce((a, it) => a + (it.sets || []).reduce((b, s) => b + num(s.reps) * num(s.weight), 0), 0);

/* ---- fitness-app activity import (Garmin / Strava / Polar / Suunto…) ----
   Exported TCX/GPX files are parsed exactly on-device — nothing uploaded.
   Direct account OAuth sync needs a server for API secrets, so it arrives
   with the hosted cloud version; files and screenshots work today. */
function parseTCX(xml){
  const doc = new DOMParser().parseFromString(xml, "text/xml");
  if (doc.querySelector("parsererror")) return null;
  const act = doc.querySelector("Activity"); if (!act) return null;
  const laps = [...act.querySelectorAll("Lap")];
  if (!laps.length) return null;
  const numTxt = (el, sel) => { const n = el.querySelector(sel); return n ? parseFloat(n.textContent) || 0 : 0; };
  let sec = 0, m = 0, kcal = 0, hrSum = 0, hrN = 0;
  laps.forEach(l => {
    sec += numTxt(l, "TotalTimeSeconds"); m += numTxt(l, "DistanceMeters"); kcal += numTxt(l, "Calories");
    const hr = numTxt(l, "AverageHeartRateBpm > Value"); if (hr){ hrSum += hr; hrN++; }
  });
  const start = laps[0].getAttribute("StartTime") || (act.querySelector("Id") || {}).textContent || "";
  return {sport: act.getAttribute("Sport") || "Workout", date: start ? new Date(start).toLocaleDateString("en-CA") : todayStr(),
    min: Math.round(sec / 60), km: +(m / 1000).toFixed(2), kcal: Math.round(kcal), hr: hrN ? Math.round(hrSum / hrN) : 0};
}
function parseGPX(xml){
  const doc = new DOMParser().parseFromString(xml, "text/xml");
  if (doc.querySelector("parsererror")) return null;
  const pts = [...doc.querySelectorAll("trkpt")];
  if (pts.length < 2) return null;
  const times = [...doc.querySelectorAll("trkpt > time")].map(t => new Date(t.textContent).getTime()).filter(t => !isNaN(t));
  const sec = times.length >= 2 ? (Math.max(...times) - Math.min(...times)) / 1000 : 0;
  let m = 0;
  const rad = x => x * Math.PI / 180;
  for (let i = 1; i < pts.length; i++){
    const a = pts[i - 1], b = pts[i];
    const la1 = rad(+a.getAttribute("lat")), lo1 = rad(+a.getAttribute("lon")), la2 = rad(+b.getAttribute("lat")), lo2 = rad(+b.getAttribute("lon"));
    if ([la1, lo1, la2, lo2].some(isNaN)) continue;
    const h = Math.sin((la2 - la1) / 2) ** 2 + Math.cos(la1) * Math.cos(la2) * Math.sin((lo2 - lo1) / 2) ** 2;
    m += 2 * 6371000 * Math.asin(Math.sqrt(h));
  }
  const typeEl = doc.querySelector("trk > type"), nameEl = doc.querySelector("trk > name");
  const kcalEl = doc.querySelector("calories");
  return {sport: (typeEl && typeEl.textContent) || (nameEl && nameEl.textContent) || "Workout",
    date: times.length ? new Date(Math.min(...times)).toLocaleDateString("en-CA") : todayStr(),
    min: Math.round(sec / 60), km: +(m / 1000).toFixed(2), kcal: kcalEl ? Math.round(parseFloat(kcalEl.textContent) || 0) : 0, hr: 0};
}
const sportLabel = s => { s = String(s || "Workout").replace(/_/g, " ").trim(); return s.charAt(0).toUpperCase() + s.slice(1).toLowerCase(); };
function saveCardio(c, source){
  const w = {id: uid(), date: c.date || todayStr(), name: sportLabel(c.sport), items: [], ts: Date.now(),
    cardio: {sport: sportLabel(c.sport), min: num(c.min), km: num(c.km), kcal: num(c.kcal), hr: num(c.hr), source}};
  S.workouts.push(w); save();
  return w;
}

/* ---- Strava account sync (bring-your-own API app, like the Anthropic key) ----
   Every Strava user can create a free personal API application (client id +
   secret) at strava.com/settings/api — same own-credentials model as the rest
   of MIRA, so no MIRA server is involved and tokens stay on this device.
   Garmin, Apple Watch, Polar, Coros etc. can auto-forward activities to
   Strava, so one connection covers most watches. */
function stravaRedirectUri(){ return location.origin + location.pathname; }
function stravaConnected(){ const s = S.settings.strava; return !!(s && s.refresh); }
async function stravaToken(params){
  const s = S.settings.strava || {};
  const body = new URLSearchParams({client_id: s.cid, client_secret: s.secret, ...params});
  const res = await fetch("https://www.strava.com/api/v3/oauth/token", {method: "POST", body});
  if (!res.ok){ let m = "Strava auth failed (" + res.status + ")"; try { const j = await res.json(); if (j.message) m = "Strava: " + j.message; } catch (e) {} throw new Error(m); }
  return res.json();
}
async function stravaAccess(){
  const s = S.settings.strava;
  if (!s || !s.refresh) throw new Error("Strava is not connected.");
  if (s.access && s.exp && s.exp * 1000 > Date.now() + 60000) return s.access;
  const j = await stravaToken({grant_type: "refresh_token", refresh_token: s.refresh});
  s.access = j.access_token; s.refresh = j.refresh_token || s.refresh; s.exp = j.expires_at; save();
  return s.access;
}
// Exchange the OAuth code Strava redirected back with, then run a first sync.
async function stravaExchange(code){
  const j = await stravaToken({grant_type: "authorization_code", code});
  const s = S.settings.strava;
  s.access = j.access_token; s.refresh = j.refresh_token; s.exp = j.expires_at;
  s.athlete = j.athlete ? [j.athlete.firstname, j.athlete.lastname].filter(Boolean).join(" ") : "";
  s.lastSync = 0; save();
}
async function stravaSyncNow(){
  const token = await stravaAccess();
  const s = S.settings.strava;
  const after = s.lastSync ? Math.floor(s.lastSync / 1000) - 86400 : Math.floor(Date.now() / 1000) - 30 * 86400;
  const res = await fetch(`https://www.strava.com/api/v3/athlete/activities?per_page=50&after=${after}`, {headers: {Authorization: "Bearer " + token}});
  if (!res.ok) throw new Error("Strava sync failed (" + res.status + ")");
  const acts = await res.json();
  let added = 0;
  (Array.isArray(acts) ? acts : []).forEach(a => {
    if (!a || !a.id) return;
    if (S.workouts.some(w => w.cardio && w.cardio.stravaId === a.id)) return;
    const c = {sport: a.sport_type || a.type || "Workout",
      date: String(a.start_date_local || a.start_date || "").slice(0, 10) || todayStr(),
      min: Math.round(num(a.moving_time) / 60), km: +(num(a.distance) / 1000).toFixed(2),
      kcal: Math.round(num(a.calories) || (num(a.kilojoules) ? a.kilojoules * 1.05 : 0)),
      hr: Math.round(num(a.average_heartrate))};
    const w = saveCardio(c, "Strava");
    w.cardio.stravaId = a.id;
    if (a.name) w.name = a.name;
    added++;
  });
  s.lastSync = Date.now(); save();
  return added;
}
function bestE1RM(name, filter){
  let best = 0;
  for (const w of S.workouts){
    if (filter && !filter(w)) continue;
    for (const it of w.items){
      if (it.name !== name) continue;
      for (const s of it.sets) best = Math.max(best, e1rm(s));
    }
  }
  return best;
}
/* most recent prior session's sets for an exercise — progressive-overload hint */
function lastPerf(name){
  const prev = S.workouts.filter(w => w.items.some(it => it.name === name)).sort((a, b) => b.ts - a.ts)[0];
  if (!prev) return "";
  return prev.items.find(it => it.name === name).sets.map(s => `${n1(s.weight)}×${s.reps}`).join(", ");
}

/* ---- rest timer (updates its own DOM node without a full re-render) ---- */
let restIv = null, restEnd = 0, restTotal = 0;
const restRemaining = () => Math.max(0, Math.ceil((restEnd - Date.now()) / 1000));
const restRunning = () => restEnd > Date.now();
const fmtClock = s => Math.floor(s / 60) + ":" + String(s % 60).padStart(2, "0");
function startRest(sec){
  if (!sec || sec <= 0) return;
  restTotal = sec; restEnd = Date.now() + sec * 1000;
  clearInterval(restIv);
  render();
  restIv = setInterval(() => {
    const rem = restRemaining();
    const t = document.getElementById("restTime"), f = document.getElementById("restFill");
    if (t) t.textContent = fmtClock(rem);
    if (f) f.style.width = (100 * (1 - rem / restTotal)) + "%";
    if (rem <= 0){ clearInterval(restIv); restIv = null; restEnd = 0; buzz(220); toast("Rest done — next set."); render(); }
  }, 250);
}
function stopRest(){ clearInterval(restIv); restIv = null; restEnd = 0; render(); }

/* ---- plate calculator (per side, 20 kg Olympic bar) ---- */
function plateBreak(total){
  let per = (total - 20) / 2;
  if (per < 0) return null;
  const out = [];
  [25, 20, 15, 10, 5, 2.5, 1.25].forEach(p => { while (per >= p - 1e-9){ out.push(p); per = Math.round((per - p) * 100) / 100; } });
  return {out, leftover: per};
}
function plateHTML(){
  const w = num((document.getElementById("plateW") || {}).value);
  let body = `<div class="tiny">Enter your target total weight; plates shown per side of a 20 kg bar.</div>`;
  if (w >= 20){
    const b = plateBreak(w);
    body = b.out.length
      ? `<div style="margin-top:6px">Per side: <b>${b.out.map(p => p + "kg").join(" + ")}</b>${b.leftover > 0.01 ? ` <span class="tiny">(+${n1(b.leftover)} kg unmatched)</span>` : ""}</div>`
      : `<div class="tiny" style="margin-top:6px">Just the bar (20 kg).</div>`;
  } else if (w > 0) body = `<div class="tiny" style="margin-top:6px">Less than the bar (20 kg).</div>`;
  return `<div class="card">
    <div class="row"><input id="plateW" type="number" inputmode="decimal" placeholder="Total kg (e.g. 100)" oninput="render()">
      <button class="btn sm sec" style="flex:0 0 auto" onclick="R.plateOpen=false;render()">Close</button></div>
    ${body}
  </div>`;
}

function progChartHTML(name){
  const pts = S.workouts.filter(w => w.items.some(it => it.name === name))
    .sort((a, b) => a.ts - b.ts)
    .map(w => ({d: w.date, v: Math.max(...w.items.filter(it => it.name === name).flatMap(it => it.sets.map(e1rm)), 0)}))
    .filter(p => p.v > 0);
  if (pts.length < 2) return `<div class="tiny" style="margin-top:8px">Log this exercise on two or more days to see the trend. Best est. 1RM so far: <b>${pts.length ? n1(pts[0].v) : 0} kg</b>.</div>`;
  const vs = pts.map(p => p.v), min = Math.min(...vs), max = Math.max(...vs), span = Math.max(max - min, 0.5);
  const W = 150, H = 40;
  const xy = vs.map((v, i) => `${(i / (vs.length - 1)) * (W - 8) + 4},${H - 6 - ((v - min) / span) * (H - 12)}`);
  const pr = Math.max(...vs);
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:54px;display:block;margin:8px 0 2px">

    <div class="tiny">Est. 1RM ${n1(vs[0])} → <b>${n1(vs[vs.length - 1])} kg</b> · best <b>${n1(pr)} kg</b></div>`;

/* ---- coach report text ---- */
function coachReport(days){
  const since = new Date(Date.now() - (days - 1) * 864e5).toLocaleDateString("en-CA");
  const ws = S.workouts.filter(w => w.date >= since).sort((a, b) => a.ts - b.ts);
  const tg = S.settings.targets;
  const who = S.settings.name || "Client";
  const coach = (S.settings.coach && S.settings.coach.name) ? S.settings.coach.name : "Coach";
  const L = [];
  L.push(`MIRA — progress report`);
  L.push(`For: ${coach}`);
  L.push(`Client: ${who}`);
  L.push(`Period: last ${days} days (${since} → ${todayStr()})`);
  L.push("");
  L.push(`TRAINING`);
  L.push(`Workouts completed: ${ws.length}`);
  if (ws.length){
    L.push(`Total volume: ${n0(ws.reduce((a, w) => a + woVolume(w), 0))} kg`);
    const names = [...new Set(ws.flatMap(w => w.items.map(it => it.name)))];
    const prs = [];
    names.forEach(nm => {
      const inP = bestE1RM(nm, w => w.date >= since);
      const before = bestE1RM(nm, w => w.date < since);
      if (inP > 0 && inP > before) prs.push(`  • ${nm}: est. 1RM ${n1(inP)} kg${before > 0 ? ` (was ${n1(before)})` : " (first record)"}`);
    });
    if (prs.length){ L.push(""); L.push(`New bests:`); prs.slice(0, 10).forEach(p => L.push(p)); }
    L.push("");
    L.push(`Sessions:`);
    ws.forEach(w => L.push(`  • ${w.date} — ${w.name}: ${w.items.map(it => `${it.name} ${it.sets.length}×`).join(", ") || "—"}`));
  }
  L.push("");
  L.push(`NUTRITION`);
  const dl = [];
  for (let k = 0; k < days; k++){ const d = new Date(Date.now() - k * 864e5).toLocaleDateString("en-CA"); const t = dayTotals(d); if (t.kcal > 0) dl.push(t); }
  if (dl.length){
    const avg = a => a.reduce((x, y) => x + y, 0) / a.length;
    L.push(`Days logged: ${dl.length}/${days}`);
    L.push(`Average: ${n0(avg(dl.map(t => t.kcal)))} kcal, ${n1(avg(dl.map(t => t.p)))} g protein/day`);
    if (tg.kcal){
      const onT = dl.filter(t => t.kcal >= tg.kcal * 0.9 && t.kcal <= tg.kcal * 1.1).length;
      L.push(`Target ${tg.kcal} kcal / ${tg.protein} g protein — on target ${onT}/${dl.length} logged days`);
    }
  } else L.push(`No food logged in this period.`);
  const wl = S.inbody.filter(e => e.weight && e.date >= since).sort((a, b) => a.date < b.date ? -1 : 1);
  if (wl.length >= 2){
    L.push("");
    L.push(`BODY`);
    L.push(`Weight: ${n1(+wl[0].weight)} → ${n1(+wl[wl.length - 1].weight)} kg (${(+wl[wl.length - 1].weight - +wl[0].weight > 0 ? "+" : "")}${n1(+wl[wl.length - 1].weight - +wl[0].weight)} kg)`);
  }
  L.push("");
  L.push(`— Generated by MIRA on ${new Date().toLocaleDateString("en-GB")}`);
  return L.join("\n");
}

<script>

/* ---- helpers ---- */
function suppTakenSet(date){ return new Set(S.suppLog[date] || []); }
function suppAdherence(days){
  if (!S.supplements.length) return null;
  let taken = 0, total = 0;
  for (let k = 0; k < days; k++){
    const d = new Date(Date.now() - k * 864e5).toLocaleDateString("en-CA");
    const set = suppTakenSet(d);
    total += S.supplements.length;
    S.supplements.forEach(s => { if (set.has(s.id)) taken++; });
  }
  return total ? Math.round((taken / total) * 100) : 0;
}
function sleepRecent(n){ return [...S.sleep].sort((a, b) => a.date < b.date ? -1 : 1).slice(-n); }
function sleepAvg(days){
  const since = new Date(Date.now() - (days - 1) * 864e5).toLocaleDateString("en-CA");
  const es = S.sleep.filter(e => e.date >= since);
  if (!es.length) return null;
  const avg = a => a.reduce((x, y) => x + y, 0) / a.length;
  return {h: avg(es.map(e => num(e.hours))), q: avg(es.map(e => num(e.quality || 0))), n: es.length};

function habitStreak(id){
  let n = 0;

}
function habitDoneToday(id){ return (S.habitLog[todayStr()] || []).includes(id); }

function fmtDur(s){ const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = Math.floor(s % 60); return `${h}:${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}`; }
function ensureFastTimer(){

const RECIPE_TAG_LABELS = {"high-protein": "High-protein", "low-carb": "Low-carb", "vegetarian": "Vegetarian", "vegan": "Vegan", "quick": "Quick", "arab": "Arab/GCC", "breakfast": "Breakfast", "salad": "Salad", "treat": "Treat", "gluten-free": "Gluten-free", "high-fibre": "High-fibre", "fibre": "Fibre", "healthy-fats": "Healthy fats", "gcc": "GCC", "low-cal": "Low-calorie"};
function tagLabel(t){ return RECIPE_TAG_LABELS[t] || (t.charAt(0).toUpperCase() + t.slice(1)); }
// Meal categories the recipe box is organised by
const RECIPE_CATS = [["all", "All"], ["breakfast", "Breakfast"], ["main", "Lunch / Dinner"], ["salad", "Salads"], ["snack", "Snacks"], ["sweet", "Sweets"], ["drink", "Drinks"]];
const MEAL_LABELS = {breakfast: "Breakfast", main: "Lunch / Dinner", salad: "Salad", snack: "Snack", sweet: "Sweet", drink: "Drink"};
function recipeFilters(){ return RECIPE_CATS; }
// Map any AI/user-supplied meal word (or infer from tags) to one of our categories
function normMeal(m, tags){
  m = String(m || "").toLowerCase().trim();
  const map = {breakfast: "breakfast", brunch: "breakfast", main: "main", lunch: "main", dinner: "main",
    "lunch/dinner": "main", "lunch / dinner": "main", entree: "main", "entrée": "main", soup: "main", stew: "main",
    salad: "salad", snack: "snack", appetizer: "snack", appetiser: "snack", starter: "snack", side: "snack", dip: "snack",
    dessert: "sweet", sweet: "sweet", treat: "sweet", drink: "drink", beverage: "drink", smoothie: "drink", juice: "drink"};
  if (map[m]) return map[m];
  const t = (Array.isArray(tags) ? tags : []).map(x => String(x).toLowerCase());
  if (t.includes("breakfast")) return "breakfast";
  if (t.includes("salad")) return "salad";
  if (t.includes("dessert") || t.includes("sweet") || t.includes("treat")) return "sweet";
  if (t.includes("snack")) return "snack";
  if (t.includes("drink") || t.includes("smoothie")) return "drink";
  return "main";
}
function normTags(t){
  let arr = Array.isArray(t) ? t : String(t || "").split(",");
  return [...new Set(arr.map(x => String(x).trim().toLowerCase().replace(/\s+/g, "-")).filter(Boolean))].slice(0, 6);
}
