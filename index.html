<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>MIRA — Integrated Reasoning Assistant</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="MIRA">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0B0D12">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230B0D12'/><text x='50' y='67' font-size='52' text-anchor='middle' fill='%23D4A94E' font-family='sans-serif' font-weight='bold'>M</text></svg>">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230B0D12'/><text x='50' y='67' font-size='52' text-anchor='middle' fill='%23D4A94E' font-family='sans-serif' font-weight='bold'>M</text></svg>">
<link rel="manifest" href='data:application/manifest+json,{"name":"MIRA","short_name":"MIRA","display":"standalone","start_url":".","background_color":"%230B0D12","theme_color":"%230B0D12","icons":[{"src":"data:image/svg+xml,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27><rect width=%27100%27 height=%27100%27 rx=%2722%27 fill=%27%230B0D12%27/><text x=%2750%27 y=%2767%27 font-size=%2752%27 text-anchor=%27middle%27 fill=%27%23D4A94E%27 font-family=%27sans-serif%27 font-weight=%27bold%27>M</text></svg>","sizes":"any","type":"image/svg+xml"}]}'>
<style>
:root{
  --bg:#0B0D12; --bg2:#10131B; --card:#161A24; --card2:#1C212E;
  --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.14);
  --txt:#E8EAF0; --txt2:#9AA3B5; --txt3:#5F6879;
  --gold:#D4A94E;
  --acc:#D4A94E; --acc-soft:rgba(212,169,78,.14);
  --green:#34C48E; --amber:#E8A33D; --red:#E85757;
  --radius:14px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  font-size:16px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%;background:var(--bg)}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans","Noto Sans Arabic",sans-serif;
  color:var(--txt); line-height:1.5; overscroll-behavior-y:none;
  -webkit-font-smoothing:antialiased;
}
input,select,textarea,button{font:inherit;color:inherit}
button{cursor:pointer;border:none;background:none;padding:0}
a{color:var(--acc)}
::placeholder{color:var(--txt3)}
input,select,textarea{
  background:var(--bg2);border:1px solid var(--line);border-radius:10px;
  padding:11px 12px;width:100%;outline:none;min-height:44px;
}
input:focus,select:focus,textarea:focus{border-color:var(--acc)}
select{appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8'><path d='M1 1l5 5 5-5' stroke='%239AA3B5' stroke-width='2' fill='none' stroke-linecap='round'/></svg>");background-repeat:no-repeat;background-position:right 12px center;padding-right:34px}
h1,h2,h3,h4{margin:0;font-weight:600}
.hidden{display:none!important}
.svgi{stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;vertical-align:-3px;flex:0 0 auto}

/* ---------- layout shell ---------- */
#app{height:100%;display:flex;flex-direction:column}
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:40;
  padding:calc(var(--safe-top) + 10px) 16px 10px;
  background:rgba(11,13,18,.85);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:10px;
}
.topbar .brand{font-size:19px;font-weight:700;letter-spacing:.14em;color:var(--gold)}
.topbar .sub{font-size:12px;color:var(--txt2);margin-inline-start:auto;display:flex;align-items:center;gap:6px}
.mode-dot{width:8px;height:8px;border-radius:50%;background:var(--acc)}
.content{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:calc(var(--safe-top) + 58px) 14px calc(var(--safe-bot) + 78px);
}
.tabbar{
  position:fixed;bottom:0;left:0;right:0;z-index:40;
  display:flex;justify-content:space-around;
  padding:6px 8px calc(var(--safe-bot) + 6px);
  background:rgba(11,13,18,.9);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-top:1px solid var(--line);
}
.tabbar button{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:6px 0;color:var(--txt3);font-size:11px;font-weight:500;border-radius:10px;min-height:48px;
}
.tabbar button svg{margin-bottom:1px}
.tabbar button.on{color:var(--acc)}

/* ---------- lock screen ---------- */
.lock{
  position:fixed;inset:0;z-index:100;background:radial-gradient(120% 90% at 50% 0%,#141927 0%,var(--bg) 60%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;
  padding:calc(var(--safe-top) + 20px) 20px calc(var(--safe-bot) + 30px);
  transition:opacity .45s ease,transform .45s ease;
}
.lock.open{opacity:0;transform:scale(1.06);pointer-events:none}
.lock .logo{font-size:34px;font-weight:700;letter-spacing:.3em;color:var(--gold);text-indent:.3em}
.lock .hint{color:var(--txt2);font-size:14px}
.pin-dots{display:flex;gap:16px;height:18px}
.pin-dots i{
  width:14px;height:14px;border-radius:50%;border:1.5px solid var(--txt3);
  transition:all .18s cubic-bezier(.34,1.56,.64,1);
}
.pin-dots i.f{background:var(--gold);border-color:var(--gold);transform:scale(1.25);box-shadow:0 0 12px rgba(212,169,78,.5)}
.pin-dots.err{animation:shake .4s}
@keyframes shake{20%{transform:translateX(-9px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(4px)}}
.keypad{display:grid;grid-template-columns:repeat(3,76px);gap:14px}
.keypad button{
  height:76px;border-radius:50%;background:rgba(255,255,255,.05);border:1px solid var(--line);
  font-size:26px;font-weight:500;color:var(--txt);transition:background .12s,transform .12s;
}
.keypad button:active{background:rgba(212,169,78,.25);transform:scale(.94)}
.keypad button.ghost{background:none;border:none;font-size:15px;color:var(--txt2)}

/* ---------- onboarding ---------- */
.onb{max-width:560px;margin:0 auto;padding:28px 6px 40px}
.onb .logo{font-size:30px;font-weight:700;letter-spacing:.26em;color:var(--gold);text-align:center;margin:18px 0 4px;text-indent:.26em}
.onb .tag{text-align:center;color:var(--txt2);font-size:14px;margin-bottom:26px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--txt2);margin-bottom:6px;letter-spacing:.02em}
.seg{display:flex;gap:8px;flex-wrap:wrap}
.seg button{
  flex:1;min-height:44px;padding:9px 12px;border-radius:10px;border:1px solid var(--line);
  background:var(--bg2);color:var(--txt2);font-size:14px;white-space:nowrap;
}
.seg button.on{border-color:var(--acc);color:var(--txt);background:var(--acc-soft)}

/* ---------- common ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.card h3{font-size:15px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  min-height:46px;padding:11px 18px;border-radius:12px;font-weight:600;font-size:15px;
  background:var(--acc);color:#0B0D12;transition:filter .12s,transform .12s;width:100%;
}
.btn:active{transform:scale(.98);filter:brightness(1.1)}
.btn.sec{background:var(--card2);color:var(--txt);border:1px solid var(--line2)}
.btn.sm{min-height:38px;padding:7px 13px;font-size:13.5px;width:auto;border-radius:10px}
.btn.danger{background:rgba(232,87,87,.15);color:var(--red);border:1px solid rgba(232,87,87,.35)}
.btn[disabled]{opacity:.45;pointer-events:none}
.row{display:flex;gap:10px;align-items:center}
.row>*{flex:1}
.muted{color:var(--txt2);font-size:13px}
.tiny{color:var(--txt3);font-size:12px}
.badge{
  display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.03em;
  background:var(--acc-soft);color:var(--acc);vertical-align:middle;
}
.badge.official{background:rgba(52,196,142,.15);color:var(--green)}
.badge.estimate{background:rgba(232,163,61,.15);color:var(--amber)}
.badge.user{background:rgba(91,141,239,.15);color:#5B8DEF}
.toast{
  position:fixed;left:50%;bottom:calc(var(--safe-bot) + 92px);transform:translateX(-50%) translateY(20px);
  background:var(--card2);border:1px solid var(--line2);color:var(--txt);
  padding:10px 18px;border-radius:12px;font-size:14px;z-index:90;opacity:0;
  transition:all .3s;max-width:88vw;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.5);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ---------- chat ---------- */
.mode-row{display:flex;gap:8px;overflow-x:auto;padding:2px 0 10px;scrollbar-width:none}
.mode-row::-webkit-scrollbar{display:none}
.mode-chip{
  display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:22px;white-space:nowrap;
  background:var(--bg2);border:1px solid var(--line);color:var(--txt2);font-size:14px;font-weight:500;min-height:40px;
}
.mode-chip.on{border-color:var(--mc);color:var(--txt);background:color-mix(in srgb,var(--mc) 16%,transparent)}
.mode-chip .d{width:8px;height:8px;border-radius:50%;background:var(--mc)}
.msgs{display:flex;flex-direction:column;gap:12px;padding-bottom:8px}
.msg{max-width:88%;padding:11px 14px;border-radius:16px;font-size:15px;overflow-wrap:break-word;word-break:break-word}
.msg.user{align-self:flex-end;background:var(--acc-soft);border:1px solid color-mix(in srgb,var(--acc) 35%,transparent);border-bottom-right-radius:5px;white-space:pre-wrap}
.msg.mira{align-self:flex-start;background:var(--card);border:1px solid var(--line);border-bottom-left-radius:5px}
.msg.mira .who{font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--acc);margin-bottom:4px}
.msg.mira p{margin:.4em 0}
.msg.mira p:first-child{margin-top:0}.msg.mira p:last-child{margin-bottom:0}
.msg.mira ul,.msg.mira ol{margin:.4em 0;padding-inline-start:1.3em}
.msg.mira li{margin:.18em 0}
.msg.mira h1,.msg.mira h2,.msg.mira h3{font-size:1.02em;margin:.7em 0 .3em;color:var(--acc)}
.msg.mira code{background:rgba(255,255,255,.08);padding:1px 5px;border-radius:5px;font-size:.9em;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
.msg.mira pre{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:10px;overflow-x:auto;font-size:.85em}
.msg.mira pre code{background:none;padding:0}
.msg.mira blockquote{margin:.4em 0;padding:.2em .9em;border-inline-start:3px solid var(--acc);color:var(--txt2)}
.msg.mira table{border-collapse:collapse;margin:.5em 0;font-size:.92em;display:block;overflow-x:auto;max-width:100%}
.msg.mira th,.msg.mira td{border:1px solid var(--line2);padding:5px 9px;text-align:start}
.msg .att{font-size:12px;color:var(--txt3);margin-top:5px}
.typing{display:inline-flex;gap:4px;padding:4px 0}
.typing i{width:7px;height:7px;border-radius:50%;background:var(--txt3);animation:blink 1.2s infinite}
.typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.25}40%{opacity:1}}
.suggest{display:flex;flex-direction:column;gap:8px;margin:14px 0}
.suggest button{
  text-align:start;padding:12px 14px;border-radius:12px;background:var(--card);border:1px solid var(--line);
  color:var(--txt2);font-size:14px;min-height:46px;
}
.chatbar{
  position:fixed;left:0;right:0;bottom:calc(var(--safe-bot) + 64px);z-index:39;
  padding:8px 12px;background:linear-gradient(transparent,var(--bg) 30%);
}
.chatbar .inner{
  display:flex;align-items:flex-end;gap:8px;background:var(--card2);
  border:1px solid var(--line2);border-radius:22px;padding:7px 8px 7px 6px;
  box-shadow:0 6px 24px rgba(0,0,0,.4);
}
.chatbar textarea{
  flex:1;background:none;border:none;resize:none;max-height:120px;min-height:30px;
  padding:5px 4px;line-height:1.4;
}
.icon-btn{
  width:40px;height:40px;min-width:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:19px;color:var(--txt2);background:transparent;transition:background .12s;
}
.icon-btn:active{background:rgba(255,255,255,.08)}
.icon-btn.send{background:var(--acc);color:#0B0D12}
.icon-btn.ds.on{color:var(--acc);background:var(--acc-soft)}
.ds-note{font-size:11.5px;color:var(--acc);text-align:center;padding:3px 0 0}
.attach-pill{
  display:inline-flex;align-items:center;gap:7px;background:var(--acc-soft);border:1px solid color-mix(in srgb,var(--acc) 30%,transparent);
  border-radius:10px;padding:5px 10px;font-size:12.5px;color:var(--txt);margin:0 12px 6px;
}
.attach-pill b{max-width:46vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}

/* ---------- nutrition ---------- */
.bars{display:flex;flex-direction:column;gap:10px}
.bar-line{display:flex;flex-direction:column;gap:4px}
.bar-top{display:flex;justify-content:space-between;font-size:13px}
.bar-top .lab{font-weight:600}
.bar-top .val{color:var(--txt2)}
.bar{height:9px;border-radius:6px;background:var(--bg2);overflow:hidden}
.bar i{display:block;height:100%;border-radius:6px;background:var(--acc);width:0;transition:width .5s ease,background .3s}
.bar-line.done .bar i{background:var(--green)}
.bar-line.over .bar i{background:var(--amber)}
.bar-top .st{font-weight:700}
.bar-line.done .st{color:var(--green)}
.bar-line.over .st{color:var(--amber)}
.glasses{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 8px}
.glass{
  width:40px;height:48px;border-radius:7px 7px 11px 11px;border:1.5px solid var(--line2);
  background:var(--bg2);display:flex;align-items:center;justify-content:center;
  transition:all .15s;color:transparent;
}
.glass.f{border-color:#4BA3E3;background:linear-gradient(180deg,rgba(75,163,227,.15) 0%,rgba(75,163,227,.45) 100%);color:#BEE3FF}
.day-group{margin-bottom:12px}
.day-head{
  display:flex;align-items:center;gap:8px;width:100%;padding:12px 14px;min-height:48px;
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);color:var(--txt);
}
.day-head .dt{font-weight:600;font-size:14px}
.day-head .sum{margin-inline-start:auto;font-size:12.5px;color:var(--txt2);text-align:end}
.day-head .chev{color:var(--txt3);transition:transform .2s;font-size:12px}
.day-group.openday .day-head{border-bottom-left-radius:0;border-bottom-right-radius:0}
.day-group.openday .chev{transform:rotate(90deg)}
.day-items{border:1px solid var(--line);border-top:none;border-radius:0 0 var(--radius) var(--radius);background:var(--bg2);overflow:hidden}
.food-it{display:flex;align-items:center;gap:10px;padding:10px 14px;border-top:1px solid var(--line)}
.food-it:first-child{border-top:none}
.food-it .nm{font-size:14.5px;font-weight:500}
.food-it .meta{font-size:12px;color:var(--txt2)}
.food-it .del{margin-inline-start:auto;color:var(--txt3);font-size:17px;min-width:38px;min-height:38px;display:flex;align-items:center;justify-content:center;border-radius:9px}
.food-it .del:active{background:rgba(232,87,87,.15);color:var(--red)}
.ac-wrap{position:relative}
.ac-list{
  position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:30;background:var(--card2);
  border:1px solid var(--line2);border-radius:12px;overflow:hidden;max-height:230px;overflow-y:auto;
  box-shadow:0 10px 30px rgba(0,0,0,.55);
}
.ac-list button{display:flex;justify-content:space-between;gap:10px;width:100%;padding:11px 13px;text-align:start;color:var(--txt);font-size:14px;border-top:1px solid var(--line)}
.ac-list button:first-child{border-top:none}
.ac-list button:active{background:var(--acc-soft)}
.ac-list .m{color:var(--txt2);font-size:12px;white-space:nowrap}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.grid4 .field,.grid2 .field{margin-bottom:0}
.review-item{background:var(--bg2);border:1px solid var(--line2);border-radius:12px;padding:12px;margin-bottom:10px}
.review-item .warn{color:var(--amber);font-size:12.5px;margin-top:6px}
.review-item .err{color:var(--red);font-size:12.5px;margin-top:6px}
.fold>h3{cursor:pointer;user-select:none;margin-bottom:0}
.fold>h3 .chev{margin-inline-start:auto;color:var(--txt3);transition:transform .2s;font-size:12px}
.fold.open>h3{margin-bottom:10px}
.fold.open>h3 .chev{transform:rotate(90deg)}
.fold>.fold-body{display:none}
.fold.open>.fold-body{display:block}

/* ---------- body comp ---------- */
.ib-entry{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:13px 14px;margin-bottom:10px}
.ib-entry .hd{display:flex;align-items:center;margin-bottom:8px}
.ib-entry .hd .d{font-weight:600;font-size:14px}
.ib-entry .hd .del{margin-inline-start:auto;color:var(--txt3);min-width:38px;min-height:38px;display:flex;align-items:center;justify-content:center;border-radius:9px}
.ib-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.ib-cell{background:var(--bg2);border-radius:10px;padding:8px 9px}
.ib-cell .k{font-size:11px;color:var(--txt3);letter-spacing:.02em}
.ib-cell .v{font-size:15.5px;font-weight:600;margin-top:1px}
.ib-cell .dv{font-size:11.5px;font-weight:600;margin-top:1px}
.dv.good{color:var(--green)}.dv.bad{color:var(--amber)}.dv.neu{color:var(--txt2)}

/* ---------- settings ---------- */
.set-row{display:flex;align-items:center;gap:10px;padding:13px 2px;border-top:1px solid var(--line);min-height:52px}
.set-row:first-child{border-top:none}
.set-row .k{font-size:14.5px}
.set-row .desc{font-size:12px;color:var(--txt3)}
.set-row .end{margin-inline-start:auto;display:flex;align-items:center;gap:8px}
.dom-color{width:16px;height:16px;border-radius:50%}
.sheet-mask{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:60;opacity:0;transition:opacity .25s}
.sheet-mask.show{opacity:1}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:61;background:var(--card);
  border-radius:20px 20px 0 0;border:1px solid var(--line2);border-bottom:none;
  padding:16px 16px calc(var(--safe-bot) + 18px);max-height:86vh;overflow-y:auto;
  transform:translateY(105%);transition:transform .3s cubic-bezier(.32,.72,.35,1);
}
.sheet.show{transform:translateY(0)}
.sheet .grab{width:38px;height:4px;border-radius:3px;background:var(--line2);margin:0 auto 14px}
@media(min-width:700px){
  .content{max-width:720px;margin:0 auto;width:100%}
  .chatbar .inner{max-width:696px;margin:0 auto}
  .sheet{max-width:560px;margin:0 auto;left:0;right:0}
}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<input type="file" id="fileImg" accept="image/*,application/pdf" class="hidden">
<input type="file" id="fileBackup" accept=".json,application/json" class="hidden">
<script>
"use strict";
/* ============================================================
   MIRA — My Integrated Reasoning Assistant
   Standalone edition: a single self-contained HTML file.
   All data lives in this browser (localStorage). The assistant
   runs on the user's own Anthropic API key, which never leaves
   this device except to reach the API directly.
   ============================================================ */

/* ---------------- utilities ---------------- */
const $ = s => document.querySelector(s);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
const todayStr = () => new Date().toLocaleDateString("en-CA");
const n1 = v => (Math.round(v * 10) / 10).toLocaleString("en", {maximumFractionDigits: 1});
const n0 = v => Math.round(v).toLocaleString("en");
const num = v => { const x = parseFloat(String(v).replace(/[^\d.\-]/g, "")); return isFinite(x) ? x : 0; };

async function sha256(str){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, "0")).join("");
}

  const t = $("#toast");

}
function fmtDate(d){
  const dt = new Date(d + "T12:00:00");
  const t = todayStr();
  if (d === t) return "Today";

  if (d === y) return "Yesterday";
  return dt.toLocaleDateString("en-GB", {weekday: "short", day: "numeric", month: "short"});
}

function fileToB64(file){
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

  if (dots) dots.innerHTML = [0,1,2,3].map(i => `<i class="${i < R.pending.length ? "f" : ""}"></i>`).join("");
  if (R.pending.length === 4){
    const h = await sha256("mira:" + R.pending);
    if (h === S.settings.pinHash){
      const lock = $("#lock");
      if (lock) lock.classList.add("open");
      setTimeout(() => { R.unlocked = true; R.pending = ""; render(); }, 380);
    } else {
      if (dots){ dots.classList.add("err"); }
      if (navigator.vibrate) navigator.vibrate(120);
      setTimeout(() => { R.pending = ""; render(); }, 420);
    }
  }

/* ---------------- markdown (minimal, safe) ---------------- */
function md(src){
  let s = esc(src);
  // code blocks first
  s = s.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, l, c) => `<pre><code>${c}</code></pre>`);
  // tables
  s = s.replace(/((?:^\|.*\|\s*$\n?)+)/gm, block => {
    const rows = block.trim().split("\n").map(r => r.trim()).filter(r => r.startsWith("|"));
    if (rows.length < 2) return block;
    const cells = r => r.replace(/^\||\|$/g, "").split("|").map(c => c.trim());
    const head = cells(rows[0]);
    const bodyRows = rows.slice(/^\|[\s:\-|]+\|$/.test(rows[1]) ? 2 : 1);
    return `<table><thead><tr>${head.map(h => `<th>${h}</th>`).join("")}</tr></thead><tbody>${
      bodyRows.map(r => `<tr>${cells(r).map(c => `<td>${c}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
  });
  s = s.replace(/^#{1,4}\s+(.+)$/gm, "<h3>$1</h3>");
  s = s.replace(/^&gt;\s?(.+)$/gm, "<blockquote>$1</blockquote>");
  // lists
  s = s.replace(/((?:^[ \t]*[-*•]\s+.+$\n?)+)/gm, b => `<ul>${b.trim().split("\n").map(l => `<li>${l.replace(/^[ \t]*[-*•]\s+/, "")}</li>`).join("")}</ul>`);
  s = s.replace(/((?:^[ \t]*\d+[.)]\s+.+$\n?)+)/gm, b => `<ol>${b.trim().split("\n").map(l => `<li>${l.replace(/^[ \t]*\d+[.)]\s+/, "")}</li>`).join("")}</ol>`);
  // inline
  s = s.replace(/\*\*([^*]+)\*\*/g, "<b>$1</b>");
  s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, "$1<i>$2</i>");
  s = s.replace(/`([^`\n]+)`/g, "<code>$1</code>");
  s = s.replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g, `<a href="$2" target="_blank" rel="noopener">$1</a>`);
  s = s.replace(/(^|[\s(])(https?:\/\/[^\s<)]+)/g, `$1<a href="$2" target="_blank" rel="noopener">$2</a>`);
  // paragraphs
  return s.split(/\n{2,}/).map(p =>
    /^<(h3|ul|ol|pre|table|blockquote)/.test(p.trim()) ? p : `<p>${p.trim().replace(/\n/g, "<br>")}</p>`
  ).join("");
}

/* ---------------- API ---------------- */
async function apiCall(body, onDelta){
  const headers = {
    "content-type": "application/json",
    "x-api-key": S.settings.apiKey,
    "anthropic-version": "2023-06-01",
    "anthropic-dangerous-direct-browser-access": "true",
  };
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST", headers, body: JSON.stringify(body),
  });
  if (!res.ok){
    let msg = `API error ${res.status}`;
    try { msg = (await res.json()).error?.message || msg; } catch (e) {}
    throw new Error(msg);
  }
  if (!body.stream) {
    const j = await res.json();
    return (j.content || []).filter(b => b.type === "text").map(b => b.text).join("");
  }
  const reader = res.body.getReader();
  const dec = new TextDecoder();
  let buf = "", full = "";
  for (;;){
    const {done, value} = await reader.read();
    if (done) break;
    buf += dec.decode(value, {stream: true});
    const lines = buf.split("\n");
    buf = lines.pop();
    for (const line of lines){
      if (!line.startsWith("data:")) continue;
      const data = line.slice(5).trim();
      if (!data || data === "[DONE]") continue;
      try {
        const ev = JSON.parse(data);
        if (ev.type === "content_block_delta" && ev.delta?.text){
          full += ev.delta.text;
          if (onDelta) onDelta(full);
        }
        if (ev.type === "error") throw new Error(ev.error?.message || "stream error");
      } catch (e) { if (e instanceof SyntaxError) continue; throw e; }
    }
  }
  return full;
}

function historyBlocks(msgs){
  // last 20 turns, text only (attachments are sent live once, then noted)
  return msgs.slice(-20).map(m => ({
    role: m.role,

  }));
}

async function sendChat(){
  if (R.busy) return;
  const ta = $("#chatIn");
  const text = (ta ? ta.value : "").trim();
  if (!text && !R.attach) return;
  if (!S.settings.apiKey){ toast("Add your API key in Settings first."); R.tab = "set"; render(); return; }

  if (ta) ta.value = "";
  const dom = curDomain();
  const ds = R.deepSolve;
  const att = R.attach;
  R.attach = null; R.deepSolve = false;
  const msgs = S.chats[dom.id] = S.chats[dom.id] || [];
  msgs.push({role: "user", content: text || "(see attachment)", ts: Date.now(), att: att ? att.name : null});
  save();
  R.busy = true;
  render();

  // build request
  const hist = historyBlocks(msgs.slice(0, -1));
  const userText = (ds ? "[DEEP SOLVE] " : "") + (text || "Please read the attached file and respond in the current mode.");
  let lastContent;
  if (att){
    const block = att.kind === "pdf"
      ? {type: "document", source: {type: "base64", media_type: "application/pdf", data: att.data}}
      : {type: "image", source: {type: "base64", media_type: att.media_type, data: att.data}};
    lastContent = [block, {type: "text", text: userText}];
  } else lastContent = userText;

  const holder = {role: "assistant", content: "", ts: Date.now(), ds};
  msgs.push(holder);
  render();
  const msgsEl = $("#msgs");
  if (msgsEl){
    const el = msgsEl.lastElementChild;
    el.innerHTML = `<div class="who">MIRA${ds ? " · DEEP SOLVE" : ""}</div><div class="typing"><i></i><i></i><i></i></div>`;
  }

  try {
    const full = await apiCall({
      model: S.settings.model, max_tokens: ds ? 8000 : 4000, stream: true,
      system: systemPrompt(dom),
      messages: [...hist, {role: "user", content: lastContent}],
    }, partial => {
      holder.content = partial;
      const msgsEl2 = $("#msgs");
      if (msgsEl2){
        const el = msgsEl2.lastElementChild;
        el.innerHTML = `<div class="who">MIRA${ds ? " · DEEP SOLVE" : ""}</div>${md(partial)}`;
        const c = $("#content");
        if (c && c.scrollHeight - c.scrollTop - c.clientHeight < 300) c.scrollTop = c.scrollHeight;
      }
    });
    holder.content = full || "(no response)";
  } catch (e) {
    holder.content = `**Could not reach the API.** ${e.message}\n\nCheck your key, model and connection in Settings, then try again.`;
  }
  R.busy = false;
  save(); render();
}

function sanity(m){
  const out = {errors: [], warnings: []};
  const has = v => v !== "" && v !== null && v !== undefined && isFinite(+v);
  if (![m.kcal, m.p, m.c, m.f].every(has))
    out.errors.push("All four values (kcal, protein, carbs, fat) must be present — enter 0 where it truly is 0.");
  const kcal = num(m.kcal), p = num(m.p), c = num(m.c), f = num(m.f);
  if ([kcal, p, c, f].some(v => v < 0)) out.errors.push("Negative values are impossible.");
  if (kcal > 6000) out.warnings.push("Over 6,000 kcal for one item — double-check this.");
  const expected = 4 * p + 4 * c + 9 * f;
  if (kcal > 20 && expected > 0){
    const diff = Math.abs(kcal - expected) / Math.max(kcal, expected);
    if (diff > 0.35) out.errors.push(`Energy inconsistent with macros: 4×${n1(p)}P + 4×${n1(c)}C + 9×${n1(f)}F = ${n0(expected)} kcal, but ${n0(kcal)} kcal entered (${n0(diff * 100)}% apart).`);
    else if (diff > 0.18) out.warnings.push(`Energy slightly off macros (expected ≈${n0(expected)} kcal from 4P+4C+9F). Fibre/alcohol/rounding can explain small gaps.`);
  }
  if (kcal > 0 && p > kcal / 3.2) out.errors.push("Protein grams implausibly high for this energy (protein alone would exceed the calories).");
  return out;
}

const stripJson = t => {
  const m = t.match(/```(?:json)?\s*([\s\S]*?)```/);
  const raw = m ? m[1] : t;
  const a = raw.indexOf("["), o = raw.indexOf("{");
  const start = a >= 0 && (o < 0 || a < o) ? a : o;
  return start >= 0 ? raw.slice(start, raw.lastIndexOf(raw[start] === "[" ? "]" : "}") + 1) : raw;
};

  findBusy = true; render();
  try {
    const txt = await apiCall({
      model: S.settings.model, max_tokens: 900,
      system: `You are MIRA's nutrition lookup. Return realistic macro values for the food the user names — including restaurant/café items (Kuwait and GCC venues especially) and pan-Arab dishes in Arabic script or transliteration. Account for cooking method (مشوي grilled / مقلي fried / مسلوق boiled / roasted). Confidence rules: "official" ONLY if the venue or manufacturer actually publishes these values and you know them; "estimate" when reconstructed from standard composition data; "unavailable" when even an estimate would be irresponsible. Never invent official figures. Reply with ONLY a JSON object: {"name":str,"amount":str,"kcal":num,"p":num,"c":num,"f":num,"conf":"official"|"estimate"|"unavailable","note":str(short, includes basis/source)}. Energy must be consistent: kcal ≈ 4p+4c+9f.`,
      messages: [{role: "user", content: `Food: ${name}${foodForm.amount.trim() ? ` — amount: ${foodForm.amount.trim()}` : ""}`}],
    });
    const j = JSON.parse(stripJson(txt));
    if (j.conf === "unavailable"){
      reviewItems = null;
      toast(`Not available: ${j.note || "no responsible estimate exists for this item."}`, 5000);
    } else {
      reviewItems = [{name: j.name || name, amount: j.amount || foodForm.amount, kcal: j.kcal, p: j.p, c: j.c, f: j.f,
        conf: j.conf === "official" ? "official" : "estimate", note: j.note || ""}];
    }
  } catch (e) { toast("Lookup failed: " + e.message, 4000); }
  findBusy = false; render();
}

async function extractPhoto(){
  if (!S.settings.apiKey){ toast("Add your API key in Settings first."); return; }
  pickFile(async file => {
    extractBusy = true; render();
    try {
      const block = file.kind === "pdf"
        ? {type: "document", source: {type: "base64", media_type: "application/pdf", data: file.data}}
        : {type: "image", source: {type: "base64", media_type: file.media_type, data: file.data}};
      const txt = await apiCall({
        model: S.settings.model, max_tokens: 1600,
        system: `You are MIRA's nutrition-label and meal reader. Extract food items with macros from the attached photo or document. If it is a printed nutrition label, use its values EXACTLY (official). If it is a meal photo, estimate portions and macros (estimate) and say the assumed portion in the note. Reply with ONLY a JSON array: [{"name":str,"amount":str,"kcal":num,"p":num,"c":num,"f":num,"conf":"official"|"estimate","note":str}]. Per-serving values unless stated otherwise; note which. Never guess a printed value you cannot read — omit that item and mention it in another item's note if needed.`,
        messages: [{role: "user", content: [block, {type: "text", text: "Extract the food items and macros."}]}],
      });
      const arr = JSON.parse(stripJson(txt));
      reviewItems = (Array.isArray(arr) ? arr : [arr]).map(j => ({
        name: j.name || "Item", amount: j.amount || "", kcal: j.kcal, p: j.p, c: j.c, f: j.f,
        conf: j.conf === "official" ? "official" : "estimate", note: j.note || ""}));
      if (!reviewItems.length){ reviewItems = null; toast("Could not read any items from that file."); }
    } catch (e) { toast("Could not read the file: " + e.message, 4000); }
    extractBusy = false; render();
  });
}
</script>
<script>
"use strict";
/* ---------------- body composition ---------------- */
const IB_METRICS = [
  {k: "weight", label: "Weight",   unit: "kg",  goodDir: 0},
  {k: "score",  label: "InBody score", unit: "", goodDir: 1},
  {k: "bfm",    label: "Body-fat mass", unit: "kg", goodDir: -1},
  {k: "smm",    label: "Muscle mass (SMM)", unit: "kg", goodDir: 1},
  {k: "vfa",    label: "Visceral fat", unit: "cm²", goodDir: -1},
  {k: "pa",     label: "Phase angle", unit: "°", goodDir: 1},
];
const ibForm = {date: "", weight: "", score: "", bfm: "", smm: "", vfa: "", pa: ""};
let ibReview = null, ibBusy = false;

function bodyHTML(){
  const sorted = [...S.inbody].sort((a, b) => a.date < b.date ? -1 : 1);
  return `
  <div class="card">
    <h3>${ic("chart", 16)} InBody log</h3>
    <div class="muted">Each scan is stored with the change from the previous entry per metric. MIRA reads this log live — ask for a trend analysis in Fitness mode any time.</div>
    <div class="row" style="margin-top:10px">
      <button class="btn sm sec" onclick="M.ibPhoto()" ${ibBusy ? "disabled" : ""}>${ibBusy ? "Reading…" : ic("camera", 15) + " Upload result sheet"}</button>
      <button class="btn sm sec" onclick="M.ibAnalyse()">${ic("trend", 15)} Analyse my trend</button>
    </div>
  </div>

  <div class="card">
    <h3>${ic("plus", 16)} Add scan</h3>
    <div class="grid2" style="margin-bottom:10px">
      <div class="field"><label>Date</label><input type="date" value="${esc(ibForm.date || todayStr())}" oninput="ibForm.date=this.value"></div>
      <div class="field"><label>Weight kg</label><input type="number" inputmode="decimal" value="${esc(ibForm.weight)}" oninput="ibForm.weight=this.value"></div>
    </div>
    <div class="grid2" style="margin-bottom:10px">
      <div class="field"><label>InBody score</label><input type="number" inputmode="decimal" value="${esc(ibForm.score)}" oninput="ibForm.score=this.value"></div>
      <div class="field"><label>Body-fat mass kg</label><input type="number" inputmode="decimal" value="${esc(ibForm.bfm)}" oninput="ibForm.bfm=this.value"></div>
    </div>
    <div class="grid2" style="margin-bottom:10px">
      <div class="field"><label>Skeletal-muscle mass kg</label><input type="number" inputmode="decimal" value="${esc(ibForm.smm)}" oninput="ibForm.smm=this.value"></div>
      <div class="field"><label>Visceral-fat area cm²</label><input type="number" inputmode="decimal" value="${esc(ibForm.vfa)}" oninput="ibForm.vfa=this.value"></div>
    </div>
    <div class="grid2" style="margin-bottom:12px">
      <div class="field"><label>Phase angle °</label><input type="number" inputmode="decimal" value="${esc(ibForm.pa)}" oninput="ibForm.pa=this.value"></div>
      <div class="field"><label>&nbsp;</label><button class="btn sm" style="width:100%;min-height:44px" onclick="M.ibSave()">Save scan</button></div>
    </div>
    ${ibReview ? `<div class="review-item">
      <b style="font-size:14px">Review extracted values</b>
      <div class="tiny" style="margin-bottom:8px">Read from your result sheet — check each value before saving. Nothing is ever guessed.</div>
      ${IB_METRICS.map(m => `<div class="row" style="margin-bottom:6px">
        <label style="flex:0 0 150px;font-size:13px;color:var(--txt2)">${m.label}</label>
        <input type="number" inputmode="decimal" value="${esc(ibReview[m.k] ?? "")}" oninput="ibReview.${m.k}=this.value"></div>`).join("")}
      <div class="row" style="margin-bottom:8px">
        <label style="flex:0 0 150px;font-size:13px;color:var(--txt2)">Date</label>
        <input type="date" value="${esc(ibReview.date || todayStr())}" oninput="ibReview.date=this.value"></div>
      <div class="row">
        <button class="btn sm" onclick="M.ibReviewAccept()">Save scan</button>
        <button class="btn sm sec" onclick="ibReview=null;render()">Discard</button>
      </div>
    </div>` : ""}
  </div>

  ${sorted.length ? [...sorted].reverse().map((e, ri) => {
    const idx = sorted.indexOf(e);
    const prev = idx > 0 ? sorted[idx - 1] : null;
    return `<div class="ib-entry">
      <div class="hd"><span class="d">${fmtDate(e.date)} <span class="tiny">${e.date}</span></span>
        <button class="del" onclick="M.ibDel('${e.id}')">✕</button></div>
      <div class="ib-grid">
        ${IB_METRICS.map(m => {
          const v = e[m.k];
          if (v === null || v === undefined || v === "") return `<div class="ib-cell"><div class="k">${m.label}</div><div class="v">—</div></div>`;
          let dv = "";
          if (prev && isFinite(+prev[m.k]) && prev[m.k] !== "" && prev[m.k] !== null){
            const d = +v - +prev[m.k];
            if (Math.abs(d) > 0.001){
              const good = m.goodDir === 0 ? "neu" : (d * m.goodDir > 0 ? "good" : "bad");
              dv = `<div class="dv ${good}">${d > 0 ? "▲" : "▼"} ${n1(Math.abs(d))}</div>`;
            } else dv = `<div class="dv neu">—</div>`;
          }
          return `<div class="ib-cell"><div class="k">${m.label}</div><div class="v">${n1(+v)}${m.unit ? `<span class="tiny"> ${m.unit}</span>` : ""}</div>${dv}</div>`;
        }).join("")}
      </div>
    </div>`;
  }).join("") : `<div class="card"><div class="muted">No scans yet. Add one above or upload an InBody result sheet.</div></div>`}`;
}

function ibSaveEntry(src){
  const vals = {};
  for (const m of IB_METRICS){
    const v = src[m.k];
    vals[m.k] = v === "" || v === null || v === undefined ? null : num(v);
  }
  if (Object.values(vals).every(v => v === null)){ toast("Enter at least one value."); return false; }
  if (vals.weight !== null && (vals.weight < 20 || vals.weight > 400)){ toast("Weight looks impossible — check it."); return false; }
  if (vals.pa !== null && (vals.pa < 1 || vals.pa > 20)){ toast("Phase angle out of plausible range (1–20°)."); return false; }
  S.inbody.push({id: uid(), date: src.date || todayStr(), ...vals});
  save();
  toast("Scan saved ✓");
  return true;
}

async function ibPhoto(){
  if (!S.settings.apiKey){ toast("Add your API key in Settings first."); return; }
  pickFile(async file => {
    ibBusy = true; render();
    try {
      const block = file.kind === "pdf"
        ? {type: "document", source: {type: "base64", media_type: "application/pdf", data: file.data}}
        : {type: "image", source: {type: "base64", media_type: file.media_type, data: file.data}};
      const txt = await apiCall({
        model: S.settings.model, max_tokens: 700,
        system: `You read InBody body-composition result sheets. Extract ONLY values you can actually read — never guess. Reply with ONLY JSON: {"date":"YYYY-MM-DD"|null,"weight":num|null,"score":num|null,"bfm":num|null(body fat mass kg),"smm":num|null(skeletal muscle mass kg),"vfa":num|null(visceral fat area cm²),"pa":num|null(phase angle degrees)}. Use null for anything unreadable or absent.`,
        messages: [{role: "user", content: [block, {type: "text", text: "Extract the InBody values."}]}],
      });
      const j = JSON.parse(stripJson(txt));
      ibReview = {date: j.date || todayStr(), weight: j.weight ?? "", score: j.score ?? "", bfm: j.bfm ?? "", smm: j.smm ?? "", vfa: j.vfa ?? "", pa: j.pa ?? ""};
    } catch (e) { toast("Could not read the sheet: " + e.message, 4000); }
    ibBusy = false; render();
  });
}

/* ---------------- settings ---------------- */
let setDraft = null;
function settingsHTML(){
  const st = S.settings;
  return `
  <div class="card">
    <h3>${ic("user", 16)} Profile</h3>
    <div class="field"><label>Name</label><input value="${esc(st.name)}" oninput="S.settings.name=this.value;save()"></div>
    <div class="field"><label>Coaching style</label>
      <div class="seg">${["direct","balanced","encouraging"].map(v => `<button class="${st.style === v ? "on" : ""}" onclick="M.set('style','${v}')">${v[0].toUpperCase() + v.slice(1)}</button>`).join("")}</div></div>
    <div class="field"><label>Answer depth</label>
      <div class="seg">${["short","balanced","detailed"].map(v => `<button class="${st.depth === v ? "on" : ""}" onclick="M.set('depth','${v}')">${v[0].toUpperCase() + v.slice(1)}</button>`).join("")}</div></div>
    <div class="field"><label>Language</label>
      <div class="seg">${[["match","Match me"],["en","English"],["ar","العربية"]].map(([v,l]) => `<button class="${st.lang === v ? "on" : ""}" onclick="M.set('lang','${v}')">${l}</button>`).join("")}</div></div>
  </div>

  <div class="card">
    <h3>${ic("grid", 16)} Domains</h3>
    ${S.domains.map((d, i) => `<div class="set-row">
      <span class="dom-color" style="background:${d.color}"></span>
      <span class="k">${esc(d.name)}</span>
      <span class="end">${S.domains.length > 1 ? `<button class="btn sm danger" onclick="M.domDel(${i})">Remove</button>` : ""}</span>
    </div>`).join("")}
    <div class="row" style="margin-top:10px">
      <input id="newDom" placeholder="New domain (any subject)" dir="auto">
      <button class="btn sm" style="flex:0 0 auto" onclick="M.domAdd()">Add</button>
    </div>
    <div class="tiny" style="margin-top:8px">MIRA builds a specialist mode around each domain you add, with the same evidence standard everywhere.</div>
  </div>

  <div class="card">
    <h3>${ic("target", 16)} Daily targets</h3>
    <div class="grid2" style="margin-bottom:10px">
      <div class="field"><label>Calories kcal</label><input type="number" inputmode="numeric" value="${st.targets.kcal || ""}" oninput="S.settings.targets.kcal=num(this.value);save()"></div>
      <div class="field"><label>Protein g</label><input type="number" inputmode="numeric" value="${st.targets.protein || ""}" oninput="S.settings.targets.protein=num(this.value);save()"></div>
    </div>
    <div class="grid2" style="margin-bottom:10px">
      <div class="field"><label>Carbs g (optional)</label><input type="number" inputmode="numeric" value="${st.targets.carbs || ""}" oninput="S.settings.targets.carbs=num(this.value);save()"></div>
      <div class="field"><label>Fat g (optional)</label><input type="number" inputmode="numeric" value="${st.targets.fat || ""}" oninput="S.settings.targets.fat=num(this.value);save()"></div>
    </div>
    <div class="field"><label>Water goal ml</label><input type="number" inputmode="numeric" value="${st.waterGoal || ""}" oninput="S.settings.waterGoal=Math.max(250,num(this.value));save()"></div>
  </div>

  <div class="card">
    <h3>${ic("key", 16)} API & model</h3>
    <div class="field"><label>Anthropic API key</label>
      <input type="password" value="${esc(st.apiKey)}" placeholder="sk-ant-…" autocomplete="off" oninput="S.settings.apiKey=this.value.trim();save()">
      <div class="tiny" style="margin-top:6px">Stored only in this browser; sent only to api.anthropic.com. Billed to your own account.</div></div>
    <div class="field"><label>Model</label>
      <select onchange="S.settings.model=this.value;save()">${MODELS.map(m => `<option value="${m.id}" ${st.model === m.id ? "selected" : ""}>${m.name}</option>`).join("")}</select></div>
  </div>

  <div class="card">
    <h3>${ic("lock", 16)} Security</h3>
    <div class="muted" style="margin-bottom:10px">${st.pinHash ? "PIN lock is on. The PIN is stored only as a hash, never as readable digits." : "No PIN set. Add a 4-digit PIN to gate entry to MIRA."}</div>
    <div class="row">
      <button class="btn sm sec" onclick="M.pinSet()">${st.pinHash ? "Change PIN" : "Set PIN"}</button>
      ${st.pinHash ? `<button class="btn sm danger" onclick="M.pinOff()">Remove PIN</button>` : ""}
    </div>
    <div class="tiny" style="margin-top:8px">A PIN in a local file is a casual lock, not hardened security — keep sensitive data backed up and private.</div>
  </div>

  <div class="card fold" id="savedFoodsCard">
    <h3 onclick="this.parentElement.classList.toggle('open')">${ic("bookmark", 16)} Saved foods (${S.savedFoods.length}) <span class="chev">▶</span></h3>
    <div class="fold-body">
      ${S.savedFoods.length ? S.savedFoods.map((f, i) => `<div class="set-row">
        <div><div class="k" dir="auto">${esc(f.name)}</div><div class="desc">${f.amount ? esc(f.amount) + " · " : ""}${n0(f.kcal)} kcal · ${n1(f.p)}P · ${n1(f.c)}C · ${n1(f.f)}F</div></div>
        <span class="end"><button class="btn sm danger" onclick="M.savedDel(${i})">Forget</button></span>
      </div>`).join("") : `<div class="muted">Every food you log is remembered here for one-tap re-entry.</div>`}
    </div>
  </div>

  <div class="card">
    <h3>${ic("database", 16)} Backup & data</h3>
    <div class="muted" style="margin-bottom:10px">Logs, targets, saved foods, chats and settings live only in this browser. Export a backup so nothing is lost across reinstalls or devices.</div>
    <div class="row" style="margin-bottom:10px">
      <button class="btn sm sec" onclick="M.backup()">${ic("download", 15)} Export backup</button>
      <button class="btn sm sec" onclick="M.restore()">${ic("upload", 15)} Restore backup</button>
    </div>
    <button class="btn sm danger" onclick="M.wipe()">Erase everything on this device</button>
  </div>

  <div class="tiny" style="text-align:center;padding:6px 0 14px">
    MIRA — My Integrated Reasoning Assistant · standalone edition<br>
    Every fact checked against trusted sources, or honestly labelled an estimate.
  </div>`;
}

function backup(){
  const data = JSON.stringify(S, null, 2);
  const blob = new Blob([data], {type: "application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `mira-backup-${todayStr()}.json`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 4000);
  toast("Backup exported ✓ (includes your API key — keep it private)");
}
function restore(){
  const inp = $("#fileBackup");
  inp.value = "";
  inp.onchange = () => {
    const f = inp.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const j = JSON.parse(r.result);
        if (!j || typeof j !== "object" || !("foods" in j) || !("settings" in j)) throw new Error("not a MIRA backup");
        if (!confirm("Replace everything on this device with this backup?")) return;
        S = Object.assign(BLANK(), j);
        R.mode = S.domains[0]?.id || "work";
        save(); render();
        toast("Backup restored ✓");
      } catch (e) { toast("That file is not a valid MIRA backup."); }
    };
    r.readAsText(f);
  };
  inp.click();
}

/* ---------------- global handlers ---------------- */
window.onb = onb;
window.foodForm = foodForm;
window.ibForm = ibForm;
window.S = S;
window.render = render;
window.save = save;
window.num = num;
window.M = {
  tab(t){ R.tab = t; render(); },
  mode(id){ R.mode = id; render(); },
  pin: pinPress,
  pinDel(){ R.pending = R.pending.slice(0, -1); render(); },

  onbSeg(g, v){ onb[g] = v; render(); },
  onbDom(id){ onb.domSel.has(id) ? onb.domSel.delete(id) : onb.domSel.add(id); render(); },
  onbCustomAdd(){ onb.custom.push(""); render(); },
  onbCustomDel(i){ onb.custom.splice(i, 1); render(); },
  onbDone,

  toggleDS(){ R.deepSolve = !R.deepSolve; render(); const ta = $("#chatIn"); if (ta) ta.focus(); },
  send: sendChat,
  suggest(btn){ render(); const ta = $("#chatIn"); if (ta){ ta.value = btn.textContent; ta.focus(); } },
  attach(){ pickFile(f => { R.attach = f; render(); toast(`Attached: ${f.name}`); }); },
  attachClear(){ R.attach = null; render(); },

  water(i){
    const t = todayStr();
    const cur = S.water[t] || 0;
    S.water[t] = (i + 1 === cur) ? i : i + 1;
    save(); render();
  },
  dayToggle(d){ R.openDays.has(d) ? R.openDays.delete(d) : R.openDays.add(d); render(); },
  ffName(v){ foodForm.name = v; acRender(v); },
  acHide(){ const el = $("#acList"); if (el) el.innerHTML = ""; },
  acPick(i){
    const f = S.savedFoods[i];
    if (!f) return;
    Object.assign(foodForm, {name: f.name, amount: f.amount, kcal: f.kcal, p: f.p, c: f.c, f: f.f, conf: "user"});
    render();
    toast("Filled from saved foods ✓");
  },
  scToggle(){ foodForm.scOpen = !foodForm.scOpen; render(); },
  scApply(){
    const base = num(foodForm.scBase), eat = num(foodForm.scEat);
    if (base <= 0 || eat <= 0){ toast("Enter the base amount and the amount eaten."); return; }
    const r = eat / base;
    foodForm.kcal = Math.round(num(foodForm.scK) * r);
    foodForm.p = Math.round(num(foodForm.scP) * r * 10) / 10;
    foodForm.c = Math.round(num(foodForm.scC) * r * 10) / 10;
    foodForm.f = Math.round(num(foodForm.scF) * r * 10) / 10;
    if (!foodForm.amount) foodForm.amount = `${eat} ${foodForm.scBaseUnit || "g"}`;
    foodForm.scOpen = false;
    render();
    toast(`Scaled to ${eat}/${base} ✓`);
  },
  foodSave: foodSaveDirect,
  foodDel(id){ S.foods = S.foods.filter(f => f.id !== id); save(); render(); },
  findMacros,
  extractPhoto,
  reviewAccept(i){
    const it = reviewItems[i];
    const s = sanity(it);
    if (s.errors.length){ toast(s.errors[0], 4200); render(); return; }
    logFood(it);
    reviewItems.splice(i, 1);
    if (!reviewItems.length) reviewItems = null;
    render();
  },
  reviewDrop(i){ reviewItems.splice(i, 1); if (!reviewItems.length) reviewItems = null; render(); },

  ibSave(){
    if (ibSaveEntry({...ibForm, date: ibForm.date || todayStr()})){
      Object.keys(ibForm).forEach(k => ibForm[k] = "");
      render();
    }
  },
  ibDel(id){ if (confirm("Delete this scan?")){ S.inbody = S.inbody.filter(e => e.id !== id); save(); render(); } },
  ibPhoto,
  ibReviewAccept(){ if (ibSaveEntry(ibReview)){ ibReview = null; render(); } },
  ibAnalyse(){
    if (!S.inbody.length){ toast("Add at least one scan first."); return; }
    const fit = S.domains.find(d => d.id === "fitness") || S.domains[0];
    R.mode = fit.id; R.tab = "chat";
    render();
    const ta = $("#chatIn");
    if (ta){ ta.value = "Analyse my body-composition trend from my InBody log: what is going well, what needs attention, and what should I change?"; ta.focus(); }
  },

  set(k, v){ S.settings[k] = v; save(); render(); },
  domAdd(){
    const inp = $("#newDom");
    const name = (inp ? inp.value : "").trim();
    if (!name){ toast("Type a domain name."); return; }
    S.domains.push({id: uid(), name, color: DOMAIN_COLORS[S.domains.length % DOMAIN_COLORS.length],
      desc: `A specialist mode for "${name}". Apply MIRA's full source-verification standard: verified facts with citations, honest estimates labelled as such, and expertise built around this subject.`});
    save(); render();
    toast(`Domain added: ${name} ✓`);
  },
  domDel(i){
    const d = S.domains[i];
    if (!confirm(`Remove the ${d.name} domain? Its chat history is deleted too.`)) return;
    delete S.chats[d.id];
    S.domains.splice(i, 1);
    if (R.mode === d.id) R.mode = S.domains[0].id;
    save(); render();
  },
  savedDel(i){ S.savedFoods.splice(i, 1); save(); render(); },

  async pinSet(){
    const p1 = prompt("New 4-digit PIN:");
    if (!p1) return;
    if (!/^\d{4}$/.test(p1)){ toast("PIN must be exactly 4 digits."); return; }
    const p2 = prompt("Repeat the PIN:");
    if (p1 !== p2){ toast("PINs did not match."); return; }
    S.settings.pinHash = await sha256("mira:" + p1);
    R.unlocked = true;
    save(); render();
    toast("PIN set ✓");
  },
  pinOff(){ if (confirm("Remove the PIN lock?")){ S.settings.pinHash = null; save(); render(); } },

  backup, restore,
  wipe(){
    if (!confirm("Erase ALL MIRA data on this device? Export a backup first if you want to keep anything.")) return;
    if (!confirm("Really erase everything? This cannot be undone.")) return;
    localStorage.removeItem("mira.data");
    S = BLANK();
    window.S = S;
    R.unlocked = true; R.tab = "chat"; R.mode = "work";
    render();
    toast("Everything erased.");
  },
};

render();
</script>
