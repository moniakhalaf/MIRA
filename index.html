<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>MIRA — Integrated Reasoning Assistant</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="MIRA">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0D13">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230A0D13'/><text x='50' y='67' font-size='52' text-anchor='middle' fill='%23D2AC64' font-family='sans-serif' font-weight='bold'>M</text></svg>">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230A0D13'/><text x='50' y='67' font-size='52' text-anchor='middle' fill='%23D2AC64' font-family='sans-serif' font-weight='bold'>M</text></svg>">
<link rel="manifest" href='data:application/manifest+json,{"name":"MIRA","short_name":"MIRA","display":"standalone","start_url":".","background_color":"%230A0D13","theme_color":"%230A0D13","icons":[{"src":"data:image/svg+xml,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27><rect width=%27100%27 height=%27100%27 rx=%2722%27 fill=%27%230A0D13%27/><text x=%2750%27 y=%2767%27 font-size=%2752%27 text-anchor=%27middle%27 fill=%27%23D2AC64%27 font-family=%27sans-serif%27 font-weight=%27bold%27>M</text></svg>","sizes":"any","type":"image/svg+xml"}]}'>
<style>
:root{
  color-scheme:dark;
  /* deep ink + champagne gold */
  --bg:#0A0D13; --bg2:#10141C; --card:#141925; --card2:#1A2030;
  --line:rgba(226,232,250,.07); --line2:rgba(226,232,250,.13);
  --txt:#ECEEF3; --txt2:#9DA6BA; --txt3:#626C82;
  --gold:#D2AC64; --gold-soft:rgba(210,172,100,.13);
  --acc:#D2AC64; --acc-soft:rgba(210,172,100,.13);
  --btn-ink:#12100B;
  --green:#3DB48A; --amber:#DDA43F; --red:#DE6060;
  --water:#5EA9DF; --water-ink:#BEE3FF;
  --glass:rgba(10,13,19,.86);
  --key:rgba(236,238,243,.05);
  --code:rgba(236,238,243,.08);
  --track:#10141C;
  --lockbg:#131826;
  --shadow:0 12px 36px rgba(0,0,0,.52);
  --cardshadow:0 1px 2px rgba(0,0,0,.22);
  --radius:14px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  font-size:16px;
}
:root[data-theme="light"]{
  color-scheme:light;
  /* warm alabaster + bronze ink */
  --bg:#F4F3EF; --bg2:#FDFCFA; --card:#FFFFFF; --card2:#FFFFFF;
  --line:rgba(28,36,51,.09); --line2:rgba(28,36,51,.15);
  --txt:#1F2735; --txt2:#5C6575; --txt3:#98A0AE;
  --gold:#8E6E22; --gold-soft:rgba(142,110,34,.10);
  --acc-soft:rgba(142,110,34,.10);
  --btn-ink:#FFFFFF;
  --green:#188C63; --amber:#A9761C; --red:#C24A4A;
  --water:#2F7FBE; --water-ink:#21689B;
  --glass:rgba(250,249,246,.9);
  --key:rgba(28,36,51,.05);
  --code:rgba(28,36,51,.07);
  --track:#E9E7E1;
  --lockbg:#EAE7DF;
  --shadow:0 12px 36px rgba(28,36,51,.15);
  --cardshadow:0 1px 2px rgba(28,36,51,.05),0 4px 16px rgba(28,36,51,.05);
}
:root[data-theme="glass"]{
  color-scheme:dark;
  /* aurora glassmorphism — dark translucent surfaces keep text at AA contrast */
  --bg:#0A0C16;
  --bg2:rgba(16,20,38,.52);
  --card:rgba(19,24,44,.55); --card2:rgba(28,34,60,.62);
  --line:rgba(255,255,255,.13); --line2:rgba(255,255,255,.22);
  --txt:#F2F4FA; --txt2:#B3BBCF; --txt3:#7E879E;
  --gold:#E2BE78; --gold-soft:rgba(226,190,120,.16);
  --acc-soft:rgba(226,190,120,.16);
  --btn-ink:#12100B;
  --green:#4CC79B; --amber:#E5B054; --red:#E87878;
  --water:#6FB6E8; --water-ink:#D6ECFF;
  --glass:rgba(12,15,28,.5);
  --key:rgba(255,255,255,.08);
  --code:rgba(255,255,255,.1);
  --track:rgba(255,255,255,.09);
  --lockbg:#181D36;
  --shadow:0 14px 44px rgba(0,0,0,.55);
  --cardshadow:0 8px 30px rgba(0,0,0,.28);
}
:root[data-theme="glass"] body{
  background:
    radial-gradient(58% 42% at 12% 6%,rgba(124,92,246,.30),transparent 62%),
    radial-gradient(46% 38% at 88% 10%,rgba(226,190,120,.17),transparent 60%),
    radial-gradient(64% 50% at 72% 94%,rgba(63,140,205,.24),transparent 62%),
    #0A0C16;
  background-attachment:fixed;
}
:root[data-theme="glass"] .topbar,
:root[data-theme="glass"] .tabbar,
:root[data-theme="glass"] .chat-head{backdrop-filter:blur(24px) saturate(1.4);-webkit-backdrop-filter:blur(24px) saturate(1.4)}
:root[data-theme="glass"] .card,
:root[data-theme="glass"] .msg.mira,
:root[data-theme="glass"] .msg.user,
:root[data-theme="glass"] .chatbar .inner,
:root[data-theme="glass"] .sheet,
:root[data-theme="glass"] .day-head,
:root[data-theme="glass"] .day-items,
:root[data-theme="glass"] .ib-entry,
:root[data-theme="glass"] .ac-list,
:root[data-theme="glass"] .suggest button,
:root[data-theme="glass"] .mode-chip{backdrop-filter:blur(18px) saturate(1.35);-webkit-backdrop-filter:blur(18px) saturate(1.35)}
:root[data-theme="glass"] .card{border-color:rgba(255,255,255,.16)}
:root[data-theme="glass"] .chatbar{background:transparent}

body,.topbar,.tabbar,.card,.chatbar .inner,input,select,textarea{transition:background-color .25s,border-color .25s,color .25s}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%;background:var(--bg)}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans","Noto Sans Arabic",sans-serif;
  color:var(--txt); line-height:1.5; overscroll-behavior-y:none;
  -webkit-font-smoothing:antialiased;
}
input,select,textarea,button{font:inherit;color:inherit}
button{cursor:pointer;border:none;background:none;padding:0}
a{color:var(--acc)}
::placeholder{color:var(--txt3)}
input,select,textarea{
  background:var(--bg2);border:1px solid var(--line);border-radius:10px;
  padding:11px 12px;width:100%;outline:none;min-height:44px;
}
input:focus,select:focus,textarea:focus{border-color:var(--acc)}
select{appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8'><path d='M1 1l5 5 5-5' stroke='%239AA3B5' stroke-width='2' fill='none' stroke-linecap='round'/></svg>");background-repeat:no-repeat;background-position:right 12px center;padding-right:34px}
h1,h2,h3,h4{margin:0;font-weight:600}
.hidden{display:none!important}
.svgi{stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;vertical-align:-3px;flex:0 0 auto}
:focus-visible{outline:2px solid var(--acc);outline-offset:2px}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}

/* ---------- layout shell ----------
   pinned to the real screen edges with inset:0 — immune to the iOS
   standalone bug where 100vh/100dvh exclude the bottom safe area */
body{overflow:hidden}
#app{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden}
/* while the keyboard is up: tab bar hides so the input sits on the keyboard */
body.kb .tabbar{display:none}
body.kb .chatbar{padding-bottom:6px}
.topbar{
  flex:0 0 auto;
  padding:calc(var(--safe-top) + 10px) 16px 10px;
  background:var(--glass);
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:10px;
}
.brand,.lock .logo,.onb .logo{font-family:Georgia,"Times New Roman",serif;font-weight:600}
.topbar .brand{font-size:19px;letter-spacing:.2em;color:var(--gold)}
.topbar .sub{font-size:12px;color:var(--txt2);margin-inline-start:auto;display:flex;align-items:center;gap:6px}
.mode-dot{width:8px;height:8px;border-radius:50%;background:var(--acc)}
.content{
  flex:1 1 0;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:12px 14px 24px;
}
.tabbar{
  flex:0 0 auto;
  display:flex;justify-content:space-around;
  padding:6px 8px calc(var(--safe-bot) + 6px);
  background:var(--glass);
  border-top:1px solid var(--line);
}
.tabbar button{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:6px 0;color:var(--txt3);font-size:11px;font-weight:500;border-radius:10px;min-height:48px;
}
.tabbar button svg{margin-bottom:1px}
.tabbar button.on{color:var(--acc);background:var(--acc-soft)}

/* ---------- lock screen ---------- */
.lock{
  position:fixed;inset:0;z-index:100;background:radial-gradient(120% 90% at 50% 0%,var(--lockbg) 0%,var(--bg) 60%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;
  padding:calc(var(--safe-top) + 20px) 20px calc(var(--safe-bot) + 30px);
  transition:opacity .45s ease,transform .45s ease;
}
.lock.open{opacity:0;transform:scale(1.06);pointer-events:none}
.lock .logo{font-size:36px;letter-spacing:.3em;color:var(--gold);text-indent:.3em}
.lock .hint{color:var(--txt2);font-size:14px}
.pin-dots{display:flex;gap:16px;height:18px}
.pin-dots i{
  width:14px;height:14px;border-radius:50%;border:1.5px solid var(--txt3);
  transition:all .18s cubic-bezier(.34,1.56,.64,1);
}
.pin-dots i.f{background:var(--gold);border-color:var(--gold);transform:scale(1.25);box-shadow:0 0 12px color-mix(in srgb,var(--gold) 50%,transparent)}
.pin-dots.err{animation:shake .4s}
@keyframes shake{20%{transform:translateX(-9px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(4px)}}
.keypad{display:grid;grid-template-columns:repeat(3,76px);gap:14px}
.keypad button{
  height:76px;border-radius:50%;background:var(--key);border:1px solid var(--line);
  font-size:26px;font-weight:500;color:var(--txt);transition:background .12s,transform .12s;
}
.keypad button:active{background:color-mix(in srgb,var(--gold) 25%,transparent);transform:scale(.94)}
.keypad button.ghost{background:none;border:none;font-size:15px;color:var(--txt2)}
.lock .forgot{color:var(--txt3);font-size:13.5px;min-height:44px;padding:0 16px}

/* ---------- onboarding ---------- */
.onb{max-width:560px;margin:0 auto;padding:28px 6px 40px}
.onb .logo{font-size:32px;letter-spacing:.26em;color:var(--gold);text-align:center;margin:18px 0 4px;text-indent:.26em}
.onb .tag{text-align:center;color:var(--txt2);font-size:14px;margin-bottom:26px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--txt2);margin-bottom:6px;letter-spacing:.02em}
.seg{display:flex;gap:8px;flex-wrap:wrap}
.seg button{
  flex:1;min-height:44px;padding:9px 12px;border-radius:10px;border:1px solid var(--line);
  background:var(--bg2);color:var(--txt2);font-size:14px;white-space:nowrap;
}
.seg button.on{border-color:var(--acc);color:var(--txt);background:var(--acc-soft)}

/* ---------- common ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:12px;box-shadow:var(--cardshadow)}
.card h3{font-size:15px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  min-height:46px;padding:11px 18px;border-radius:12px;font-weight:600;font-size:15px;white-space:nowrap;
  background:linear-gradient(180deg,color-mix(in srgb,var(--acc) 90%,#fff),color-mix(in srgb,var(--acc) 90%,#000));
  color:var(--btn-ink);transition:filter .12s,transform .12s;width:100%;
  box-shadow:0 2px 12px color-mix(in srgb,var(--acc) 30%,transparent);
}
.btn:active{transform:scale(.98);filter:brightness(1.1)}
.btn.sec{background:var(--card2);color:var(--txt);border:1px solid var(--line2);box-shadow:none}
.btn.danger{box-shadow:none}
.btn.sm{min-height:38px;padding:7px 13px;font-size:13.5px;width:auto;border-radius:10px}
.btn.danger{background:rgba(232,87,87,.15);color:var(--red);border:1px solid rgba(232,87,87,.35)}
.btn[disabled]{opacity:.45;pointer-events:none}
.row{display:flex;gap:10px;align-items:center}
.row>*{flex:1}
.muted{color:var(--txt2);font-size:13px}
.tiny{color:var(--txt3);font-size:12px}
.badge{
  display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.03em;
  background:var(--acc-soft);color:var(--acc);vertical-align:middle;
}
.badge.official{background:rgba(52,196,142,.15);color:var(--green)}
.badge.estimate{background:rgba(232,163,61,.15);color:var(--amber)}
.badge.user{background:rgba(91,141,239,.15);color:#5B8DEF}
.toast{
  position:fixed;left:50%;bottom:calc(var(--safe-bot) + 136px);transform:translateX(-50%) translateY(20px);
  background:var(--card2);border:1px solid var(--line2);color:var(--txt);
  padding:10px 18px;border-radius:12px;font-size:14px;z-index:90;opacity:0;
  transition:all .3s;max-width:88vw;text-align:center;box-shadow:var(--shadow);
  pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ---------- home hub ---------- */
.home-hero{padding:20px 4px 16px}
.home-hero .hi{font-size:14.5px;color:var(--txt2);font-weight:500}
.home-hero .q{font-family:Georgia,"Times New Roman",serif;font-size:27px;font-weight:600;margin-top:5px;line-height:1.22}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.cat-card{
  text-align:start;padding:15px 14px;border-radius:18px;min-height:132px;
  background:color-mix(in srgb,var(--mc) 13%,var(--card));
  border:1px solid color-mix(in srgb,var(--mc) 32%,transparent);
  display:flex;flex-direction:column;color:var(--txt);
  box-shadow:var(--cardshadow);transition:transform .12s;
}
.cat-card:active{transform:scale(.97)}
.cat-card .cc-ic{
  width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;
  background:color-mix(in srgb,var(--mc) 24%,transparent);color:var(--mc);margin-bottom:12px;
}
.cat-card .cc-nm{font-size:17px;font-weight:600;margin-bottom:3px}
.cat-card .cc-ds{font-size:12px;color:var(--txt2);line-height:1.35}

.cat-back{
  display:inline-flex;align-items:center;gap:6px;min-height:40px;
  padding:8px 15px 8px 11px;border-radius:22px;margin:2px 0 14px;
  background:var(--card);border:1px solid var(--line);color:var(--txt);
  font-size:14px;font-weight:600;box-shadow:var(--cardshadow);
}
.cat-back:active{transform:scale(.96)}
.cat-title{margin-bottom:16px}
.cat-title .ch-nm{font-family:Georgia,"Times New Roman",serif;font-size:26px;font-weight:600;line-height:1.1}
.cat-title .ch-ds{font-size:13px;color:var(--txt2);margin-top:3px}
.cat-ask{margin-bottom:16px}
.feat-list{display:flex;flex-direction:column;gap:10px}
.feat-card{
  display:flex;align-items:center;gap:13px;padding:13px 14px;border-radius:15px;
  background:var(--card);border:1px solid var(--line);color:var(--txt);text-align:start;
  min-height:66px;box-shadow:var(--cardshadow);transition:transform .12s;
}
.feat-card:active{transform:scale(.98)}
.feat-card .fc-ic{
  width:42px;height:42px;flex:0 0 auto;border-radius:12px;display:flex;align-items:center;justify-content:center;
  background:var(--acc-soft);color:var(--acc);
}
.feat-card .fc-tx{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0}
.feat-card .fc-nm{font-size:15px;font-weight:600}
.feat-card .fc-ds{font-size:12.5px;color:var(--txt2)}
.feat-card .fc-ar{color:var(--txt3);flex:0 0 auto}

/* ---------- training ---------- */
.chip-row{display:flex;gap:8px;overflow-x:auto;padding:2px 0 2px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.chip-row::-webkit-scrollbar{display:none}
.chip{
  padding:8px 14px;border-radius:20px;background:var(--bg2);border:1px solid var(--line);
  color:var(--txt2);font-size:13.5px;white-space:nowrap;min-height:38px;font-weight:500;
}
.chip.on{border-color:var(--acc);color:var(--txt);background:var(--acc-soft)}
.seg-tabs{margin-bottom:2px}
.grid3{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:center}
.grid3 .btn{width:auto}
.set-list{display:flex;flex-direction:column;gap:6px}
.set-row2{display:flex;align-items:center;gap:10px;padding:8px 11px;background:var(--bg2);border-radius:10px;font-size:14px}
.set-row2 .del{margin-inline-start:auto;color:var(--txt3);min-width:34px;min-height:34px;display:flex;align-items:center;justify-content:center;border-radius:8px}
.lib-list{display:flex;flex-direction:column;gap:8px}
.wo-hd{display:flex;align-items:center;gap:8px}
.pr-badge{background:rgba(52,196,142,.16);color:var(--green);border-radius:20px;padding:2px 9px;font-size:11px;font-weight:700}
.ex-note{margin-top:8px;font-size:13px;min-height:38px;padding:8px 10px}
.rest-bar .rest-top{display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:600}
.rest-bar .rest-top span:last-child{font-variant-numeric:tabular-nums;font-size:17px;color:var(--acc)}
.rest-track{height:8px;border-radius:5px;background:var(--track);overflow:hidden;margin-top:8px}
.rest-track i{display:block;height:100%;background:var(--acc);width:0;border-radius:5px;transition:width .25s linear}
.rest-bar .icon-btn{width:34px;height:34px;min-width:34px;font-size:20px;font-weight:600;background:var(--bg2);border:1px solid var(--line)}
.supp-row{
  display:flex;align-items:center;gap:12px;width:100%;text-align:start;color:var(--txt);
  padding:11px 12px;border-radius:12px;background:var(--bg2);border:1px solid var(--line);margin-bottom:8px;min-height:56px;
}
.supp-row.on{border-color:var(--acc);background:var(--acc-soft)}
.supp-check{
  width:26px;height:26px;flex:0 0 auto;border-radius:50%;border:1.5px solid var(--line2);
  display:flex;align-items:center;justify-content:center;color:var(--btn-ink);
}
.supp-row.on .supp-check{background:var(--acc);border-color:var(--acc)}
.supp-tx{flex:1;display:flex;flex-direction:column;gap:1px;min-width:0}
.supp-nm{font-size:14.5px;font-weight:500}
.supp-ds{font-size:12px;color:var(--txt2)}
.supp-row .del{flex:0 0 auto;color:var(--txt3);min-width:34px;min-height:34px;display:flex;align-items:center;justify-content:center;border-radius:8px}
.rev-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.rev-stat{background:var(--bg2);border-radius:12px;padding:12px 8px;text-align:center}
.rev-stat .rv{font-size:19px;font-weight:700;color:var(--acc)}
.rev-stat .rl{font-size:11px;color:var(--txt2);margin-top:2px}
.prio-dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;display:inline-block;margin-inline-end:6px}
.seg .prio-dot{margin-inline-end:5px;vertical-align:0}
.task-row{display:flex;align-items:center;gap:9px;padding:10px 2px;border-top:1px solid var(--line)}
.task-row:first-of-type{border-top:none}
.task-check{
  width:24px;height:24px;flex:0 0 auto;border-radius:7px;border:1.5px solid var(--line2);
  display:flex;align-items:center;justify-content:center;color:var(--btn-ink);background:var(--bg2);
}
.task-row.done .task-check{background:var(--acc);border-color:var(--acc)}
.task-tx{flex:1;min-width:0}
.task-nm{font-size:14.5px}
.task-row.done .task-nm{text-decoration:line-through;color:var(--txt3)}
.task-ds{font-size:12px;color:var(--txt2);margin-top:1px}
.task-ds.over{color:var(--red)}
.task-row .del{flex:0 0 auto;color:var(--txt3);min-width:34px;min-height:34px;display:flex;align-items:center;justify-content:center;border-radius:8px}

/* ---------- chat ---------- */
.chat-head{
  flex:0 0 auto;
  padding:8px 10px 8px 14px;background:var(--glass);
  border-bottom:1px solid var(--line);
}
.chat-head-in{display:flex;align-items:center;gap:4px}
.chat-head .mode-row{flex:1;min-width:0;padding:0;
  mask-image:linear-gradient(90deg,#000 0,#000 88%,transparent);
  -webkit-mask-image:linear-gradient(90deg,#000 0,#000 88%,transparent)}
.icon-btn{position:relative}

.mode-row{display:flex;gap:8px;overflow-x:auto;padding:2px 0 10px;scrollbar-width:none}

.msg.user{align-self:flex-end;background:var(--acc-soft);border:1px solid color-mix(in srgb,var(--acc) 35%,transparent);border-bottom-right-radius:5px;white-space:pre-wrap}

.msg.mira pre code{background:none;padding:0}
.msg.mira blockquote{margin:.4em 0;padding:.2em .9em;border-inline-start:3px solid var(--acc);color:var(--txt2)}
.msg.mira table{border-collapse:collapse;margin:.5em 0;font-size:.92em;display:block;overflow-x:auto;max-width:100%}
.msg.mira th,.msg.mira td{border:1px solid var(--line2);padding:5px 9px;text-align:start}
.msg .att{font-size:12px;color:var(--txt3);margin-top:5px}
.msg-act{
  display:inline-flex;align-items:center;gap:5px;margin-top:7px;

}
.msg-act:active{background:var(--acc-soft);color:var(--acc)}
.action-card{background:var(--bg2);border:1px solid color-mix(in srgb,var(--acc) 40%,transparent);border-radius:12px;padding:12px;margin:.5em 0}
.action-card .ach{font-size:11.5px;font-weight:700;letter-spacing:.07em;color:var(--acc);text-transform:uppercase;display:flex;align-items:center;gap:6px;margin-bottom:8px}
.action-card .acf{font-size:13.5px;margin:2px 0}
.action-card .acb{background:var(--card);border:1px solid var(--line);border-radius:9px;padding:9px 11px;margin-top:8px;font-size:14px;white-space:normal}
.typing{display:inline-flex;gap:4px;padding:4px 0}
.typing i{width:7px;height:7px;border-radius:50%;background:var(--txt3);animation:blink 1.2s infinite}

@keyframes blink{0%,80%,100%{opacity:.25}40%{opacity:1}}
.suggest{display:flex;flex-direction:column;gap:8px;margin:14px 0}
.suggest button{
  text-align:start;padding:12px 14px;border-radius:12px;background:var(--card);border:1px solid var(--line);
  color:var(--txt2);font-size:14px;min-height:46px;
}
.chatbar{
  flex:0 0 auto;
  padding:4px 12px 8px;background:var(--bg);
}

  box-shadow:var(--shadow);
}
.chatbar textarea{
  flex:1;background:none;border:none;resize:none;max-height:120px;min-height:30px;
  padding:5px 4px;line-height:1.4;
}
.icon-btn{
  width:40px;height:40px;min-width:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:19px;color:var(--txt2);background:transparent;transition:background .12s;
}
.icon-btn:active{background:rgba(255,255,255,.08)}
.icon-btn.send{background:var(--acc);color:var(--btn-ink)}
.icon-btn.ds.on{color:var(--acc);background:var(--acc-soft)}
.ds-note{font-size:11.5px;color:var(--acc);text-align:center;padding:3px 0 0}
.attach-pill{
  display:inline-flex;align-items:center;gap:7px;background:var(--acc-soft);border:1px solid color-mix(in srgb,var(--acc) 30%,transparent);
  border-radius:10px;padding:5px 10px;font-size:12.5px;color:var(--txt);margin:0 12px 6px;
}
.attach-pill b{max-width:46vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}

/* ---------- nutrition ---------- */
.bars{display:flex;flex-direction:column;gap:10px}
.bar-line{display:flex;flex-direction:column;gap:4px}
.bar-top{display:flex;justify-content:space-between;font-size:13px}
.bar-top .lab{font-weight:600}
.bar-top .val{color:var(--txt2)}
.bar{height:9px;border-radius:6px;background:var(--track);overflow:hidden}
.bar i{display:block;height:100%;border-radius:6px;background:var(--acc);width:0;transition:width .5s ease,background .3s}
.bar-line.done .bar i{background:var(--green)}
.bar-line.over .bar i{background:var(--amber)}
.bar-top .st{font-weight:700}
.bar-line.done .st{color:var(--green)}
.bar-line.over .st{color:var(--amber)}
.glasses{display:flex;flex-wrap:wrap;gap:4px;margin:10px 0 10px}

  width:40px;height:40px;padding:5px;display:flex;align-items:center;justify-content:center;
  transition:transform .12s,color .2s;color:var(--txt3);background:none;border:none;border-radius:50%;
}
.glass:active{transform:scale(.88)}
.glass.f{color:var(--water)}
.glass-svg{width:100%;height:100%}
.day-group{margin-bottom:12px}
.day-head{
  display:flex;align-items:center;gap:8px;width:100%;padding:12px 14px;min-height:48px;
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);color:var(--txt);
}
.day-head .dt{font-weight:600;font-size:14px}
.day-head .sum{margin-inline-start:auto;font-size:12.5px;color:var(--txt2);text-align:end}
.day-head .chev{color:var(--txt3);transition:transform .2s;font-size:12px}

.fold.open>h3{margin-bottom:10px}
.fold.open>h3 .chev{transform:rotate(90deg)}
.fold>.fold-body{display:none}
.fold.open>.fold-body{display:block}

.dv.good{color:var(--green)}.dv.bad{color:var(--amber)}.dv.neu{color:var(--txt2)}

.sheet-mask.show{opacity:1}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:61;background:var(--card);

}

/* ---------------- keyboard-aware viewport ----------------
   iOS pans fixed layouts when the keyboard opens, cutting off the top
   and leaving a dead zone under the tab bar. Pinning the shell to the
   VisualViewport keeps it exactly over the visible area; while typing
   the tab bar hides so the input sits directly on the keyboard. */
function bindViewport(){
  const vv = window.visualViewport;
  if (!vv) return;
  let t = null;
  const apply = () => {
    const app = $("#app");
    if (!app) return;
    const kbOpen = (window.innerHeight - vv.height) > 100;
    app.style.top = vv.offsetTop + "px";
    app.style.height = vv.height + "px";
    app.style.bottom = "auto";
    document.body.classList.toggle("kb", kbOpen);
    window.scrollTo(0, 0);
    if (kbOpen && R.tab === "chat"){
      const c = $("#content");
      if (c) c.scrollTop = c.scrollHeight;
    }
  };
  const queue = () => { clearTimeout(t); t = setTimeout(apply, 30); };
  vv.addEventListener("resize", queue);
  vv.addEventListener("scroll", queue);
  window.addEventListener("focusin", queue);
  window.addEventListener("focusout", queue);
  apply();
}

function render(){

  const focusId = ae && ae.id ? ae.id : null;
  const selStart = ae ? ae.selectionStart : null, selEnd = ae ? ae.selectionEnd : null;
  if (S.settings.pinHash && !R.unlocked){ app.innerHTML = lockHTML(); return; }
  if (FEATURES.emailSignup && !S.settings.account && !S.onboarded){ app.innerHTML = signupHTML(); return; }
  if (!S.onboarded){ app.innerHTML = onbHTML(); return; }
  const dom = curDomain();
  const catDom = (R.tab === "home" && R.homeCat) ? S.domains.find(d => d.id === R.homeCat) : null;
  const trainDom = R.tab === "train" ? S.domains.find(d => d.id === "fitness") : null;
  const healthDom = R.tab === "health" ? S.domains.find(d => d.id === "health") : null;
  const workDom = R.tab === "work" ? S.domains.find(d => d.id === "work") : null;
  const accClr = R.tab === "chat" ? dom.color : catDom ? catDom.color : trainDom ? trainDom.color : healthDom ? healthDom.color : workDom ? workDom.color : null;
  document.documentElement.style.setProperty("--acc", accClr || "var(--gold)");
  document.documentElement.style.setProperty("--acc-soft", accClr ? hexSoft(accClr) : "var(--gold-soft)");
  const sub = R.tab === "chat" ? `<span class="mode-dot"></span>${esc(dom.name)}`
    : R.tab === "home" ? esc(catDom ? catDom.name : "Home")
    : R.tab === "train" ? "Training" : R.tab === "health" ? "Health" : R.tab === "work" ? "Work" : esc(tabTitle());
  app.innerHTML = `
    <div class="topbar" id="topbar">
      <div class="brand">MIRA</div>
      <div class="sub">${sub}</div>
    </div>
    ${R.tab === "chat" ? `<div class="chat-head" id="chatHead">${chatHeadHTML()}</div>` : ""}
    <div class="content" id="content">${
      R.tab === "home" ? homeHTML() :

    </div>`;
  if (R.tab === "home"){ const c = $("#content"); if (c) c.scrollTop = 0; }
  // restore focus/caret for a state-bound input that survives re-render (e.g. library search)
  if (focusId && focusId !== "chatIn"){
    const el = document.getElementById(focusId);
    if (el){ el.focus(); try { el.setSelectionRange(selStart, selEnd); } catch (e) {} }
  }
  if (R.tab === "chat"){
    const ta = $("#chatIn");
    if (ta && keepInput){ ta.value = keepInput; ta.style.height = "auto"; ta.style.height = Math.min(ta.scrollHeight, 120) + "px"; }

async function pinPress(d){
  if (R.pending.length >= 4) return;
  R.pending += d;
  const dots = $("#pinDots");
  if (dots) dots.innerHTML = [0,1,2,3].map(i => `<i class="${i < R.pending.length ? "f" : ""}"></i>`).join("");
  if (R.pending.length === 4){
    const h = await sha256("mira:" + R.pending);
    if (h === S.settings.pinHash){
      const lock = $("#lock");
      if (lock) lock.classList.add("open");
      setTimeout(() => { R.unlocked = true; R.pending = ""; render(); }, 380);
    } else {
      if (dots){ dots.classList.add("err"); }
      if (navigator.vibrate) navigator.vibrate(120);
      setTimeout(() => { R.pending = ""; render(); }, 420);
    }

function dayFoods(date){ return S.foods.filter(f => f.date === date); }
function dayTotals(date){
  return dayFoods(date).reduce((a, f) => ({kcal: a.kcal + f.kcal, p: a.p + f.p, c: a.c + f.c, f: a.f + f.f}),

function liveContext(){
  const t = todayStr();
  const tot = dayTotals(t);
  const tg = S.settings.targets;
  const gl = S.water[t] || 0;
  const lines = [];
  lines.push(`Current date/time: ${new Date().toLocaleString("en-GB", {dateStyle: "full", timeStyle: "short"})}`);
  lines.push(`Daily targets: ${tg.kcal} kcal, ${tg.protein} g protein${tg.carbs ? `, ${tg.carbs} g carbs` : ""}${tg.fat ? `, ${tg.fat} g fat` : ""}; water goal ${S.settings.waterGoal} ml.`);

    : `Food logged today: nothing yet.`);
  lines.push(`Today's totals so far: ${n0(tot.kcal)} kcal, ${n1(tot.p)} g protein, ${n1(tot.c)} g carbs, ${n1(tot.f)} g fat. Remaining vs targets: ${n0(tg.kcal - tot.kcal)} kcal, ${n1(tg.protein - tot.p)} g protein${tg.carbs ? `, ${n1(tg.carbs - tot.c)} g carbs` : ""}${tg.fat ? `, ${n1(tg.fat - tot.f)} g fat` : ""}.`);
  lines.push(`Hydration today: ${gl} glasses × 250 ml = ${(gl * 0.25).toFixed(2)} L of ${(S.settings.waterGoal / 1000).toFixed(2)} L goal.`);
  if (S.inbody.length){
    const recent = [...S.inbody].sort((a, b) => a.date < b.date ? -1 : 1).slice(-6);
    lines.push(`Body-composition log (most recent last): ${recent.map(e =>
      `${e.date}: weight ${e.weight} kg, InBody score ${e.score}, body-fat mass ${e.bfm} kg, skeletal-muscle mass ${e.smm} kg, visceral-fat area ${e.vfa} cm², phase angle ${e.pa}°`).join(" | ")}.`);
  } else lines.push(`Body-composition log: no entries yet.`);
  // sleep (last 7)
  if (Array.isArray(S.sleep) && S.sleep.length){
    const since = new Date(Date.now() - 6 * 864e5).toLocaleDateString("en-CA");
    const es = S.sleep.filter(e => e.date >= since);
    if (es.length){
      const avgH = es.reduce((a, e) => a + (+e.hours || 0), 0) / es.length;
      lines.push(`Sleep (last 7 days): ${es.length} nights logged, average ${(Math.round(avgH * 10) / 10)} h/night. Recent: ${es.slice(-4).map(e => `${e.date} ${e.hours}h${e.quality ? ` q${e.quality}/5` : ""}`).join(", ")}.`);
    }
  }
  // supplements + adherence
  if (Array.isArray(S.supplements) && S.supplements.length){
    let taken = 0, total = 0;
    for (let k = 0; k < 7; k++){ const d = new Date(Date.now() - k * 864e5).toLocaleDateString("en-CA"); const set = new Set(S.suppLog[d] || []); total += S.supplements.length; S.supplements.forEach(s => { if (set.has(s.id)) taken++; }); }
    const t = todayStr(); const todaySet = new Set(S.suppLog[t] || []);
    lines.push(`Supplements: ${S.supplements.map(s => `${s.name}${s.timing ? ` (${s.timing})` : ""}`).join(", ")}. Taken today: ${S.supplements.filter(s => todaySet.has(s.id)).map(s => s.name).join(", ") || "none yet"}. 7-day adherence ${total ? Math.round(taken / total * 100) : 0}%.`);
  }
  // open tasks (by priority)
  if (Array.isArray(S.tasks)){
    const order = {high: 0, med: 1, low: 2};
    const open = S.tasks.filter(t => !t.done).sort((a, b) => order[a.priority] - order[b.priority] || ((a.due || "9999") < (b.due || "9999") ? -1 : 1));

  }

  if (Array.isArray(S.workouts) && S.workouts.length){
    const since = new Date(Date.now() - 6 * 864e5).toLocaleDateString("en-CA");

  }
  return lines.join("\n");
}

const unesc = s => String(s).replace(/&amp;/g, "&").replace(/&lt;/g, "<").replace(/&gt;/g, ">").replace(/&quot;/g, '"').replace(/&#39;/g, "'");
function parseAction(raw){
  const parts = raw.split(/^---$/m);
  const fields = {};
  parts[0].trim().split("\n").forEach(l => {
    const m = l.match(/^(\w+):\s*(.*)$/);
    if (m) fields[m[1].toLowerCase()] = unesc(m[2].trim());
  });
  fields.body = unesc(parts.slice(1).join("---").trim());
  return fields;
}
const actPayload = f => encodeURIComponent(JSON.stringify(f)).replace(/'/g, "%27");
function actionCardHTML(kind, raw){

/* ---------------- markdown (minimal, safe) ---------------- */
function md(src){
  let s = esc(src);
  // agent action blocks first, then normal code blocks
  s = s.replace(/```action:(email|event)\n([\s\S]*?)```/g, (_, kind, raw) => actionCardHTML(kind, raw));
  s = s.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, l, c) => `<pre><code>${c}</code></pre>`);
  // tables
  s = s.replace(/((?:^\|.*\|\s*$\n?)+)/gm, block => {
    const rows = block.trim().split("\n").map(r => r.trim()).filter(r => r.startsWith("|"));
    if (rows.length < 2) return block;
    const cells = r => r.replace(/^\||\|$/g, "").split("|").map(c => c.trim());
    const head = cells(rows[0]);
    const bodyRows = rows.slice(/^\|[\s:\-|]+\|$/.test(rows[1]) ? 2 : 1);
    return `<table><thead><tr>${head.map(h => `<th>${h}</th>`).join("")}</tr></thead><tbody>${
      bodyRows.map(r => `<tr>${cells(r).map(c => `<td>${c}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
  });
  s = s.replace(/^#{1,4}\s+(.+)$/gm, "<h3>$1</h3>");
  s = s.replace(/^&gt;\s?(.+)$/gm, "<blockquote>$1</blockquote>");
  // lists
  s = s.replace(/((?:^[ \t]*[-*•]\s+.+$\n?)+)/gm, b => `<ul>${b.trim().split("\n").map(l => `<li>${l.replace(/^[ \t]*[-*•]\s+/, "")}</li>`).join("")}</ul>`);
  s = s.replace(/((?:^[ \t]*\d+[.)]\s+.+$\n?)+)/gm, b => `<ol>${b.trim().split("\n").map(l => `<li>${l.replace(/^[ \t]*\d+[.)]\s+/, "")}</li>`).join("")}</ol>`);
  // inline
  s = s.replace(/\*\*([^*]+)\*\*/g, "<b>$1</b>");
  s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, "$1<i>$2</i>");
  s = s.replace(/`([^`\n]+)`/g, "<code>$1</code>");
  s = s.replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g, `<a href="$2" target="_blank" rel="noopener">$1</a>`);
  s = s.replace(/(^|[\s(])(https?:\/\/[^\s<)]+)/g, `$1<a href="$2" target="_blank" rel="noopener">$2</a>`);
  // paragraphs
  return s.split(/\n{2,}/).map(p =>
    /^<(h3|ul|ol|pre|table|blockquote|div)/.test(p.trim()) ? p : `<p>${p.trim().replace(/\n/g, "<br>")}</p>`
  ).join("");
}

/* ---------------- API ---------------- */
async function apiCall(body, onDelta){
  const headers = {
    "content-type": "application/json",
    "x-api-key": S.settings.apiKey,
    "anthropic-version": "2023-06-01",
    "anthropic-dangerous-direct-browser-access": "true",
  };
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST", headers, body: JSON.stringify(body),
  });
  if (!res.ok){
    let msg = `API error ${res.status}`;
    try { msg = (await res.json()).error?.message || msg; } catch (e) {}
    throw new Error(msg);
  }
  if (!body.stream) {
    const j = await res.json();
    return (j.content || []).filter(b => b.type === "text").map(b => b.text).join("");
  }
  const reader = res.body.getReader();
  const dec = new TextDecoder();
  let buf = "", full = "";
  for (;;){
    const {done, value} = await reader.read();
    if (done) break;
    buf += dec.decode(value, {stream: true});
    const lines = buf.split("\n");
    buf = lines.pop();
    for (const line of lines){
      if (!line.startsWith("data:")) continue;
      const data = line.slice(5).trim();
      if (!data || data === "[DONE]") continue;
      try {
        const ev = JSON.parse(data);
        if (ev.type === "content_block_delta" && ev.delta?.text){
          full += ev.delta.text;
          if (onDelta) onDelta(full);
        }
        if (ev.type === "error") throw new Error(ev.error?.message || "stream error");
      } catch (e) { if (e instanceof SyntaxError) continue; throw e; }
    }
  }
  return full;
}

function historyBlocks(msgs){
  // last 20 turns, text only (attachments are sent live once, then noted)
  return msgs.slice(-20).map(m => ({
    role: m.role,
    content: m.att && m.role === "user" ? `${m.content}\n[Attached earlier: ${m.att}]` : m.content,
  }));
}

async function sendChat(){
  if (R.busy) return;
  const ta = $("#chatIn");
  const text = (ta ? ta.value : "").trim();
  if (!text && !R.attach) return;
  if (!S.settings.apiKey){ toast("Add your API key in Settings first."); R.tab = "set"; render(); return; }

  if (ta) ta.value = "";
  const dom = curDomain();
  const ds = R.deepSolve;
  const att = R.attach;
  R.attach = null; R.deepSolve = false;
  let conv = activeConv();
  if (!conv){
    conv = {id: uid(), dom: dom.id, title: String(text || (att ? att.name : "") || "New chat").slice(0, 48), ts: Date.now(), msgs: []};
    S.convs.unshift(conv);
    R.convId = conv.id;
  }
  conv.ts = Date.now();
  const msgs = conv.msgs;
  msgs.push({role: "user", content: text || "(see attachment)", ts: Date.now(), att: att ? att.name : null});
  save();
  R.busy = true;
  render();

  // build request
  const hist = historyBlocks(msgs.slice(0, -1));
  const userText = (ds ? "[DEEP SOLVE] " : "") + (text || "Please read the attached file and respond in the current mode.");
  let lastContent;
  if (att){
    const block = att.kind === "pdf"
      ? {type: "document", source: {type: "base64", media_type: "application/pdf", data: att.data}}
      : {type: "image", source: {type: "base64", media_type: att.media_type, data: att.data}};
    lastContent = [block, {type: "text", text: userText}];
  } else lastContent = userText;

  const holder = {role: "assistant", content: "", ts: Date.now(), ds};
  msgs.push(holder);
  render();
  const msgsEl = $("#msgs");
  if (msgsEl){
    const el = msgsEl.lastElementChild;
    el.innerHTML = `<div class="who">MIRA${ds ? " · DEEP SOLVE" : ""}</div><div class="typing"><i></i><i></i><i></i></div>`;
  }

  try {
    const full = await apiCall({
      model: S.settings.model, max_tokens: ds ? 8000 : 4000, stream: true,
      system: systemPrompt(dom),
      ...(S.settings.webSearch ? {tools: [{type: "web_search_20250305", name: "web_search", max_uses: 5}]} : {}),
      messages: [...hist, {role: "user", content: lastContent}],
    }, partial => {
      holder.content = partial;
      const msgsEl2 = $("#msgs");
      if (msgsEl2){
        const el = msgsEl2.lastElementChild;
        el.innerHTML = `<div class="who">MIRA${ds ? " · DEEP SOLVE" : ""}</div>${md(partial)}`;
        const c = $("#content");
        if (c && c.scrollHeight - c.scrollTop - c.clientHeight < 300) c.scrollTop = c.scrollHeight;
      }
    });
    holder.content = full || "(no response)";
  } catch (e) {
    holder.content = `**Could not reach the API.** ${e.message}\n\nCheck your key, model and connection in Settings, then try again.`;
  }
  R.busy = false;
  save(); render();
}

async function regenLast(cid){
  if (R.busy) return;
  const conv = S.convs.find(c => c.id === cid);
  if (!conv) return;
  const msgs = conv.msgs;
  if (msgs[msgs.length - 1]?.role === "assistant") msgs.pop();
  const lastUser = msgs[msgs.length - 1];
  if (!lastUser || lastUser.role !== "user"){ render(); return; }
  R.busy = true; R.convId = cid; R.mode = conv.dom; R.tab = "chat";
  const dom = S.domains.find(d => d.id === conv.dom) || curDomain();
  const ds = !!lastUser.ds;
  const hist = historyBlocks(msgs.slice(0, -1));
  const holder = {role: "assistant", content: "", ts: Date.now(), ds};
  msgs.push(holder);
  save(); render();
  const msgsEl = $("#msgs");
  if (msgsEl) msgsEl.lastElementChild.innerHTML = `<div class="who">MIRA</div><div class="typing"><i></i><i></i><i></i></div>`;
  try {
    const full = await apiCall({
      model: S.settings.model, max_tokens: 4000, stream: true,
      system: systemPrompt(dom),
      ...(S.settings.webSearch ? {tools: [{type: "web_search_20250305", name: "web_search", max_uses: 5}]} : {}),
      messages: [...hist, {role: "user", content: lastUser.att ? `${lastUser.content}\n[Attached earlier: ${lastUser.att}]` : lastUser.content}],
    }, partial => {
      holder.content = partial;
      const el = $("#msgs") && $("#msgs").lastElementChild;

    });
    holder.content = full || "(no response)";
  } catch (e) {
    holder.content = `**Could not reach the API.** ${e.message}`;
  }

}

/* ---------------- macro sanity checking ---------------- */
function sanity(m){
  const out = {errors: [], warnings: []};
  const has = v => v !== "" && v !== null && v !== undefined && isFinite(+v);
  if (![m.kcal, m.p, m.c, m.f].every(has))
    out.errors.push("All four values (kcal, protein, carbs, fat) must be present — enter 0 where it truly is 0.");
  const kcal = num(m.kcal), p = num(m.p), c = num(m.c), f = num(m.f);
  if ([kcal, p, c, f].some(v => v < 0)) out.errors.push("Negative values are impossible.");
  if (kcal > 6000) out.warnings.push("Over 6,000 kcal for one item — double-check this.");
  const expected = 4 * p + 4 * c + 9 * f;
  if (kcal > 20 && expected > 0){
    const diff = Math.abs(kcal - expected) / Math.max(kcal, expected);
    if (diff > 0.35) out.errors.push(`Energy inconsistent with macros: 4×${n1(p)}P + 4×${n1(c)}C + 9×${n1(f)}F = ${n0(expected)} kcal, but ${n0(kcal)} kcal entered (${n0(diff * 100)}% apart).`);
    else if (diff > 0.18) out.warnings.push(`Energy slightly off macros (expected ≈${n0(expected)} kcal from 4P+4C+9F). Fibre/alcohol/rounding can explain small gaps.`);
  }
  if (kcal > 0 && p > kcal / 3.2) out.errors.push("Protein grams implausibly high for this energy (protein alone would exceed the calories).");
  return out;
}

  const avgK = avg(logged.map(x => x.tot.kcal));
  const avgP = avg(logged.map(x => x.tot.p));

}

/* autocomplete */

/* actions */
function foodSaveDirect(){
  const it = {name: foodForm.name.trim(), amount: foodForm.amount.trim(),
    kcal: foodForm.kcal, p: foodForm.p, c: foodForm.c, f: foodForm.f, conf: foodForm.conf || "user"};
  if (!it.name){ toast("Give the food a name."); return; }
  const s = sanity(it);

}
function logFood(it){
  S.foods.push({id: uid(), date: todayStr(), name: it.name.trim(), amount: (it.amount || "").trim(),
    kcal: num(it.kcal), p: num(it.p), c: num(it.c), f: num(it.f), conf: it.conf || "user", ts: Date.now()});
  const key = it.name.trim().toLowerCase();
  const ex = S.savedFoods.findIndex(f => f.name.toLowerCase() === key);
  const saved = {name: it.name.trim(), amount: (it.amount || "").trim(), kcal: num(it.kcal), p: num(it.p), c: num(it.c), f: num(it.f)};
  if (ex >= 0) S.savedFoods[ex] = saved; else S.savedFoods.unshift(saved);
  if (S.savedFoods.length > 400) S.savedFoods.pop();
  R.openDays.add(todayStr());
  buzz();
  save();
  toast(`Logged: ${it.name.trim()} ✓`);
}

/* find and parse the JSON payload in a model reply that may also contain prose */
function tryParseJson(t){
  const fenced = t.match(/```(?:json)?\s*([\s\S]*?)```/g) || [];
  for (const block of fenced.reverse()){
    try { return JSON.parse(block.replace(/^```(?:json)?\s*/, "").replace(/```$/, "")); } catch (e) {}
  }
  for (const [open, close] of [["{", "}"], ["[", "]"]]){
    const end = t.lastIndexOf(close);
    let i = t.length;
    for (let n = 0; n < 12 && (i = t.lastIndexOf(open, i - 1)) >= 0; n++){
      if (end > i){ try { return JSON.parse(t.slice(i, end + 1)); } catch (e) {} }
      if (i === 0) break;
    }
  }
  throw new Error("could not read structured data from the reply");
}

async function findMacros(){
  const name = foodForm.name.trim();
  if (!name){ toast("Type the food name first."); return; }
  if (!S.settings.apiKey){ toast("Add your API key in Settings first."); return; }
  findBusy = true; render();
  try {
    const txt = await apiCall({
      model: S.settings.model, max_tokens: 1600,
      ...(S.settings.webSearch ? {tools: [{type: "web_search_20250305", name: "web_search", max_uses: 3}]} : {}),
      system: `You are MIRA's nutrition lookup. Return realistic macro values for the food the user names — including restaurant/café items (Kuwait and GCC venues especially) and pan-Arab dishes in Arabic script or transliteration. Account for cooking method (مشوي grilled / مقلي fried / مسلوق boiled / roasted).${S.settings.webSearch ? ` You have web search: check the venue's or manufacturer's OFFICIALLY published nutrition first; only fall back to an estimate if nothing official exists.` : ""} Confidence rules: "official" ONLY if the venue or manufacturer actually publishes these values${S.settings.webSearch ? " (verified via search or known)" : " and you know them"}; "estimate" when reconstructed from standard composition data; "unavailable" when even an estimate would be irresponsible. Never invent official figures. After any research, end your reply with ONLY a JSON object: {"name":str,"amount":str,"kcal":num,"p":num,"c":num,"f":num,"conf":"official"|"estimate"|"unavailable","note":str(short, includes basis/source)}. Energy must be consistent: kcal ≈ 4p+4c+9f.`,
      messages: [{role: "user", content: `Food: ${name}${foodForm.amount.trim() ? ` — amount: ${foodForm.amount.trim()}` : ""}`}],
    });
    const j = tryParseJson(txt);
    if (j.conf === "unavailable"){
      reviewItems = null;
      toast(`Not available: ${j.note || "no responsible estimate exists for this item."}`, 5000);
    } else {
      reviewItems = [{name: j.name || name, amount: j.amount || foodForm.amount, kcal: j.kcal, p: j.p, c: j.c, f: j.f,
        conf: j.conf === "official" ? "official" : "estimate", note: j.note || ""}];
    }
  } catch (e) { toast("Lookup failed: " + e.message, 4000); }
  findBusy = false; render();
}

async function scanBarcode(){
  if (!S.settings.apiKey){ toast("Add your API key in Settings first."); return; }
  pickFile(async file => {
    if (file.kind === "pdf"){ toast("Photograph the barcode itself."); return; }
    barcodeBusy = true; render();
    try {
      const txt = await apiCall({
        model: S.settings.model, max_tokens: 200,
        system: `Read the retail barcode (EAN-13 / EAN-8 / UPC) in the photo. Reply with ONLY JSON: {"code":"digits"} — or {"code":null} if no barcode is clearly readable. Never guess digits.`,
        messages: [{role: "user", content: [
          {type: "image", source: {type: "base64", media_type: file.media_type, data: file.data}},
          {type: "text", text: "What are the barcode digits?"}]}],
      });
      const code = String(tryParseJson(txt).code || "").replace(/\D/g, "");
      if (!code){ toast("Could not read a barcode in that photo — try a closer, sharper shot."); }
      else {
        const res = await fetch(`https://world.openfoodfacts.org/api/v2/product/${code}.json?fields=product_name,brands,nutriments,serving_size`);
        const j = await res.json();
        if (j.status !== 1 || !j.product){
          toast(`Barcode ${code} isn't in the OpenFoodFacts database — try "Find macros" instead.`, 4800);
        } else {
          const p = j.product, nu = p.nutriments || {};
          const kcal = nu["energy-kcal_100g"] ?? (nu["energy_100g"] ? nu["energy_100g"] / 4.184 : 0);
          reviewItems = [{
            name: [p.brands, p.product_name].filter(Boolean).join(" — ") || `Product ${code}`,
            amount: "100 g", kcal: Math.round(kcal || 0),
            p: nu.proteins_100g ?? 0, c: nu.carbohydrates_100g ?? 0, f: nu.fat_100g ?? 0,
            conf: "official",
            note: `OpenFoodFacts ${code} — per 100 g${p.serving_size ? `; serving ${p.serving_size}` : ""}. Use the portion scaler for your amount.`,
          }];
        }
      }
    } catch (e) { toast("Barcode lookup failed: " + e.message, 4200); }
    barcodeBusy = false; render();
  });
}

async function extractPhoto(){
  if (!S.settings.apiKey){ toast("Add your API key in Settings first."); return; }
  pickFile(async file => {
    extractBusy = true; render();
    try {
      const block = file.kind === "pdf"
        ? {type: "document", source: {type: "base64", media_type: "application/pdf", data: file.data}}
        : {type: "image", source: {type: "base64", media_type: file.media_type, data: file.data}};
      const txt = await apiCall({
        model: S.settings.model, max_tokens: 1600,
        system: `You are MIRA's nutrition-label and meal reader. Extract food items with macros from the attached photo or document. If it is a printed nutrition label, use its values EXACTLY (official). If it is a meal photo, estimate portions and macros (estimate) and say the assumed portion in the note. Reply with ONLY a JSON array: [{"name":str,"amount":str,"kcal":num,"p":num,"c":num,"f":num,"conf":"official"|"estimate","note":str}]. Per-serving values unless stated otherwise; note which. Never guess a printed value you cannot read — omit that item and mention it in another item's note if needed.`,
        messages: [{role: "user", content: [block, {type: "text", text: "Extract the food items and macros."}]}],
      });
      const arr = tryParseJson(txt);
      reviewItems = (Array.isArray(arr) ? arr : [arr]).map(j => ({
        name: j.name || "Item", amount: j.amount || "", kcal: j.kcal, p: j.p, c: j.c, f: j.f,
        conf: j.conf === "official" ? "official" : "estimate", note: j.note || ""}));
      if (!reviewItems.length){ reviewItems = null; toast("Could not read any items from that file."); }
    } catch (e) { toast("Could not read the file: " + e.message, 4000); }
    extractBusy = false; render();
  });
}

/* combined library: built-in + user-added (user entries flagged) */
function libAll(){
  return EXERCISE_LIBRARY.concat(S.exercises.map(x => ({...x, user: true})));
}

/* ---- progress math ---- */
const e1rm = s => num(s.weight) * (1 + num(s.reps) / 30);          // Epley estimate
const woVolume = w => w.items.reduce((a, it) => a + it.sets.reduce((b, s) => b + num(s.reps) * num(s.weight), 0), 0);
function bestE1RM(name, filter){
  let best = 0;
  for (const w of S.workouts){
    if (filter && !filter(w)) continue;
    for (const it of w.items){
      if (it.name !== name) continue;
      for (const s of it.sets) best = Math.max(best, e1rm(s));
    }
  }
  return best;
}
/* most recent prior session's sets for an exercise — progressive-overload hint */
function lastPerf(name){
  const prev = S.workouts.filter(w => w.items.some(it => it.name === name)).sort((a, b) => b.ts - a.ts)[0];
  if (!prev) return "";
  return prev.items.find(it => it.name === name).sets.map(s => `${n1(s.weight)}×${s.reps}`).join(", ");
}

/* ---- rest timer (updates its own DOM node without a full re-render) ---- */
let restIv = null, restEnd = 0, restTotal = 0;
const restRemaining = () => Math.max(0, Math.ceil((restEnd - Date.now()) / 1000));
const restRunning = () => restEnd > Date.now();
const fmtClock = s => Math.floor(s / 60) + ":" + String(s % 60).padStart(2, "0");
function startRest(sec){
  if (!sec || sec <= 0) return;
  restTotal = sec; restEnd = Date.now() + sec * 1000;
  clearInterval(restIv);
  render();
  restIv = setInterval(() => {
    const rem = restRemaining();
    const t = document.getElementById("restTime"), f = document.getElementById("restFill");
    if (t) t.textContent = fmtClock(rem);
    if (f) f.style.width = (100 * (1 - rem / restTotal)) + "%";
    if (rem <= 0){ clearInterval(restIv); restIv = null; restEnd = 0; buzz(220); toast("Rest done — next set."); render(); }
  }, 250);
}
function stopRest(){ clearInterval(restIv); restIv = null; restEnd = 0; render(); }
function restControlHTML(){
  const len = S.settings.restLen;

    <div class="rest-top"><span>${ic("clock", 14)} Rest</span><span id="restTime">${fmtClock(restRemaining())}</span></div>

    <div class="row" style="margin-top:8px">
      <button class="btn sm sec" onclick="M.restAdd(15)">+15s</button>
      <button class="btn sm sec" onclick="M.restSkip()">Skip</button>
    </div>
  </div>`;
  return `<div class="card rest-bar">
    <div class="row" style="align-items:center">
      <span class="tiny" style="flex:1">${ic("clock", 14)} Rest timer — auto-starts after each set</span>

/* ---- plate calculator (per side, 20 kg Olympic bar) ---- */
function plateBreak(total){
  let per = (total - 20) / 2;
  if (per < 0) return null;
  const out = [];
  [25, 20, 15, 10, 5, 2.5, 1.25].forEach(p => { while (per >= p - 1e-9){ out.push(p); per = Math.round((per - p) * 100) / 100; } });
  return {out, leftover: per};
}
function plateHTML(){
  const w = num((document.getElementById("plateW") || {}).value);
  let body = `<div class="tiny">Enter your target total weight; plates shown per side of a 20 kg bar.</div>`;
  if (w >= 20){
    const b = plateBreak(w);
    body = b.out.length
      ? `<div style="margin-top:6px">Per side: <b>${b.out.map(p => p + "kg").join(" + ")}</b>${b.leftover > 0.01 ? ` <span class="tiny">(+${n1(b.leftover)} kg unmatched)</span>` : ""}</div>`
      : `<div class="tiny" style="margin-top:6px">Just the bar (20 kg).</div>`;
  } else if (w > 0) body = `<div class="tiny" style="margin-top:6px">Less than the bar (20 kg).</div>`;
  return `<div class="card">
    <div class="row"><input id="plateW" type="number" inputmode="decimal" placeholder="Total kg (e.g. 100)" oninput="render()">
      <button class="btn sm sec" style="flex:0 0 auto" onclick="R.plateOpen=false;render()">Close</button></div>
    ${body}
  </div>`;
}

function progChartHTML(name){
  const pts = S.workouts.filter(w => w.items.some(it => it.name === name))
    .sort((a, b) => a.ts - b.ts)
    .map(w => ({d: w.date, v: Math.max(...w.items.filter(it => it.name === name).flatMap(it => it.sets.map(e1rm)), 0)}))
    .filter(p => p.v > 0);
  if (pts.length < 2) return `<div class="tiny" style="margin-top:8px">Log this exercise on two or more days to see the trend. Best est. 1RM so far: <b>${pts.length ? n1(pts[0].v) : 0} kg</b>.</div>`;
  const vs = pts.map(p => p.v), min = Math.min(...vs), max = Math.max(...vs), span = Math.max(max - min, 0.5);
  const W = 150, H = 40;
  const xy = vs.map((v, i) => `${(i / (vs.length - 1)) * (W - 8) + 4},${H - 6 - ((v - min) / span) * (H - 12)}`);
  const pr = Math.max(...vs);
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:54px;display:block;margin:8px 0 2px">

}

/* ---- coach report text ---- */
function coachReport(days){
  const since = new Date(Date.now() - (days - 1) * 864e5).toLocaleDateString("en-CA");
  const ws = S.workouts.filter(w => w.date >= since).sort((a, b) => a.ts - b.ts);
  const tg = S.settings.targets;
  const who = S.settings.name || "Client";
  const coach = (S.settings.coach && S.settings.coach.name) ? S.settings.coach.name : "Coach";
  const L = [];
  L.push(`MIRA — progress report`);
  L.push(`For: ${coach}`);
  L.push(`Client: ${who}`);
  L.push(`Period: last ${days} days (${since} → ${todayStr()})`);
  L.push("");
  L.push(`TRAINING`);
  L.push(`Workouts completed: ${ws.length}`);
  if (ws.length){
    L.push(`Total volume: ${n0(ws.reduce((a, w) => a + woVolume(w), 0))} kg`);
    const names = [...new Set(ws.flatMap(w => w.items.map(it => it.name)))];
    const prs = [];
    names.forEach(nm => {
      const inP = bestE1RM(nm, w => w.date >= since);
      const before = bestE1RM(nm, w => w.date < since);
      if (inP > 0 && inP > before) prs.push(`  • ${nm}: est. 1RM ${n1(inP)} kg${before > 0 ? ` (was ${n1(before)})` : " (first record)"}`);
    });
    if (prs.length){ L.push(""); L.push(`New bests:`); prs.slice(0, 10).forEach(p => L.push(p)); }
    L.push("");
    L.push(`Sessions:`);
    ws.forEach(w => L.push(`  • ${w.date} — ${w.name}: ${w.items.map(it => `${it.name} ${it.sets.length}×`).join(", ") || "—"}`));
  }
  L.push("");
  L.push(`NUTRITION`);
  const dl = [];
  for (let k = 0; k < days; k++){ const d = new Date(Date.now() - k * 864e5).toLocaleDateString("en-CA"); const t = dayTotals(d); if (t.kcal > 0) dl.push(t); }
  if (dl.length){
    const avg = a => a.reduce((x, y) => x + y, 0) / a.length;
    L.push(`Days logged: ${dl.length}/${days}`);
    L.push(`Average: ${n0(avg(dl.map(t => t.kcal)))} kcal, ${n1(avg(dl.map(t => t.p)))} g protein/day`);
    if (tg.kcal){
      const onT = dl.filter(t => t.kcal >= tg.kcal * 0.9 && t.kcal <= tg.kcal * 1.1).length;
      L.push(`Target ${tg.kcal} kcal / ${tg.protein} g protein — on target ${onT}/${dl.length} logged days`);
    }
  } else L.push(`No food logged in this period.`);
  const wl = S.inbody.filter(e => e.weight && e.date >= since).sort((a, b) => a.date < b.date ? -1 : 1);
  if (wl.length >= 2){
    L.push("");
    L.push(`BODY`);
    L.push(`Weight: ${n1(+wl[0].weight)} → ${n1(+wl[wl.length - 1].weight)} kg (${(+wl[wl.length - 1].weight - +wl[0].weight > 0 ? "+" : "")}${n1(+wl[wl.length - 1].weight - +wl[0].weight)} kg)`);
  }
  L.push("");
  L.push(`— Generated by MIRA on ${new Date().toLocaleDateString("en-GB")}`);
  return L.join("\n");
}

<script>

const SUPP_TIMINGS = ["Morning","Midday","Evening","Pre-workout","Bedtime","Any"];

/* ---- helpers ---- */
function suppTakenSet(date){ return new Set(S.suppLog[date] || []); }
function suppAdherence(days){
  if (!S.supplements.length) return null;
  let taken = 0, total = 0;
  for (let k = 0; k < days; k++){
    const d = new Date(Date.now() - k * 864e5).toLocaleDateString("en-CA");
    const set = suppTakenSet(d);
    total += S.supplements.length;
    S.supplements.forEach(s => { if (set.has(s.id)) taken++; });
  }
  return total ? Math.round((taken / total) * 100) : 0;
}
function sleepRecent(n){ return [...S.sleep].sort((a, b) => a.date < b.date ? -1 : 1).slice(-n); }
function sleepAvg(days){
  const since = new Date(Date.now() - (days - 1) * 864e5).toLocaleDateString("en-CA");
  const es = S.sleep.filter(e => e.date >= since);
  if (!es.length) return null;
  const avg = a => a.reduce((x, y) => x + y, 0) / a.length;
  return {h: avg(es.map(e => num(e.hours))), q: avg(es.map(e => num(e.quality || 0))), n: es.length};

      <button class="btn sm" onclick="M.sleepSave()">Save sleep</button>
    </div>
    ${a7 ? `<div class="card">
      <h3>${ic("chart", 16)} Last 7 days</h3>
      ${chart}
      <div class="muted">Average <b>${n1(a7.h)} h</b>/night${a7.q ? ` · quality <b>${n1(a7.q)}/5</b>` : ""} over ${a7.n} night${a7.n > 1 ? "s" : ""}.</div>
    </div>` : ""}
    ${rec.length ? `<div class="card">
      <h3>Recent nights</h3>
      ${[...rec].reverse().map(e => `<div class="set-row">
        <div><div class="k">${fmtDate(e.date)}</div><div class="desc">${n1(e.hours)} h${e.quality ? ` · quality ${e.quality}/5` : ""}${e.note ? ` · ${esc(e.note)}` : ""}</div></div>
        <span class="end"><button class="btn sm danger" aria-label="Delete" onclick="M.sleepDel('${e.id}')">${ic("trash", 13)}</button></span>
      </div>`).join("")}
    </div>` : `<div class="card"><div class="muted">No sleep logged yet. Track a few nights to see your trend.</div></div>`}`;
}

function healthReviewHTML(){
  const tg = S.settings.targets;
  // nutrition last 7
  const dl = [];
  for (let k = 0; k < 7; k++){ const d = new Date(Date.now() - k * 864e5).toLocaleDateString("en-CA"); const tt = dayTotals(d); if (tt.kcal > 0) dl.push({d, tt, water: (S.water[d] || 0) * 250}); }
  const avg = a => a.length ? a.reduce((x, y) => x + y, 0) / a.length : 0;
  const onT = tg.kcal ? dl.filter(x => x.tt.kcal >= tg.kcal * 0.9 && x.tt.kcal <= tg.kcal * 1.1).length : 0;
  const waterHits = (() => { let n = 0; for (let k = 0; k < 7; k++){ const d = new Date(Date.now() - k * 864e5).toLocaleDateString("en-CA"); if ((S.water[d] || 0) * 250 >= S.settings.waterGoal) n++; } return n; })();
  const slp = sleepAvg(7);
  const adh = suppAdherence(7);
  const wsince = new Date(Date.now() - 7 * 864e5).toLocaleDateString("en-CA");
  const wl = S.inbody.filter(e => e.weight && e.date >= wsince).sort((a, b) => a.date < b.date ? -1 : 1);
  const workouts = S.workouts.filter(w => w.date >= wsince).length;
  const stat = (label, val) => `<div class="rev-stat"><div class="rv">${val}</div><div class="rl">${label}</div></div>`;
  return `
    <div class="card">
      <h3>${ic("chart", 16)} This week</h3>
      <div class="rev-grid">
        ${stat("Days logged", `${dl.length}/7`)}
        ${tg.kcal ? stat("On target", `${onT}/${dl.length || 0}`) : ""}
        ${stat("Water goal", `${waterHits}/7`)}
        ${slp ? stat("Avg sleep", `${n1(slp.h)} h`) : stat("Avg sleep", "—")}
        ${adh !== null ? stat("Supplements", `${adh}%`) : ""}
        ${stat("Workouts", `${workouts}`)}
      </div>
      ${dl.length ? `<div class="muted" style="margin-top:10px">Avg ${n0(avg(dl.map(x => x.tt.kcal)))} kcal · ${n1(avg(dl.map(x => x.tt.p)))} g protein/day${wl.length >= 2 ? ` · weight ${n1(+wl[0].weight)}→${n1(+wl[wl.length - 1].weight)} kg` : ""}.</div>` : ""}
    </div>
    <div class="card">
      <h3>${ic("sun", 16)} MIRA's read</h3>
      <div class="muted" style="margin-bottom:10px">Get an evidence-based review of your week — what's going well, what to adjust, and one priority — grounded in your own data.</div>
      <button class="btn" onclick="M.healthReviewAsk()">Ask MIRA to review my week</button>
    </div>`;
}
</script>
<script>

/* open tasks sorted by priority then due date */

    ${done.length ? `<div class="card fold ${R.taskDone ? "open" : ""}">
      <h3 onclick="M.taskDoneToggle()">Completed (${done.length}) <span class="chev">▶</span></h3>
      <div class="fold-body">${done.slice(0, 30).map(t => taskRowHTML(t)).join("")}
        <button class="btn sm sec" style="margin-top:8px" onclick="M.taskClearDone()">Clear completed</button></div>
    </div>` : ""}`;
}
function taskRowHTML(t){
  const p = PRIOS[t.priority] || PRIOS.med;
  const overdue = t.due && !t.done && t.due < todayStr();
  return `<div class="task-row ${t.done ? "done" : ""}">

function workNoteEditorHTML(){

function workNotesHTML(){

function workSapHTML(){

      <h3>${ic("layers", 16)} SAP S/4HANA reference</h3>

<script>
"use strict";
/* ---------------- body composition ---------------- */
const IB_METRICS = [
  {k: "weight", label: "Weight",   unit: "kg",  goodDir: 0},
  {k: "score",  label: "InBody score", unit: "", goodDir: 1},
  {k: "bfm",    label: "Body-fat mass", unit: "kg", goodDir: -1},
  {k: "smm",    label: "Muscle mass (SMM)", unit: "kg", goodDir: 1},
  {k: "vfa",    label: "Visceral fat", unit: "cm²", goodDir: -1},
  {k: "pa",     label: "Phase angle", unit: "°", goodDir: 1},
];
const ibForm = {date: "", weight: "", score: "", bfm: "", smm: "", vfa: "", pa: ""};
let ibReview = null, ibBusy = false;

function weightCardHTML(sorted){
  const pts = sorted.filter(e => e.weight !== null && isFinite(+e.weight)).slice(-14);
  let chart = "";
  if (pts.length >= 2){
    const ws = pts.map(e => +e.weight);
    const min = Math.min(...ws), max = Math.max(...ws);
    const span = Math.max(max - min, 0.5);
    const W = 154, H = 40;
    const xy = ws.map((w, i) => `${(i / (ws.length - 1)) * (W - 8) + 4},${H - 6 - ((w - min) / span) * (H - 12)}`);
    const delta = ws[ws.length - 1] - ws[0];
    chart = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:52px;display:block;margin:4px 0 2px">
      <polyline points="${xy.join(" ")}" fill="none" stroke="var(--acc)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${xy[xy.length - 1].split(",")[0]}" cy="${xy[xy.length - 1].split(",")[1]}" r="3" fill="var(--acc)"/>
    </svg>
    <div class="tiny">${n1(ws[0])} → <b>${n1(ws[ws.length - 1])} kg</b> over ${pts.length} entries (${delta > 0 ? "+" : ""}${n1(delta)} kg)</div>`;
  }
  return `<div class="card">
    <h3>${ic("trend", 16)} Weight</h3>
    ${chart}
    <div class="row" style="margin-top:10px">
      <input id="qw" type="number" inputmode="decimal" placeholder="Today's weight, kg">
      <button class="btn sm" style="flex:0 0 auto" onclick="M.quickWeight()">Log weight</button>
    </div>
  </div>`;
}

function bodyHTML(){
  const sorted = [...S.inbody].sort((a, b) => a.date < b.date ? -1 : 1);
  return `
  ${weightCardHTML(sorted)}
  <div class="card">
    <h3>${ic("chart", 16)} InBody log</h3>
    <div class="muted">Each scan is stored with the change from the previous entry per metric. MIRA reads this log live — ask for a trend analysis in Fitness mode any time.</div>
    <div class="row" style="margin-top:10px">
      <button class="btn sm sec" onclick="M.ibPhoto()" ${ibBusy ? "disabled" : ""}>${ibBusy ? "Reading…" : ic("camera", 15) + " Upload result sheet"}</button>
      <button class="btn sm sec" onclick="M.ibAnalyse()">${ic("trend", 15)} Analyse my trend</button>
    </div>
  </div>

  <div class="card">
    <h3>${ic("plus", 16)} Add scan</h3>
    <div class="grid2" style="margin-bottom:10px">
      <div class="field"><label>Date</label><input type="date" value="${esc(ibForm.date || todayStr())}" oninput="ibForm.date=this.value"></div>
      <div class="field"><label>Weight kg</label><input type="number" inputmode="decimal" value="${esc(ibForm.weight)}" oninput="ibForm.weight=this.value"></div>
    </div>
    <div class="grid2" style="margin-bottom:10px">
      <div class="field"><label>InBody score</label><input type="number" inputmode="decimal" value="${esc(ibForm.score)}" oninput="ibForm.score=this.value"></div>
      <div class="field"><label>Body-fat mass kg</label><input type="number" inputmode="decimal" value="${esc(ibForm.bfm)}" oninput="ibForm.bfm=this.value"></div>
    </div>
    <div class="grid2" style="margin-bottom:10px">
      <div class="field"><label>Skeletal-muscle mass kg</label><input type="number" inputmode="decimal" value="${esc(ibForm.smm)}" oninput="ibForm.smm=this.value"></div>
      <div class="field"><label>Visceral-fat area cm²</label><input type="number" inputmode="decimal" value="${esc(ibForm.vfa)}" oninput="ibForm.vfa=this.value"></div>
    </div>
    <div class="grid2" style="margin-bottom:12px">
      <div class="field"><label>Phase angle °</label><input type="number" inputmode="decimal" value="${esc(ibForm.pa)}" oninput="ibForm.pa=this.value"></div>
      <div class="field"><label>&nbsp;</label><button class="btn sm" style="width:100%;min-height:44px" onclick="M.ibSave()">Save scan</button></div>
    </div>
    ${ibReview ? `<div class="review-item">
      <b style="font-size:14px">Review extracted values</b>
      <div class="tiny" style="margin-bottom:8px">Read from your result sheet — check each value before saving. Nothing is ever guessed.</div>
      ${IB_METRICS.map(m => `<div class="row" style="margin-bottom:6px">
        <label style="flex:0 0 150px;font-size:13px;color:var(--txt2)">${m.label}</label>
        <input type="number" inputmode="decimal" value="${esc(ibReview[m.k] ?? "")}" oninput="ibReview.${m.k}=this.value"></div>`).join("")}
      <div class="row" style="margin-bottom:8px">
        <label style="flex:0 0 150px;font-size:13px;color:var(--txt2)">Date</label>
        <input type="date" value="${esc(ibReview.date || todayStr())}" oninput="ibReview.date=this.value"></div>
      <div class="row">
        <button class="btn sm" onclick="M.ibReviewAccept()">Save scan</button>
        <button class="btn sm sec" onclick="ibReview=null;render()">Discard</button>
      </div>
    </div>` : ""}
  </div>

  ${sorted.length ? [...sorted].reverse().map((e, ri) => {
    const idx = sorted.indexOf(e);
    const prev = idx > 0 ? sorted[idx - 1] : null;
    return `<div class="ib-entry">
      <div class="hd"><span class="d">${fmtDate(e.date)} <span class="tiny">${e.date}</span></span>
        <button class="del" aria-label="Delete scan" onclick="M.ibDel('${e.id}')">✕</button></div>
      <div class="ib-grid">
        ${IB_METRICS.map(m => {
          const v = e[m.k];
          if (v === null || v === undefined || v === "") return `<div class="ib-cell"><div class="k">${m.label}</div><div class="v">—</div></div>`;
          let dv = "";
          if (prev && isFinite(+prev[m.k]) && prev[m.k] !== "" && prev[m.k] !== null){
            const d = +v - +prev[m.k];
            if (Math.abs(d) > 0.001){
              const good = m.goodDir === 0 ? "neu" : (d * m.goodDir > 0 ? "good" : "bad");
              dv = `<div class="dv ${good}">${d > 0 ? "▲" : "▼"} ${n1(Math.abs(d))}</div>`;
            } else dv = `<div class="dv neu">—</div>`;
          }
          return `<div class="ib-cell"><div class="k">${m.label}</div><div class="v">${n1(+v)}${m.unit ? `<span class="tiny"> ${m.unit}</span>` : ""}</div>${dv}</div>`;
        }).join("")}
      </div>
    </div>`;
  }).join("") : `<div class="card" style="text-align:center;padding:28px 18px">
    <div style="color:var(--txt3);margin-bottom:10px">${ic("weight", 30)}</div>
    <div class="muted">No scans yet. Add your first InBody scan above — or photograph the result sheet and MIRA will read the values for you.</div>
  </div>`}`;
}

function ibSaveEntry(src){
  const vals = {};
  for (const m of IB_METRICS){
    const v = src[m.k];
    vals[m.k] = v === "" || v === null || v === undefined ? null : num(v);
  }
  if (Object.values(vals).every(v => v === null)){ toast("Enter at least one value."); return false; }
  if (vals.weight !== null && (vals.weight < 20 || vals.weight > 400)){ toast("Weight looks impossible — check it."); return false; }
  if (vals.pa !== null && (vals.pa < 1 || vals.pa > 20)){ toast("Phase angle out of plausible range (1–20°)."); return false; }
  S.inbody.push({id: uid(), date: src.date || todayStr(), ...vals});
  save();
  toast("Scan saved ✓");
  return true;
}

async function ibPhoto(){
  if (!S.settings.apiKey){ toast("Add your API key in Settings first."); return; }
  pickFile(async file => {
    ibBusy = true; render();
    try {
      const block = file.kind === "pdf"
        ? {type: "document", source: {type: "base64", media_type: "application/pdf", data: file.data}}
        : {type: "image", source: {type: "base64", media_type: file.media_type, data: file.data}};
      const txt = await apiCall({
        model: S.settings.model, max_tokens: 700,
        system: `You read InBody body-composition result sheets. Extract ONLY values you can actually read — never guess. Reply with ONLY JSON: {"date":"YYYY-MM-DD"|null,"weight":num|null,"score":num|null,"bfm":num|null(body fat mass kg),"smm":num|null(skeletal muscle mass kg),"vfa":num|null(visceral fat area cm²),"pa":num|null(phase angle degrees)}. Use null for anything unreadable or absent.`,
        messages: [{role: "user", content: [block, {type: "text", text: "Extract the InBody values."}]}],
      });
      const j = tryParseJson(txt);
      ibReview = {date: j.date || todayStr(), weight: j.weight ?? "", score: j.score ?? "", bfm: j.bfm ?? "", smm: j.smm ?? "", vfa: j.vfa ?? "", pa: j.pa ?? ""};
    } catch (e) { toast("Could not read the sheet: " + e.message, 4000); }
    ibBusy = false; render();
  });
}

/* build a real specialist persona for a custom domain */
async function genPersona(d){
  if (!S.settings.apiKey) return;
  try {
    const txt = await apiCall({
      model: S.settings.model, max_tokens: 320,
      system: `You write specialist-mode briefs for MIRA, a personal AI assistant with a strict source-verification standard. Reply with ONLY the brief: 60–90 words, no preamble, written like "Senior [profession] work: ...". It must name the specialist persona to embody (e.g. senior marketer / photographer / engineer / student's tutor), the core expertise areas of the domain, the field's most trusted sources, and the typical deliverables, ending with: facts verified against those sources, estimates labelled honestly.`,
      messages: [{role: "user", content: `Domain: ${d.name}`}],
    });
    if (txt && txt.trim().length > 40){
      const live = S.domains.find(x => x.id === d.id);
      if (live){ live.desc = txt.trim(); save(); }
    }
  } catch (e) { /* keep the template brief */ }
}

/* ---------------- settings ---------------- */
let setDraft = null;
function settingsHTML(){
  const st = S.settings;
  return `
  <div class="card">
    <h3>${ic("user", 16)} Profile</h3>
    ${FEATURES.emailSignup && st.account && st.account.email ? `<div class="set-row" style="padding-top:0">
      <div><div class="k">${esc(st.account.email)}</div><div class="desc">Account on this device — sync arrives with the hosted backend</div></div>
    </div>` : ""}

function backup(){
  const data = JSON.stringify(S, null, 2);
  const blob = new Blob([data], {type: "application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `mira-backup-${todayStr()}.json`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 4000);
  toast("Backup exported ✓ (includes your API key — keep it private)");
}
function restore(){
  const inp = $("#fileBackup");
  inp.value = "";
  inp.onchange = () => {
    const f = inp.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const j = JSON.parse(r.result);
        if (!j || typeof j !== "object" || !("foods" in j) || !("settings" in j)) throw new Error("not a MIRA backup");
        if (!confirm("Replace everything on this device with this backup?")) return;
        S = Object.assign(BLANK(), j);
        window.S = S;
        migrateChats();
        applyTheme();
        R.mode = S.domains[0]?.id || "work";
        R.convId = null; R.sheet = null;
        save(); render();
        toast("Backup restored ✓");
      } catch (e) { toast("That file is not a valid MIRA backup."); }
    };
    r.readAsText(f);
  };
  inp.click();
}
