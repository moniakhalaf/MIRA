<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>MIRA — Integrated Reasoning Assistant</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="MIRA">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0D13">
<!-- iOS requires a real PNG for the home-screen tile (data-URI SVGs are ignored) -->
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230A0D13'/><text x='50' y='67' font-size='52' text-anchor='middle' fill='%23D2AC64' font-family='sans-serif' font-weight='bold'>M</text></svg>">
<link rel="manifest" href="manifest.webmanifest">
<style>
:root{
  color-scheme:dark;
  /* deep ink + champagne gold */
  --bg:#0A0D13; --bg2:#10141C; --card:#141925; --card2:#1A2030;
  --sheet-bg:#161B29;
  --line:rgba(226,232,250,.07); --line2:rgba(226,232,250,.13);
  --txt:#ECEEF3; --txt2:#9DA6BA; --txt3:#626C82;
  --gold:#D2AC64; --gold-soft:rgba(210,172,100,.13);
  --acc:#D2AC64; --acc-soft:rgba(210,172,100,.13);
  --btn-ink:#12100B;
  --green:#3DB48A; --amber:#DDA43F; --red:#DE6060;
  --water:#5EA9DF; --water-ink:#BEE3FF;
  --glass:rgba(10,13,19,.86);
  --key:rgba(236,238,243,.05);
  --code:rgba(236,238,243,.08);
  --track:#10141C;
  --lockbg:#131826;
  --shadow:0 12px 36px rgba(0,0,0,.52);
  --cardshadow:0 1px 2px rgba(0,0,0,.22);
  --radius:14px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  font-size:16px;
}
:root[data-theme="light"]{
  color-scheme:light;
  /* warm alabaster + bronze ink */
  --bg:#F4F3EF; --bg2:#FDFCFA; --card:#FFFFFF; --card2:#FFFFFF;
  --sheet-bg:#FFFFFF;
  --line:rgba(28,36,51,.09); --line2:rgba(28,36,51,.15);
  --txt:#1F2735; --txt2:#5C6575; --txt3:#98A0AE;
  --gold:#8E6E22; --gold-soft:rgba(142,110,34,.10);
  --acc-soft:rgba(142,110,34,.10);
  --btn-ink:#FFFFFF;
  --green:#188C63; --amber:#A9761C; --red:#C24A4A;
  --water:#2F7FBE; --water-ink:#21689B;
  --glass:rgba(250,249,246,.9);
  --key:rgba(28,36,51,.05);
  --code:rgba(28,36,51,.07);
  --track:#E9E7E1;
  --lockbg:#EAE7DF;
  --shadow:0 12px 36px rgba(28,36,51,.15);
  --cardshadow:0 1px 2px rgba(28,36,51,.05),0 4px 16px rgba(28,36,51,.05);
}
:root[data-theme="glass"]{
  color-scheme:dark;
  /* aurora glassmorphism — dark translucent surfaces keep text at AA contrast */
  --bg:#0A0C16;
  --bg2:rgba(16,20,38,.52);
  --sheet-bg:rgba(17,21,40,.92);
  --card:rgba(19,24,44,.55); --card2:rgba(28,34,60,.62);
  --line:rgba(255,255,255,.13); --line2:rgba(255,255,255,.22);
  --txt:#F2F4FA; --txt2:#B3BBCF; --txt3:#7E879E;
  --gold:#E2BE78; --gold-soft:rgba(226,190,120,.16);
  --acc-soft:rgba(226,190,120,.16);
  --btn-ink:#12100B;
  --green:#4CC79B; --amber:#E5B054; --red:#E87878;
  --water:#6FB6E8; --water-ink:#D6ECFF;
  --glass:rgba(12,15,28,.5);
  --key:rgba(255,255,255,.08);
  --code:rgba(255,255,255,.1);
  --track:rgba(255,255,255,.09);
  --lockbg:#181D36;
  --shadow:0 14px 44px rgba(0,0,0,.55);
  --cardshadow:0 8px 30px rgba(0,0,0,.28);
}
:root[data-theme="glass"] body{
  background:
    radial-gradient(58% 42% at 12% 6%,rgba(124,92,246,.30),transparent 62%),
    radial-gradient(46% 38% at 88% 10%,rgba(226,190,120,.17),transparent 60%),
    radial-gradient(64% 50% at 72% 94%,rgba(63,140,205,.24),transparent 62%),
    #0A0C16;
  background-attachment:fixed;
}
:root[data-theme="glass"] .topbar,
:root[data-theme="glass"] .tabbar,
:root[data-theme="glass"] .chat-head{backdrop-filter:blur(24px) saturate(1.4);-webkit-backdrop-filter:blur(24px) saturate(1.4)}
:root[data-theme="glass"] .card,
:root[data-theme="glass"] .msg.mira,
:root[data-theme="glass"] .msg.user,
:root[data-theme="glass"] .chatbar .inner,
:root[data-theme="glass"] .sheet,
:root[data-theme="glass"] .day-head,
:root[data-theme="glass"] .day-items,
:root[data-theme="glass"] .ib-entry,
:root[data-theme="glass"] .ac-list,
:root[data-theme="glass"] .suggest button,
:root[data-theme="glass"] .mode-chip{backdrop-filter:blur(18px) saturate(1.35);-webkit-backdrop-filter:blur(18px) saturate(1.35)}
:root[data-theme="glass"] .card{border-color:rgba(255,255,255,.16)}
:root[data-theme="glass"] .chatbar{background:transparent}

:root[data-theme="oled"]{
  color-scheme:dark;
  /* true black — battery-friendly on OLED, maximum contrast */
  --bg:#000000; --bg2:#08080A; --card:#0F0F13; --card2:#16161C;
  --sheet-bg:#121216;
  --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.15);
  --txt:#F3F3F6; --txt2:#9A9AA6; --txt3:#5C5C67;
  --gold:#E6C074; --gold-soft:rgba(230,192,116,.14);
  --acc:#E6C074; --acc-soft:rgba(230,192,116,.14);
  --btn-ink:#100D06;
  --green:#3DC495; --amber:#E3AE48; --red:#E56A6A;
  --water:#5EA9DF; --water-ink:#BEE3FF;
  --glass:rgba(0,0,0,.9);
  --key:rgba(255,255,255,.05); --code:rgba(255,255,255,.07);
  --track:#08080A; --lockbg:#000000;
  --shadow:0 12px 36px rgba(0,0,0,.7); --cardshadow:0 0 0 1px rgba(255,255,255,.02);
}
:root[data-theme="midnight"]{
  color-scheme:dark;
  /* deep navy with champagne gold — luxe night look */
  --bg:#0A0F1F; --bg2:#0F1730; --card:#141D38; --card2:#1C2748;
  --sheet-bg:#16203D;
  --line:rgba(180,200,255,.09); --line2:rgba(180,200,255,.17);
  --txt:#EAEEF8; --txt2:#9FB0D0; --txt3:#61729A;
  --gold:#E2C07E; --gold-soft:rgba(226,192,126,.15);
  --acc:#E2C07E; --acc-soft:rgba(226,192,126,.15);
  --btn-ink:#0E1226;
  --green:#43C79A; --amber:#E3B152; --red:#E77A7A;
  --water:#6FB6E8; --water-ink:#D6ECFF;
  --glass:rgba(10,15,31,.86);
  --key:rgba(180,200,255,.06); --code:rgba(180,200,255,.09);
  --track:#0F1730; --lockbg:#0F1730;
  --shadow:0 14px 40px rgba(0,0,0,.55); --cardshadow:0 1px 2px rgba(0,0,0,.3);
}
:root[data-theme="sepia"]{
  color-scheme:light;
  /* warm paper + bronze ink — easy on the eyes */
  --bg:#F1E9DA; --bg2:#F8F2E6; --card:#FBF6EC; --card2:#F5EEDF;
  --sheet-bg:#FBF6EC;
  --line:rgba(74,56,32,.10); --line2:rgba(74,56,32,.18);
  --txt:#3A2E1E; --txt2:#6E5E48; --txt3:#9C8B72;
  --gold:#9A6720; --gold-soft:rgba(165,106,32,.12);
  --acc:#A56A20; --acc-soft:rgba(165,106,32,.12);
  --btn-ink:#FBF6EC;
  --green:#4E7A44; --amber:#9A6E20; --red:#B0503E;
  --water:#4A7C9E; --water-ink:#3A6079;
  --glass:rgba(248,242,230,.9);
  --key:rgba(74,56,32,.05); --code:rgba(74,56,32,.07);
  --track:#E4D8C2; --lockbg:#EAE0CD;
  --shadow:0 12px 36px rgba(74,56,32,.15); --cardshadow:0 1px 2px rgba(74,56,32,.06),0 4px 16px rgba(74,56,32,.05);
}

body,.topbar,.tabbar,.card,.chatbar .inner,input,select,textarea{transition:background-color .25s,border-color .25s,color .25s}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%;background:var(--bg)}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans","Noto Sans Arabic",sans-serif;
  color:var(--txt); line-height:1.5; overscroll-behavior-y:none;
  -webkit-font-smoothing:antialiased;
}
input,select,textarea,button{font:inherit;color:inherit}
button{cursor:pointer;border:none;background:none;padding:0}
a{color:var(--acc)}
::placeholder{color:var(--txt3)}
input,select,textarea{
  background:var(--bg2);border:1px solid var(--line);border-radius:10px;
  padding:11px 12px;width:100%;outline:none;min-height:44px;
}
input:focus,select:focus,textarea:focus{border-color:var(--acc)}
select{appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8'><path d='M1 1l5 5 5-5' stroke='%239AA3B5' stroke-width='2' fill='none' stroke-linecap='round'/></svg>");background-repeat:no-repeat;background-position:right 12px center;padding-right:34px}
h1,h2,h3,h4{margin:0;font-weight:600}
.hidden{display:none!important}
.svgi{stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;vertical-align:-3px;flex:0 0 auto}
:focus-visible{outline:2px solid var(--acc);outline-offset:2px}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}

/* ---------- layout shell ----------
   pinned to the real screen edges with inset:0 — immune to the iOS
   standalone bug where 100vh/100dvh exclude the bottom safe area */
body{overflow:hidden}
#app{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden}
/* while the keyboard is up: tab bar hides so the input sits on the keyboard */
body.kb .tabbar{display:none}
body.kb .chatbar{padding-bottom:6px}
.topbar{
  flex:0 0 auto;
  padding:calc(var(--safe-top) + 10px) 16px 10px;
  background:var(--glass);
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:10px;
}
.brand,.lock .logo,.onb .logo{font-family:Georgia,"Times New Roman",serif;font-weight:600}
.topbar .brand{font-size:19px;letter-spacing:.2em;color:var(--gold)}
.topbar .sub{font-size:12px;color:var(--txt2);margin-inline-start:auto;display:flex;align-items:center;gap:6px}
.mode-dot{width:8px;height:8px;border-radius:50%;background:var(--acc)}
.content{
  flex:1 1 0;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
  padding:12px 14px 24px;
}
.content.view-enter{animation:viewIn .24s cubic-bezier(.2,.7,.3,1)}
@keyframes viewIn{from{opacity:0;transform:translateY(7px)}}
@media(prefers-reduced-motion:reduce){.content.view-enter{animation:none}}
.empty-state{text-align:center;color:var(--txt2);font-size:13px;line-height:1.5;padding:22px 16px;background:var(--card);border:1px solid var(--line2);border-radius:14px}
.empty-state b{display:block;color:var(--txt);font-size:14.5px;margin-bottom:3px}
/* budget dashboard */
.budget-dash{display:flex;align-items:center;gap:16px;margin-top:6px}
.donut{width:118px;height:118px;flex:0 0 auto}
.donut .d-c{fill:var(--txt);font-size:15px;font-weight:700}
.donut .d-l{fill:var(--txt2);font-size:9px;text-transform:uppercase;letter-spacing:.06em}
.budget-legend{flex:1;display:flex;flex-direction:column;gap:7px;min-width:0}
.bl-row{display:flex;align-items:center;gap:8px;font-size:13px}
.bl-dot{width:10px;height:10px;min-width:10px;border-radius:3px;display:inline-block}
.bl-c{color:var(--txt);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bl-v{color:var(--txt);font-weight:600;display:flex;gap:6px;align-items:baseline}
.bl-p{color:var(--txt2);font-weight:500;font-size:11.5px}
.budget-top{font-size:12.5px;color:var(--txt2);line-height:1.45;margin-top:12px;padding-top:11px;border-top:1px solid var(--line2);display:flex;gap:6px;align-items:flex-start}
.budget-top svg{color:var(--acc);flex:0 0 auto;margin-top:1px}
.budget-top b{color:var(--txt)}
.save-proj{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.sp-cell{background:var(--card2);border:1px solid var(--line2);border-radius:11px;padding:11px 6px;text-align:center}
.sp-cell .sp-v{font-size:17px;font-weight:700;color:var(--acc)}
.sp-cell .sp-l{font-size:11px;color:var(--txt2);margin-top:2px}
.tabbar{
  flex:0 0 auto;
  display:flex;justify-content:space-around;
  padding:6px 8px calc(var(--safe-bot) + 6px);
  background:var(--glass);
  border-top:1px solid var(--line);
}
.tabbar button{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:6px 0;color:var(--txt3);font-size:11px;font-weight:500;border-radius:10px;min-height:48px;
}
.tabbar button svg{margin-bottom:1px}
.tabbar button.on{color:var(--acc);background:var(--acc-soft)}

/* ---------- lock screen ---------- */
.lock{
  position:fixed;inset:0;z-index:100;background:radial-gradient(120% 90% at 50% 0%,var(--lockbg) 0%,var(--bg) 60%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;
  padding:calc(var(--safe-top) + 20px) 20px calc(var(--safe-bot) + 30px);
  transition:opacity .45s ease,transform .45s ease;
}
.lock.open{opacity:0;transform:scale(1.06);pointer-events:none}
.lock .logo{font-size:36px;letter-spacing:.3em;color:var(--gold);text-indent:.3em}
.lock .hint{color:var(--txt2);font-size:14px;text-align:center;max-width:300px}
.enc-lock .enc-badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--gold);
  background:var(--gold-soft);border:1px solid var(--line2);padding:5px 12px;border-radius:99px;margin-top:-8px}
.enc-form{display:flex;flex-direction:column;gap:12px;width:100%;max-width:320px}
.enc-form input{width:100%;text-align:center;font-size:16px;padding:14px}
.enc-form .btn{width:100%}
.enc-form .enc-face{display:flex;align-items:center;justify-content:center;gap:8px}
.enc-note{font-size:12px;color:var(--txt3);text-align:center;max-width:320px;line-height:1.5}
/* encryption block in Settings */
.enc-warn{background:rgba(221,164,63,.12);border:1px solid rgba(221,164,63,.3);border-radius:10px;padding:10px 12px;font-size:12.5px;color:var(--amber);line-height:1.5;margin:10px 0}
.pin-dots{display:flex;gap:16px;height:18px}
.pin-dots i{
  width:14px;height:14px;border-radius:50%;border:1.5px solid var(--txt3);
  transition:all .18s cubic-bezier(.34,1.56,.64,1);
}
.pin-dots i.f{background:var(--gold);border-color:var(--gold);transform:scale(1.25);box-shadow:0 0 12px color-mix(in srgb,var(--gold) 50%,transparent)}
.pin-dots.err{animation:shake .4s}
@keyframes shake{20%{transform:translateX(-9px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(4px)}}
.keypad{display:grid;grid-template-columns:repeat(3,76px);gap:14px}
.keypad button{
  height:76px;border-radius:50%;background:var(--key);border:1px solid var(--line);
  font-size:26px;font-weight:500;color:var(--txt);transition:background .12s,transform .12s;
}
.keypad button:active{background:color-mix(in srgb,var(--gold) 25%,transparent);transform:scale(.94)}
.keypad button.ghost{background:none;border:none;font-size:15px;color:var(--txt2)}
.lock .forgot{color:var(--txt3);font-size:13.5px;min-height:44px;padding:0 16px}

/* ---------- onboarding ---------- */
.onb{max-width:560px;margin:0 auto;padding:28px 6px 40px}
.onb .logo{font-size:32px;letter-spacing:.26em;color:var(--gold);text-align:center;margin:18px 0 4px;text-indent:.26em}
.onb .tag{text-align:center;color:var(--txt2);font-size:14px;margin-bottom:22px}
.onb-dots{display:flex;justify-content:center;gap:8px;margin:2px 0 22px}
.onb-dot{width:8px;height:8px;border-radius:50%;background:var(--line2);transition:width .28s ease,background .28s ease}
.onb-dot.done{background:color-mix(in srgb,var(--acc) 55%,transparent)}
.onb-dot.on{background:var(--acc);width:24px;border-radius:4px}
.onb-head{text-align:center;margin-bottom:18px}
.onb-t{font-size:21px;font-weight:700;color:var(--txt);letter-spacing:-.01em}
.onb-s{font-size:13.5px;color:var(--txt2);margin-top:5px;line-height:1.42}
.onb-step{animation:onbIn .28s ease both}
@keyframes onbIn{from{opacity:0;transform:translateX(8px)}}
.onb-nav{display:flex;gap:10px;margin-top:20px}
.onb-nav .onb-back{flex:0 0 auto;width:auto;min-width:104px}
.onb-nav .onb-next{flex:1 1 auto;width:auto}
@media(prefers-reduced-motion:reduce){.onb-step{animation:none}}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--txt2);margin-bottom:6px;letter-spacing:.02em}
.seg{display:flex;gap:8px;flex-wrap:wrap}
.seg button{
  flex:1;min-height:44px;padding:9px 12px;border-radius:10px;border:1px solid var(--line);
  background:var(--bg2);color:var(--txt2);font-size:14px;white-space:nowrap;
}
.seg button.on{border-color:var(--acc);color:var(--txt);background:var(--acc-soft)}

/* ---------- common ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:12px;box-shadow:var(--cardshadow)}
.card h3{font-size:15px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  min-height:46px;padding:11px 18px;border-radius:12px;font-weight:600;font-size:15px;white-space:nowrap;
  background:linear-gradient(180deg,color-mix(in srgb,var(--acc) 90%,#fff),color-mix(in srgb,var(--acc) 90%,#000));
  color:var(--btn-ink);transition:filter .12s,transform .12s;width:100%;
  box-shadow:0 2px 12px color-mix(in srgb,var(--acc) 30%,transparent);
}
.btn:active{transform:scale(.98);filter:brightness(1.1)}
.btn.sec{background:var(--card2);color:var(--txt);border:1px solid var(--line2);box-shadow:none}
.btn.danger{box-shadow:none}
.btn.sm{min-height:38px;padding:7px 13px;font-size:13.5px;width:auto;border-radius:10px}
.btn.danger{background:rgba(232,87,87,.15);color:var(--red);border:1px solid rgba(232,87,87,.35)}
.btn[disabled]{opacity:.45;pointer-events:none}
.row{display:flex;gap:10px;align-items:center}
.row>*{flex:1}
.muted{color:var(--txt2);font-size:13px}
.tiny{color:var(--txt3);font-size:12px}
.badge{
  display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.03em;
  background:var(--acc-soft);color:var(--acc);vertical-align:middle;
}
.badge.official{background:rgba(52,196,142,.15);color:var(--green)}
.badge.estimate{background:rgba(232,163,61,.15);color:var(--amber)}
.badge.user{background:rgba(91,141,239,.15);color:#5B8DEF}
.toast{
  position:fixed;left:50%;bottom:calc(var(--safe-bot) + 136px);transform:translateX(-50%) translateY(20px);
  background:var(--card2);border:1px solid var(--line2);color:var(--txt);
  padding:10px 18px;border-radius:12px;font-size:14px;z-index:90;opacity:0;
  transition:all .3s;max-width:88vw;text-align:center;box-shadow:var(--shadow);
  pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ---------- home hub ---------- */
.home-hero{padding:20px 4px 16px}
.home-search{
  display:flex;align-items:center;gap:9px;width:100%;text-align:start;color:var(--txt3);
  padding:12px 14px;border-radius:14px;background:var(--card);border:1px solid var(--line);
  box-shadow:var(--cardshadow);margin-bottom:14px;font-size:14.5px;
}
.dash-grid{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;margin-bottom:16px}
.dash-grid::-webkit-scrollbar{display:none}
.dash-tile{
  flex:0 0 auto;min-width:112px;text-align:start;padding:12px 13px;border-radius:14px;
  background:var(--card);border:1px solid var(--line);color:var(--txt);box-shadow:var(--cardshadow);
}
.dash-tile .dt-l{font-size:11px;color:var(--txt2);font-weight:500}
.dash-tile .dt-v{font-size:19px;font-weight:700;color:var(--acc);margin-top:3px;white-space:nowrap}
.dash-tile .dt-s{font-size:11px;color:var(--txt3);margin-top:1px}

/* native date/time pickers have a large intrinsic width — force them to shrink
   to their column so they never overflow into an adjacent field */
.field{min-width:0}
/* iOS Safari's native date/time controls have an intrinsic min width that can
   overflow a grid cell and overlap the neighbour. -webkit-appearance:none makes
   them render as a normal box that respects the cell; the picker still opens. */
input[type="time"],input[type="date"],input[type="datetime-local"],input[type="month"]{
  -webkit-appearance:none;appearance:none;
  width:100%;min-width:0;max-width:100%;box-sizing:border-box;overflow:hidden}
.grid2 .field,.grid3m .field,.grid4 .field{overflow:hidden}

:focus-visible{outline:2px solid var(--acc);outline-offset:2px;border-radius:8px}

.rc-filters{display:flex;gap:7px;overflow-x:auto;padding-bottom:11px;scrollbar-width:none}
.rc-filters::-webkit-scrollbar{display:none}
.rc-chip{flex:0 0 auto;padding:7px 13px;border-radius:18px;background:var(--card2);border:1px solid var(--line2);color:var(--txt2);font-size:13px;font-weight:500}
.rc-chip.on{background:var(--acc-soft);border-color:var(--acc);color:var(--acc)}
.rc-search{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line2);border-radius:12px;padding:0 12px;margin-bottom:14px;color:var(--txt3)}
.rc-search input{flex:1;border:none;background:none;padding:11px 0;color:var(--txt);min-height:40px}
.recipe-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.recipe-card{display:flex;flex-direction:column;text-align:start;border-radius:15px;overflow:hidden;background:var(--card);border:1px solid var(--line2)}
.recipe-card:active{transform:scale(.98)}
.rc-hero{position:relative;aspect-ratio:16/10;overflow:hidden;background:linear-gradient(135deg,hsl(var(--h,30) 44% 33%),hsl(var(--h,30) 40% 19%))}
.rc-hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.rc-hero .rc-ph{position:absolute;inset:0;display:none;align-items:center;justify-content:center;color:rgba(255,255,255,.55)}
.rc-hero.noimg .rc-ph{display:flex}
.rc-hero.big{aspect-ratio:16/9;border-radius:16px}
.rc-body{padding:11px 12px 13px;display:flex;flex-direction:column;gap:5px}
.rc-nm{font-size:14px;font-weight:600;color:var(--txt);line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rc-macros{font-size:12px;color:var(--txt2)}
.rc-tags{display:flex;flex-wrap:wrap;gap:5px}
.rc-tag{font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:20px;background:var(--acc-soft);color:var(--acc)}
.rc-macrobar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}
.rcm{background:var(--card);border:1px solid var(--line2);border-radius:12px;padding:12px 6px;text-align:center}
.rcm b{display:block;font-size:19px;font-weight:700;color:var(--txt)}
.rcm span{font-size:11px;color:var(--txt2)}
.rc-note{font-size:12.5px;color:var(--txt2);background:var(--card2);border:1px solid var(--line2);border-radius:11px;padding:9px 12px;margin-top:12px;display:flex;gap:7px;align-items:flex-start}
.rc-note svg{color:var(--acc);flex:0 0 auto;margin-top:1px}
.rc-list,.rc-steps{margin:8px 0 0;padding-inline-start:1.2em}
.rc-list li,.rc-steps li{margin:.3em 0;line-height:1.45}
.rc-formimg{width:100%;border-radius:12px;margin-bottom:10px;max-height:220px;object-fit:cover;display:block}
/* wellness check-in */
.mood-faces{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:6px}
.mood-face{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 2px;border-radius:13px;background:transparent;border:1px solid transparent;transition:transform .12s}
.mood-face .mf-e{font-size:30px;line-height:1;filter:grayscale(.55) opacity(.72);transition:filter .15s,transform .15s}
.mood-face .mf-l{font-size:10.5px;color:var(--txt2);font-weight:500}
.mood-face.on{background:hsl(var(--fh) 55% 50% / .14);border-color:hsl(var(--fh) 60% 55% / .6)}
.mood-face.on .mf-e{filter:none;transform:scale(1.12)}
.mood-face.on .mf-l{color:var(--txt);font-weight:650}
.mood-face:active{transform:scale(.94)}
.mood-lift{display:flex;gap:12px;align-items:flex-start;padding:15px 16px;margin-bottom:14px;border-radius:15px;background:linear-gradient(135deg,var(--acc-soft),var(--card));border:1px solid var(--acc);animation:liftIn .32s cubic-bezier(.2,.8,.2,1)}
.mood-lift .ml-ic{width:36px;height:36px;min-width:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--acc);color:var(--btn-ink)}
.mood-lift .ml-tx{flex:1;min-width:0}
.mood-lift .ml-q{font-size:15px;line-height:1.5;color:var(--txt);font-weight:500}
.mood-lift .ml-by{font-size:12.5px;color:var(--txt2);margin-top:5px}
.mood-lift .ml-note{font-size:12.5px;color:var(--txt2);line-height:1.45;margin-top:9px;padding-top:9px;border-top:1px solid var(--line2)}
.mood-lift .ml-actions{display:flex;gap:8px;margin-top:11px}
.mood-lift .ml-btn{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:600;padding:7px 12px;border-radius:18px;background:var(--acc);color:var(--btn-ink)}
.mood-lift .ml-btn.ghost{background:transparent;border:1px solid var(--line2);color:var(--txt2)}
@keyframes liftIn{from{opacity:0;transform:translateY(-6px) scale(.98)}}
@media(prefers-reduced-motion:reduce){.mood-lift{animation:none}}
.ci-factors{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px}
.ci-fac{padding:7px 13px;border-radius:18px;background:var(--card2);border:1px solid var(--line2);color:var(--txt2);font-size:13px;font-weight:500}
.ci-fac.on{background:var(--acc-soft);border-color:var(--acc);color:var(--acc)}
.wellness-score{text-align:center;margin-top:14px}
.wellness-score .ws-l{font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--txt2);font-weight:600}
.wellness-score .ws-num{font-size:52px;font-weight:800;line-height:1.05;margin:6px 0 2px;letter-spacing:-.02em}
.wellness-score .ws-sub{font-size:12.5px;color:var(--txt2)}
.ci-history{display:flex;flex-direction:column;gap:8px}
.ci-hist{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:13px;background:var(--card);border:1px solid var(--line2)}
.ci-hist .ci-h-face{font-size:24px;line-height:1}
.ci-hist .ci-h-tx{flex:1;display:flex;flex-direction:column;gap:1px;min-width:0}
.ci-hist .ci-h-d{font-size:13px;font-weight:600;color:var(--txt)}
.ci-hist .ci-h-g{font-size:12px;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-hist .ci-h-s{font-size:15px;font-weight:700;color:var(--acc);flex:0 0 auto}
.opt{font-weight:400;font-size:11px;color:var(--txt2);opacity:.7;margin-inline-start:5px}
.review-card{display:flex;align-items:center;gap:12px;width:100%;text-align:start;margin:14px 0 2px;padding:15px 16px;border-radius:16px;background:var(--card);border:1px solid var(--line2)}
.review-card:active{transform:scale(.99)}
.review-card .rc-ic{width:40px;height:40px;min-width:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:var(--acc-soft);color:var(--acc)}
.review-card .rc-tx{flex:1;display:flex;flex-direction:column;gap:2px}
.review-card .rc-nm{font-weight:650;font-size:15px;color:var(--txt)}
.review-card .rc-ds{font-size:12.5px;color:var(--txt2);line-height:1.35}
.review-card .rc-ar{color:var(--txt2)}
.wr-note{font-size:12px;color:var(--txt2);line-height:1.4;background:var(--card2);border:1px solid var(--line2);border-radius:11px;padding:9px 12px;margin:4px 0 14px;display:flex;gap:7px;align-items:flex-start}
.wr-note svg{flex:0 0 auto;margin-top:1px;color:var(--acc)}
.wr-sec{margin-bottom:16px}
.wr-h{display:flex;align-items:center;gap:8px;font-weight:600;font-size:13.5px;color:var(--txt);margin:0 2px 9px}
.wr-dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.wr-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}
.wr-tile{background:var(--card);border:1px solid var(--line2);border-radius:13px;padding:12px 13px}
.wr-tile.empty{opacity:.6}
.wr-l{font-size:11.5px;color:var(--txt2);text-transform:uppercase;letter-spacing:.03em}
.wr-v{font-size:22px;font-weight:700;color:var(--txt);margin:3px 0 2px;line-height:1.1}
.wr-tile.empty .wr-v{color:var(--txt2)}
.wr-s{font-size:11.5px;color:var(--txt2);line-height:1.35}
.wr-ai{margin-top:6px}
.dash-chips{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:2px 1px 12px;scrollbar-width:none}
.dash-chips::-webkit-scrollbar{display:none}
.dash-chips .mode-chip{flex:0 0 auto}
.dash-stats{margin-bottom:6px}
.dash-sec-h{font-size:12px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:var(--txt2);margin:16px 2px 10px}
.trend-card{padding:14px 15px}
.tc-h{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:11px}
.tc-t{font-weight:600;font-size:14.5px;color:var(--txt)}
.tc-s{font-size:11.5px;color:var(--txt2)}
.chart{display:block;width:100%;height:96px}
.tc-empty{font-size:12.5px;color:var(--txt2);line-height:1.45;padding:14px 4px;text-align:center;background:var(--card2);border-radius:10px}
.home-chips{margin-top:2px}
.hdate{font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--acc);opacity:.85;margin-bottom:4px}
/* progress rings (Today) */
.ring-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:2px 0 10px}
.ring-card{display:flex;flex-direction:column;align-items:center;gap:2px;padding:14px 6px 12px;border-radius:16px;background:var(--card);border:1px solid var(--line2)}
.ring-card:active{transform:scale(.98)}
.ring-wrap{position:relative;width:82px;height:82px;display:flex;align-items:center;justify-content:center}
.ring-svg{display:block}
.ring-arc{animation:ringSweep .9s cubic-bezier(.34,0,.24,1) both}
@keyframes ringSweep{from{stroke-dashoffset:233}}
.ring-mid{animation:ringMid .5s ease both;animation-delay:.15s}
@keyframes ringMid{from{opacity:0;transform:scale(.85)}}
@media(prefers-reduced-motion:reduce){.ring-arc,.ring-mid{animation:none}}
.ring-mid{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;letter-spacing:-.01em}
.ring-lb{font-size:11.5px;color:var(--txt);font-weight:550;margin-top:7px;text-align:center;line-height:1.15}
.ring-sb{font-size:10.5px;color:var(--txt2);text-align:center}
.mini-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:2px}
.mini-tile{display:flex;align-items:center;gap:9px;padding:11px 12px;border-radius:13px;background:var(--card);border:1px solid var(--line2);text-align:start}
.mini-tile:active{transform:scale(.98)}
.mini-tile .mt-ic{width:32px;height:32px;min-width:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:var(--acc-soft);color:var(--acc)}
.mini-tile .mt-tx{display:flex;flex-direction:column;gap:0;min-width:0;flex:1}
.mini-tile .mt-l{font-size:10.5px;color:var(--txt2);text-transform:uppercase;letter-spacing:.03em}
.mini-tile .mt-v{font-size:14px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-tile .mt-s{font-size:11px;color:var(--txt2)}
.today-custrow{display:flex;justify-content:flex-end;margin:-2px 0 8px}
.today-customize{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--txt2);padding:6px 11px;border-radius:16px;background:var(--card2);border:1px solid var(--line2)}
.today-customize:active{transform:scale(.96)}
.today-empty2{font-size:13px;color:var(--txt2);text-align:center;padding:18px 12px;background:var(--card);border:1px solid var(--line2);border-radius:14px}
.widget-sheet{max-height:78vh;display:flex;flex-direction:column;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 10px)}
.ws-head{display:flex;align-items:center;justify-content:space-between;padding:0 4px 4px}
.ws-done{font-size:14px;font-weight:600;color:var(--acc);padding:6px 10px}
.ws-body{overflow-y:auto;-webkit-overflow-scrolling:touch;margin-top:4px}
.ws-cat{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--txt3);margin:14px 6px 6px}
.ws-row{display:flex;align-items:center;justify-content:space-between;width:100%;text-align:start;padding:12px 12px;border-radius:12px;background:transparent;border:1px solid transparent}
.ws-row.on{background:var(--acc-soft);border-color:color-mix(in srgb,var(--acc) 40%,transparent)}
.ws-row:active{transform:scale(.99)}
.ws-rl{font-size:14.5px;font-weight:500;color:var(--txt);display:flex;align-items:center;gap:8px}
.ws-kind{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;color:var(--txt3);background:var(--card2);padding:2px 7px;border-radius:10px}
.ws-row.on .ws-kind{color:var(--txt2)}
.ws-tog{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--line2);display:flex;align-items:center;justify-content:center;color:var(--acc);flex:0 0 auto}
.ws-row.on .ws-tog{border-color:var(--acc);background:var(--acc-soft)}
.recent-chats{display:flex;flex-direction:column;gap:8px}
.recent-chat{display:flex;align-items:center;gap:11px;width:100%;text-align:start;padding:12px 14px;border-radius:13px;background:var(--card);border:1px solid var(--line2)}
.recent-chat:active{transform:scale(.99)}
.recent-chat .rch-dot{width:9px;height:9px;min-width:9px;border-radius:50%}
.recent-chat .rch-tx{flex:1;display:flex;flex-direction:column;gap:1px;min-width:0}
.recent-chat .rch-nm{font-size:14px;font-weight:550;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.recent-chat .rch-ds{font-size:11.5px;color:var(--txt2)}
.recent-chat .rch-ar{color:var(--txt2)}
.today-empty{display:flex;gap:12px;align-items:flex-start;padding:18px 16px;border-radius:15px;background:var(--card);border:1px solid var(--line2)}
.today-empty svg{color:var(--acc);flex:0 0 auto;margin-top:2px}
.today-empty b{font-size:15px;color:var(--txt)}
/* floating quick-add */
.fab{position:absolute;right:18px;bottom:calc(var(--tabh,64px) + env(safe-area-inset-bottom,0px) + 16px);width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--acc);color:var(--acc-ink,#0d0f14);box-shadow:0 8px 24px rgba(0,0,0,.35);z-index:40;transition:transform .16s}
.fab:active{transform:scale(.93)}
.fab.open{background:var(--card);color:var(--txt);border:1px solid var(--line2)}
.qa-scrim{position:absolute;inset:0;background:rgba(0,0,0,.62);z-index:55;animation:qaFade .18s ease;backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
.qa-sheet{position:absolute;left:0;right:0;bottom:0;z-index:56;background:var(--sheet-bg,#161B29);backdrop-filter:blur(30px) saturate(1.5);-webkit-backdrop-filter:blur(30px) saturate(1.5);border-radius:22px 22px 0 0;border-top:1px solid var(--line2);box-shadow:0 -14px 44px rgba(0,0,0,.5);padding:8px 14px calc(env(safe-area-inset-bottom,0px) + 18px);animation:qaUp .22s cubic-bezier(.2,.8,.2,1)}
.qa-grip{width:38px;height:4px;border-radius:2px;background:var(--line2);margin:6px auto 8px}
.qa-h{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--txt2);margin:2px 4px 10px}
.qa-item{display:flex;align-items:center;gap:13px;width:100%;text-align:start;padding:12px 8px;border-radius:12px;background:transparent}
.qa-item:active{background:var(--card2)}
.qa-item .qa-ic{width:38px;height:38px;min-width:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;background:var(--acc-soft);color:var(--acc)}
.qa-item .qa-tx{flex:1;display:flex;flex-direction:column;gap:1px}
.qa-item .qa-nm{font-size:15px;font-weight:550;color:var(--txt)}
.qa-item .qa-ds{font-size:12px;color:var(--txt2)}
.qa-item .qa-ar{color:var(--txt2)}
@keyframes qaFade{from{opacity:0}to{opacity:1}}
@keyframes qaUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.attach-pill{
  display:inline-flex;align-items:center;gap:7px;background:var(--acc-soft);border:1px solid color-mix(in srgb,var(--acc) 30%,transparent);
  border-radius:10px;padding:5px 10px;font-size:12.5px;color:var(--txt);margin:0 12px 6px;
}
.attach-pill b{max-width:46vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}

/* ---------- nutrition ---------- */
.bars{display:flex;flex-direction:column;gap:10px}
.bar-line{display:flex;flex-direction:column;gap:4px}
.bar-top{display:flex;justify-content:space-between;font-size:13px}
.bar-top .lab{font-weight:600}
.bar-top .val{color:var(--txt2)}
.bar{height:9px;border-radius:6px;background:var(--track);overflow:hidden}
.bar i{display:block;height:100%;border-radius:6px;background:var(--acc);width:0;transition:width .5s ease,background .3s}
.bar-line.done .bar i{background:var(--green)}
.bar-line.over .bar i{background:var(--amber)}
.bar-top .st{font-weight:700}
.bar-line.done .st{color:var(--green)}
.bar-line.over .st{color:var(--amber)}
.glasses{display:flex;flex-wrap:wrap;gap:4px;margin:10px 0 10px}
.glass{
  width:40px;height:40px;padding:5px;display:flex;align-items:center;justify-content:center;
  transition:transform .12s,color .2s;color:var(--txt3);background:none;border:none;border-radius:50%;
}
.glass:active{transform:scale(.88)}
.glass.f{color:var(--water)}
.glass-svg{width:100%;height:100%}
.day-group{margin-bottom:12px}
.day-head{
  display:flex;align-items:center;gap:8px;width:100%;padding:12px 14px;min-height:48px;
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);color:var(--txt);
}
.day-head .dt{font-weight:600;font-size:14px}
.day-head .sum{margin-inline-start:auto;font-size:12.5px;color:var(--txt2);text-align:end}
.day-head .chev{color:var(--txt3);transition:transform .2s;font-size:12px}
.day-group.openday .day-head{border-bottom-left-radius:0;border-bottom-right-radius:0}
.day-group.openday .chev{transform:rotate(90deg)}
.day-items{border:1px solid var(--line);border-top:none;border-radius:0 0 var(--radius) var(--radius);background:var(--bg2);overflow:hidden}
.food-it{display:flex;align-items:center;gap:10px;padding:10px 14px;border-top:1px solid var(--line)}
.food-it:first-child{border-top:none}
.meal-h{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 14px;border-top:1px solid var(--line);
  background:var(--key);font-size:11.5px;font-weight:750;letter-spacing:.05em;text-transform:uppercase;color:var(--txt2)}
.meal-h:first-child{border-top:none}
.meal-h .mh-sum{font-weight:600;letter-spacing:0;text-transform:none;color:var(--txt3);font-size:11.5px}
.day-items .food-it + .meal-h{border-top:1px solid var(--line2)}
.food-it .nm{font-size:14.5px;font-weight:500}
.food-it .meta{font-size:12px;color:var(--txt2)}
.food-it .del{margin-inline-start:auto;color:var(--txt3);font-size:17px;min-width:38px;min-height:38px;display:flex;align-items:center;justify-content:center;border-radius:9px}
.food-it .del:active{background:rgba(232,87,87,.15);color:var(--red)}
.ac-wrap{position:relative}
.ac-list{
  position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:30;background:var(--card2);
  border:1px solid var(--line2);border-radius:12px;overflow:hidden;max-height:230px;overflow-y:auto;
  box-shadow:var(--shadow);
}
.ac-list button{display:flex;justify-content:space-between;gap:10px;width:100%;padding:11px 13px;text-align:start;color:var(--txt);font-size:14px;border-top:1px solid var(--line)}
.ac-list button:first-child{border-top:none}
.ac-list button:active{background:var(--acc-soft)}
.ac-list .m{color:var(--txt2);font-size:12px;white-space:nowrap}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.grid3m{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.grid4 .field,.grid2 .field,.grid3m .field{margin-bottom:0}
.review-item{background:var(--bg2);border:1px solid var(--line2);border-radius:12px;padding:12px;margin-bottom:10px}
.review-item .warn{color:var(--amber);font-size:12.5px;margin-top:6px}
.review-item .err{color:var(--red);font-size:12.5px;margin-top:6px}
.rv-scale{background:var(--gold-soft);border:1px solid var(--line2);border-radius:10px;padding:10px 11px;margin-bottom:9px;display:flex;flex-wrap:wrap;align-items:center;gap:8px}
.rv-scale label{font-size:13px;font-weight:600;color:var(--txt)}
.rv-scale input{flex:0 0 88px;margin:0}
.rv-scale .rv-unit{font-size:13.5px;font-weight:600;color:var(--txt2)}
.rv-scale .rv-pack{flex:0 0 auto;font-size:12px;font-weight:700;color:var(--gold);background:var(--card);border:1px solid var(--line2);padding:6px 11px;border-radius:99px}
.rv-scale .rv-pack:active{transform:scale(.96)}
.rv-scale .rv-note{flex-basis:100%;font-size:11.5px;color:var(--txt2);margin-top:1px}
/* "I cooked this" ingredient breakdown */
.dish-break{margin-top:12px;border-top:1px solid var(--line2);padding-top:4px}
.dish-line{display:flex;justify-content:space-between;align-items:baseline;gap:10px;padding:4.5px 0;border-bottom:1px dashed var(--line);font-size:12.5px;color:var(--txt2)}
.dish-line i{font-style:normal;color:var(--txt3);font-size:11.5px}
.dish-line span:last-child{white-space:nowrap;unicode-bidi:plaintext}
.dish-line.tot{color:var(--txt);font-weight:600;border-bottom:none;padding:6px 0 0}
.dish-line.tot span:first-child{font-weight:500;color:var(--txt2)}
/* undo snackbar */
.snackbar{position:fixed;left:50%;transform:translateX(-50%) translateY(20px);bottom:calc(72px + env(safe-area-inset-bottom));z-index:70;
  display:flex;align-items:center;gap:14px;padding:11px 12px 11px 16px;border-radius:12px;background:var(--card2);border:1px solid var(--line2);
  box-shadow:0 10px 30px rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;max-width:calc(100% - 28px)}
.snackbar.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
.snackbar #snackMsg{font-size:13.5px;color:var(--txt)}
.snackbar #snackBtn{flex:0 0 auto;font-size:13px;font-weight:700;color:var(--gold);background:none;padding:6px 10px;border-radius:8px}
.snackbar #snackBtn:active{background:var(--gold-soft)}
/* "new version available" banner — pinned above the tab bar */
.upd-bar{position:fixed;left:50%;transform:translateX(-50%) translateY(-16px);top:calc(var(--safe-top) + 8px);z-index:80;
  display:flex;align-items:center;gap:12px;padding:9px 10px 9px 15px;border-radius:12px;background:var(--card2);border:1px solid var(--gold);
  box-shadow:0 10px 30px rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;max-width:calc(100% - 24px)}
.upd-bar.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
.upd-bar .um{font-size:13px;color:var(--txt);font-weight:600}
.upd-bar .ub{flex:0 0 auto;font-size:13px;font-weight:700;color:var(--gold);background:var(--gold-soft);padding:7px 13px;border-radius:8px}
.upd-bar .ub:active{transform:scale(.96)}
.upd-bar .ux{flex:0 0 auto;color:var(--txt3);background:none;padding:6px 8px;font-size:15px;line-height:1}
/* food entry edit button */
.food-it .edit,.food-it .mmove{flex:0 0 auto;color:var(--txt3);min-width:34px;min-height:36px;display:flex;align-items:center;justify-content:center;border-radius:9px;background:none}
.food-it .edit:active,.food-it .mmove:active{background:var(--key);color:var(--acc)}
.food-it .mmove.on{color:var(--acc);background:var(--acc-soft)}
.meal-pick{display:flex;gap:6px;padding:8px 14px 11px;background:var(--bg2);border-top:1px solid var(--line)}
.meal-pick button{flex:1 1 0;padding:8px 4px;border-radius:8px;border:1px solid var(--line2);background:var(--card);color:var(--txt2);font-size:12px;font-weight:600}
.meal-pick button.on{color:var(--gold);border-color:var(--gold);background:var(--gold-soft)}
.meal-pick button:active{transform:scale(.96)}
.edit-banner{display:flex;align-items:center;gap:10px;padding:9px 12px;margin-bottom:10px;border-radius:10px;background:var(--acc-soft);border:1px solid var(--line2);font-size:13px;color:var(--txt2)}
.edit-banner button{flex:0 0 auto;margin-inline-start:auto;width:auto}
/* crash recovery screen */
.crash{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.crash-box{max-width:420px;text-align:center;background:var(--card);border:1px solid var(--line2);border-radius:18px;padding:26px 22px}
.crash-t{font-size:19px;font-weight:750;margin-bottom:8px}
.crash-d{font-size:14px;color:var(--txt2);line-height:1.5;margin-bottom:12px}
.crash-err{font-size:11.5px;color:var(--txt3);font-family:ui-monospace,monospace;word-break:break-word;background:var(--bg2);border-radius:8px;padding:8px 10px;margin-bottom:16px}
.crash-btns{display:flex;gap:10px;justify-content:center}
.crash-btns .btn{width:auto}
.fold>h3{cursor:pointer;user-select:none;margin-bottom:0}
.fold>h3 .chev{margin-inline-start:auto;color:var(--txt3);transition:transform .2s;font-size:12px}
.fold.open>h3{margin-bottom:10px}
.fold.open>h3 .chev{transform:rotate(90deg)}
.fold>.fold-body{display:none}
.fold.open>.fold-body{display:block}

/* ---------- body comp ---------- */
.ib-entry{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:13px 14px;margin-bottom:10px}
.ib-entry .hd{display:flex;align-items:center;margin-bottom:8px}
.ib-entry .hd .d{font-weight:600;font-size:14px}
.ib-entry .hd .del{margin-inline-start:auto;color:var(--txt3);min-width:38px;min-height:38px;display:flex;align-items:center;justify-content:center;border-radius:9px}
.ib-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.ib-cell{background:var(--bg2);border-radius:10px;padding:8px 9px}
.ib-cell .k{font-size:11px;color:var(--txt3);letter-spacing:.02em}
.ib-cell .v{font-size:15.5px;font-weight:600;margin-top:1px}
.ib-cell .dv{font-size:11.5px;font-weight:600;margin-top:1px}
.dv.good{color:var(--green)}.dv.bad{color:var(--amber)}.dv.neu{color:var(--txt2)}

/* ---------- settings ---------- */
.set-row{display:flex;align-items:center;gap:10px;padding:13px 2px;border-top:1px solid var(--line);min-height:52px}
.set-row:first-child{border-top:none}
.set-row .k{font-size:14.5px}
.set-row .desc{font-size:12px;color:var(--txt3)}
.set-row .end{margin-inline-start:auto;display:flex;align-items:center;gap:8px}
.dom-color{width:16px;height:16px;border-radius:50%}
/* ---- Settings: sectioned, best-in-class layout ---- */
.set-hero{display:flex;align-items:center;gap:15px;padding:18px;margin-bottom:6px;border:1px solid var(--line);border-radius:20px;
  background:linear-gradient(135deg,var(--gold-soft),transparent 70%)}
.set-avatar{width:56px;height:56px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;
  font-size:24px;font-weight:800;color:var(--btn-ink);background:linear-gradient(150deg,var(--gold),color-mix(in srgb,var(--gold) 70%,#fff))}
.set-hero-nm{font-size:19px;font-weight:750;line-height:1.15}
.set-hero-sub{font-size:12.5px;color:var(--txt2);margin-top:3px}
.set-nav{position:sticky;top:0;z-index:6;display:flex;gap:8px;overflow-x:auto;padding:11px 0;margin:2px 0 4px;
  background:var(--bg);-webkit-overflow-scrolling:touch;scrollbar-width:none}
.set-nav::-webkit-scrollbar{display:none}
.set-nav button{flex:0 0 auto;padding:7px 15px;border-radius:99px;border:1px solid var(--line2);background:var(--card);
  color:var(--txt2);font-size:12.5px;font-weight:600;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;transition:transform .12s,color .12s,border-color .12s}
.set-nav button:active{transform:scale(.95)}
.set-nav button.on{color:var(--gold);border-color:var(--gold);background:var(--gold-soft)}
.set-group-label{font-size:11.5px;font-weight:750;letter-spacing:.09em;text-transform:uppercase;color:var(--txt3);margin:20px 6px 9px;display:flex;align-items:center;gap:7px}
.set-status{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--txt2);
  padding:4px 10px;border-radius:99px;background:var(--key)}
.set-status .dot{width:8px;height:8px;border-radius:50%;background:var(--txt3);box-shadow:0 0 0 3px color-mix(in srgb,var(--txt3) 22%,transparent)}
.set-status.on{color:var(--green)}
.set-status.on .dot{background:var(--green);box-shadow:0 0 0 3px color-mix(in srgb,var(--green) 22%,transparent)}
.card-h-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.card-h-row h3{margin:0}
.sheet-mask{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:60;opacity:0;transition:opacity .25s}
.sheet-mask.show{opacity:1}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:61;background:var(--sheet-bg,#161B29);
  backdrop-filter:blur(30px) saturate(1.5);-webkit-backdrop-filter:blur(30px) saturate(1.5);
  border-radius:20px 20px 0 0;border:1px solid var(--line2);border-bottom:none;box-shadow:0 -14px 44px rgba(0,0,0,.5);
  padding:16px 16px calc(var(--safe-bot) + 18px);max-height:86vh;overflow-y:auto;
  transform:translateY(105%);transition:transform .3s cubic-bezier(.32,.72,.35,1);
}
.sheet.show{transform:translateY(0)}
.sheet .grab{width:38px;height:4px;border-radius:3px;background:var(--line2);margin:0 auto 14px}
@media(min-width:700px){
  .content{max-width:720px;margin:0 auto;width:100%}
  .chatbar .inner{max-width:696px;margin:0 auto}
  .sheet{max-width:560px;margin:0 auto;left:0;right:0}
}

/* the floating + must never sit on top of the last card — give Home scroll clearance */
.fab-clear{height:84px;flex:0 0 auto}

/* scale row under trend charts (peak / avg / points) */
.tc-meta{display:flex;gap:14px;margin-top:7px;font-size:11.5px;color:var(--txt3)}
.tc-meta b{color:var(--txt2);font-weight:650}

/* ---------- Insights time-range toggle ---------- */
.ins-range-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
.ins-range{flex-wrap:nowrap}
.ins-range button{flex:0 0 auto;padding:6px 11px;font-size:12.5px}

/* ---------- iOS install hint ---------- */
.ios-hint{position:relative;padding:13px 40px 13px 14px;margin-bottom:12px;border:1px solid var(--line2);border-radius:14px;background:linear-gradient(135deg,var(--gold-soft),transparent 78%)}
.ios-hint .ih-x{position:absolute;top:8px;right:8px;color:var(--txt3);background:none;padding:6px;min-width:30px;min-height:30px}
.ios-hint .ih-h{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:700;color:var(--gold);margin-bottom:5px}
.ios-hint .ih-b{font-size:12.5px;line-height:1.5;color:var(--txt2)}

/* ---------- weekly meal planner ---------- */
.plan-weeknav{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
.plan-wk{font-size:15px;font-weight:700;flex:1;text-align:center}
.plan-day{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px;box-shadow:var(--cardshadow)}
.plan-day.today{border-color:var(--acc)}
.plan-day-h{display:flex;align-items:baseline;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.pd-dow{font-size:14px;font-weight:750}
.pd-date{font-size:12px;color:var(--txt3)}
.pd-tot{margin-inline-start:auto;font-size:12px;font-weight:600;color:var(--acc)}
.pd-tg{color:var(--txt3);font-weight:400}
.plan-slot{border-top:1px solid var(--line2);padding:7px 0}
.plan-slot:first-of-type{border-top:none}
.ps-h{display:flex;align-items:center;justify-content:space-between}
.ps-nm{font-size:12px;font-weight:650;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em}
.ps-add{background:var(--bg2);color:var(--acc);border-radius:8px;width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.ps-items{margin-top:6px;display:flex;flex-direction:column;gap:5px}
.ps-it{display:flex;align-items:center;gap:8px;background:var(--bg2);border-radius:9px;padding:7px 9px}
.pi-nm{flex:1;min-width:0;font-size:13px;line-height:1.35}
.pi-mac{color:var(--txt3);font-size:11.5px;white-space:nowrap}
.pi-act{display:flex;gap:2px;flex:0 0 auto}
.pi-act button{background:none;color:var(--txt3);width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:7px}
.pi-act button:first-child{color:var(--green)}
.plan-pick .plan-pick-list{display:flex;flex-direction:column;gap:6px;max-height:38vh;overflow-y:auto}
.ppl-it{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--bg2);border-radius:10px;padding:11px 12px;text-align:start;width:100%}
.ppl-nm{font-size:13.5px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ppl-mac{color:var(--txt3);font-size:11.5px;white-space:nowrap;flex:0 0 auto}

/* ---------- grocery list ---------- */
.grocery{display:flex;flex-direction:column}
.groc-it{display:flex;align-items:center;gap:11px;padding:11px 4px;border-bottom:1px solid var(--line2);text-align:start;width:100%;background:none}
.groc-it:last-child{border-bottom:none}
.groc-it .gk{flex:0 0 auto;width:20px;height:20px;border:1.6px solid var(--line2);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--acc)}
.groc-it.on .gk{border-color:var(--acc);background:var(--acc-soft)}
.groc-it.on .gl{color:var(--txt3);text-decoration:line-through}
.groc-it .gl{font-size:14px;line-height:1.35}
.groc-it .gc{color:var(--txt3);font-size:12px}

/* ---------- right-to-left layout (Arabic, Urdu, Persian, Hebrew) ----------
   Flexbox and normal text flow mirror automatically under dir="rtl"; these
   rules fix the few pieces pinned with physical left/right or fixed padding. */
[dir="rtl"] .fab{right:auto;left:18px}
[dir="rtl"] .in-mic{right:auto;left:6px}
[dir="rtl"] .badge{right:auto;left:0}
[dir="rtl"] .ts-dot{right:auto;left:15%}
[dir="rtl"] .chatbar textarea,[dir="rtl"] input,[dir="rtl"] textarea{text-align:right}
[dir="rtl"] .home-hero,[dir="rtl"] .cat-title,[dir="rtl"] .set-hero-nm,[dir="rtl"] .set-hero-sub{text-align:right}
[dir="rtl"] .cat-back .i,[dir="rtl"] .cat-back svg{transform:scaleX(-1)}
[dir="rtl"] .fc-ar svg,[dir="rtl"] .chevR,[dir="rtl"] .food-it .edit svg{transform:scaleX(-1)}
/* Numeric stat slots ("0 / 2,000", "1.50 L / 2.50 L") get visually reordered by
   the bidi algorithm under RTL — plaintext isolates each so digits read LTR
   while genuinely Arabic text in the same slot still flows correctly. */
[dir="rtl"] .ring-mid,[dir="rtl"] .ring-sb,[dir="rtl"] .mt-v,[dir="rtl"] .mt-s,
[dir="rtl"] .bar-top .val,[dir="rtl"] .rev-stat .rv,[dir="rtl"] .wr-v,[dir="rtl"] .wr-s,
[dir="rtl"] .tc-meta,[dir="rtl"] .tc-s,[dir="rtl"] .pd-tot,[dir="rtl"] .rcm,
[dir="rtl"] .sc-macros,[dir="rtl"] .food-it .meta,[dir="rtl"] .pi-mac,[dir="rtl"] .ppl-mac{unicode-bidi:plaintext}
/* Untranslated English sentences/labels keep their own direction under RTL,
   so punctuation and counts ("4 earned", trailing periods) stay in order. */
[dir="rtl"] .nudge .nz-t,[dir="rtl"] .card h3 .tiny,[dir="rtl"] .tiny,[dir="rtl"] .muted,[dir="rtl"] .desc,[dir="rtl"] .empty-state{unicode-bidi:plaintext}

/* hydration indicator: a clean circle — filled disc when drunk, quiet ring when not */
function glassSvg(filled){
  return `<svg viewBox="0 0 28 28" class="glass-svg" aria-hidden="true">
    <circle cx="14" cy="14" r="10" fill="${filled ? "var(--water)" : "none"}"
      stroke="${filled ? "var(--water)" : "currentColor"}" stroke-width="1.8"/>
  </svg>`;
}

/* build & download an .ics calendar event with a 30-min reminder */
function icsDownload(dateStr, timeStr, summary, desc, id){
  const start = new Date(dateStr + "T" + (timeStr || "09:00"));
  if (isNaN(start)) return;
  const end = new Date(start.getTime() + 30 * 60000);
  const fm = d => d.getFullYear() + String(d.getMonth() + 1).padStart(2, "0") + String(d.getDate()).padStart(2, "0") +
    "T" + String(d.getHours()).padStart(2, "0") + String(d.getMinutes()).padStart(2, "0") + "00";
  const ei = s => String(s || "").replace(/\\/g, "\\\\").replace(/;/g, "\\;").replace(/,/g, "\\,").replace(/\n/g, "\\n");
  const ics = ["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//MIRA//EN","BEGIN:VEVENT",
    "UID:" + (id || uid()) + "@mira","DTSTAMP:" + fm(new Date()),"DTSTART:" + fm(start),"DTEND:" + fm(end),
    "SUMMARY:" + ei(summary), desc ? "DESCRIPTION:" + ei(desc) : "",
    "BEGIN:VALARM","TRIGGER:-PT30M","ACTION:DISPLAY","DESCRIPTION:" + ei(summary),"END:VALARM",
    "END:VEVENT","END:VCALENDAR"].filter(Boolean).join("\r\n");
  const blob = new Blob([ics], {type: "text/calendar"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = String(summary || "event").replace(/[^\w؀-ۿ -]/g, "").slice(0, 40) + ".ics";
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 4000);
}

function fileToB64(file){
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

// Interface language: null in "Match what I write" mode (chrome stays English).
function uiLang(){ const l = S.settings.lang; return (!l || l === "match") ? null : l; }
// Translate a core-chrome string; falls back to the English source for any
// language/string we don't ship a translation for.
function t(s){ const l = uiLang(); const d = l && TR[l]; return (d && d[s]) || s; }
// Collision-proof alias: many render functions declare `const t = todayStr()`,
// which shadows the translator. Use tr() inside those to translate safely.
const tr = s => t(s);
// Flip the whole layout to right-to-left when an RTL language is chosen.
function applyDir(){
  const l = uiLang();
  const rtl = !!(l && langIsRTL(l));
  document.documentElement.dir = rtl ? "rtl" : "ltr";
  document.documentElement.lang = l || "en";
}
// Short directive appended to standalone AI prompts so their text fields
// (names, notes, reasons, steps) come back in the user's chosen language.
function replyLangNote(){
  const code = S.settings.lang;
  if (!code || code === "match" || code === "en") return "";
  const L = LANGUAGES.find(x => x[0] === code);
  return L ? ` Write all human-readable text you output (names, notes, reasons, steps) in ${L[2]} (${L[1]}); keep JSON keys and numbers unchanged.` : "";
}

/* ===== On-device encryption (envelope: a random data key wrapped by your
   passphrase, and optionally by a Face ID / fingerprint passkey via WebAuthn
   PRF). AES-GCM 256 for data + key wrapping; PBKDF2 250k for the passphrase.
   The passphrase is always the master key; Face ID is a convenience layer. ===== */
const SEC = {
  te: new TextEncoder(), td: new TextDecoder(), ITER: 250000,
  b64(buf){ let s = ""; const b = new Uint8Array(buf); for (let i = 0; i < b.length; i++) s += String.fromCharCode(b[i]); return btoa(s); },
  ub64(s){ const bin = atob(s); const b = new Uint8Array(bin.length); for (let i = 0; i < bin.length; i++) b[i] = bin.charCodeAt(i); return b; },
  rand(n){ return crypto.getRandomValues(new Uint8Array(n)); },
  async kekFromPass(pass, salt){
    const base = await crypto.subtle.importKey("raw", SEC.te.encode(pass), "PBKDF2", false, ["deriveKey"]);
    return crypto.subtle.deriveKey({name: "PBKDF2", salt, iterations: SEC.ITER, hash: "SHA-256"}, base, {name: "AES-GCM", length: 256}, false, ["wrapKey", "unwrapKey"]);
  },
  async kekFromRaw(raw){
    const base = await crypto.subtle.importKey("raw", raw, "HKDF", false, ["deriveKey"]);
    return crypto.subtle.deriveKey({name: "HKDF", salt: SEC.te.encode("mira-prf-v1"), info: SEC.te.encode("kek"), hash: "SHA-256"}, base, {name: "AES-GCM", length: 256}, false, ["wrapKey", "unwrapKey"]);
  },
  genDEK(){ return crypto.subtle.generateKey({name: "AES-GCM", length: 256}, true, ["encrypt", "decrypt"]); },
  async wrapDEK(dek, kek){ const iv = SEC.rand(12); const ct = await crypto.subtle.wrapKey("raw", dek, kek, {name: "AES-GCM", iv}); return {iv: SEC.b64(iv), ct: SEC.b64(ct)}; },
  unwrapDEK(w, kek){ return crypto.subtle.unwrapKey("raw", SEC.ub64(w.ct), kek, {name: "AES-GCM", iv: SEC.ub64(w.iv)}, {name: "AES-GCM", length: 256}, true, ["encrypt", "decrypt"]); },
  async encData(dek, plaintext){ const iv = SEC.rand(12); const ct = await crypto.subtle.encrypt({name: "AES-GCM", iv}, dek, SEC.te.encode(plaintext)); return {iv: SEC.b64(iv), ct: SEC.b64(ct)}; },
  async decData(dek, d){ const pt = await crypto.subtle.decrypt({name: "AES-GCM", iv: SEC.ub64(d.iv)}, dek, SEC.ub64(d.ct)); return SEC.td.decode(pt); },
};

let S = BLANK();
let _encWrapper = null;   // when data is encrypted, holds the on-disk envelope until unlocked
try {
  const raw = localStorage.getItem("mira.data");
  if (raw){
    const parsed = JSON.parse(raw);
    if (parsed && parsed.mira_enc === 1) _encWrapper = parsed;        // encrypted — unlock before use
    else S = Object.assign(BLANK(), parsed);
  }
} catch (e) { console.warn("MIRA: could not load saved data", e); }

/* ---------------- keyboard-aware viewport ----------------
   iOS pans fixed layouts when the keyboard opens, cutting off the top
   and leaving a dead zone under the tab bar. Pinning the shell to the
   VisualViewport keeps it exactly over the visible area; while typing
   the tab bar hides so the input sits directly on the keyboard. */
function bindViewport(){
  const vv = window.visualViewport;
  if (!vv) return;
  let t = null;
  const isTyping = () => {
    const a = document.activeElement;
    return !!a && (a.tagName === "INPUT" || a.tagName === "TEXTAREA" || a.isContentEditable);
  };
  const apply = () => {
    const app = $("#app");
    if (!app) return;
    const kbOpen = (window.innerHeight - vv.height) > 100;
    app.style.top = vv.offsetTop + "px";
    app.style.height = vv.height + "px";
    app.style.bottom = "auto";
    document.body.classList.toggle("kb", kbOpen);
    // All scrolling lives inside .content, so the layout viewport should stay
    // at 0 — but only nudge it back when it has ACTUALLY drifted. Calling
    // scrollTo on every event was itself a jump.
    if (window.pageYOffset || window.pageXOffset) window.scrollTo(0, 0);
    if (kbOpen && R.tab === "chat"){
      const c = $("#content");
      if (c) c.scrollTop = c.scrollHeight;
    }
  };
  const queue = () => { clearTimeout(t); t = setTimeout(apply, 30); };
  // A visualViewport "scroll" while a field is focused is iOS panning to keep
  // the caret above the keyboard. Re-pinning the shell and resetting the scroll
  // there fights that pan, so the focused field flickers/jumps upward on every
  // keystroke. Ignore scroll events while typing — the keyboard height itself
  // only changes via "resize", which we still honour. This is the fix for the
  // "field flickers up while I type" report; it applies everywhere, not just
  // the cooked-dish form.
  const queueScroll = () => { if (isTyping()) return; queue(); };
  vv.addEventListener("resize", queue);
  vv.addEventListener("scroll", queueScroll);
  window.addEventListener("focusin", queue);
  window.addEventListener("focusout", queue);
  apply();
}

async function persist(){

/* Turn on encryption: wrap a fresh data key with the passphrase, verify the
   round-trip, and only then keep it. Returns nothing; throws on failure. */
async function encEnable(pass){
  const dek = await SEC.genDEK();
  const passSaltRaw = SEC.rand(16);
  const kek = await SEC.kekFromPass(pass, passSaltRaw);
  const passWrap = await SEC.wrapDEK(dek, kek);
  R._dek = dek;
  R._enc = {passSalt: SEC.b64(passSaltRaw), passWrap, prf: null};
  S.settings.encOn = true;
  await persist();
  // verify: re-read, unwrap with the passphrase, decrypt, confirm it parses
  const w = JSON.parse(localStorage.getItem("mira.data"));
  const kek2 = await SEC.kekFromPass(pass, SEC.ub64(w.passSalt));
  const dek2 = await SEC.unwrapDEK(w.passWrap, kek2);
  const parsed = JSON.parse(await SEC.decData(dek2, w.data));
  if (!parsed || !parsed.settings) throw new Error("verification failed");
}
async function encUnlockWith(dek, w){
  const parsed = JSON.parse(await SEC.decData(dek, w.data));
  S = Object.assign(BLANK(), parsed); window.S = S;
  R._dek = dek; R._enc = {passSalt: w.passSalt, passWrap: w.passWrap, prf: w.prf || null};
  _encWrapper = null;
  migrateChats(); applyTheme();
  R.mode = (S.domains[0] && S.domains[0].id) || "work"; R.convId = null;
  touchActivity();

}
async function encUnlockPass(pass){
  const w = _encWrapper; if (!w) return;
  const kek = await SEC.kekFromPass(pass, SEC.ub64(w.passSalt));

/* ---- Face ID / fingerprint via WebAuthn PRF ---- */
async function facePrfOutput(rawId, prfSalt){
  const assertion = await navigator.credentials.get({publicKey: {
    challenge: SEC.rand(32),
    allowCredentials: [{type: "public-key", id: rawId}],
    userVerification: "required", timeout: 60000,
    extensions: {prf: {eval: {first: prfSalt}}},
  }});
  const ext = assertion.getClientExtensionResults();
  return (ext && ext.prf && ext.prf.results && ext.prf.results.first) ? ext.prf.results.first : null;
}
async function faceRegister(){
  if (!window.PublicKeyCredential) throw new Error("Passkeys aren't supported on this browser.");
  if (!R._dek) throw new Error("Unlock first.");
  const prfSalt = SEC.rand(32);
  const cred = await navigator.credentials.create({publicKey: {
    challenge: SEC.rand(32),
    rp: {name: "MIRA"},
    user: {id: SEC.rand(16), name: (S.settings.name || "MIRA") + " · MIRA", displayName: S.settings.name || "MIRA"},
    pubKeyCredParams: [{type: "public-key", alg: -7}, {type: "public-key", alg: -257}],
    authenticatorSelection: {authenticatorAttachment: "platform", userVerification: "required", residentKey: "preferred"},
    timeout: 60000, extensions: {prf: {}},
  }});
  const prfOut = await facePrfOutput(cred.rawId, prfSalt);
  if (!prfOut) throw new Error("This device can't create a Face ID key for encryption (PRF unsupported).");
  const kek = await SEC.kekFromRaw(prfOut);
  const wrap = await SEC.wrapDEK(R._dek, kek);
  R._enc.prf = {credId: SEC.b64(cred.rawId), salt: SEC.b64(prfSalt), wrap};
  await persist();
}
async function faceUnlock(){
  const w = _encWrapper; if (!w || !w.prf) throw new Error("Face ID isn't set up.");
  const prfOut = await facePrfOutput(SEC.ub64(w.prf.credId), SEC.ub64(w.prf.salt));
  if (!prfOut) throw new Error("Couldn't derive the Face ID key.");
  const kek = await SEC.kekFromRaw(prfOut);
  const dek = await SEC.unwrapDEK(w.prf.wrap, kek);
  await encUnlockWith(dek, w);
}

    <div class="crash-t">Something went wrong</div>

// Apple/Fitbit-style progress ring
function ringSVG(pct, color){
  const size = 82, stroke = 8, r = (size - stroke) / 2, c = 2 * Math.PI * r;
  const p = Math.max(0, Math.min(1, pct / 100));
  const off = c * (1 - p);
  return `<svg class="ring-svg" viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" aria-hidden="true">
    <circle cx="${size / 2}" cy="${size / 2}" r="${r}" fill="none" stroke="var(--line2)" stroke-width="${stroke}"/>
    <circle class="ring-arc" cx="${size / 2}" cy="${size / 2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-linecap="round"
      stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 ${size / 2} ${size / 2})"/>
  </svg>`;
}
function ringCard(pct, color, center, label, sub, onclick){
  return `<button class="ring-card" onclick="${onclick}">
    <div class="ring-wrap">${ringSVG(pct, color)}<div class="ring-mid" style="color:${color}">${center}</div></div>
    <div class="ring-lb">${label}</div>
    <div class="ring-sb">${sub}</div>
  </button>`;
}

function homeDashHTML(){
  const sel = (S.settings.widgets || []);
  const rings = [], tiles = [];
  sel.forEach(id => {
    const meta = WIDGET_META.find(m => m.id === id); if (!meta) return;
    // one widget failing on odd data must not take the whole board down
    let d; try { d = widgetData(id); } catch (e) { console.error("MIRA widget error", id, e); return; }
    if (!d) return;
    if (d.kind === "ring") rings.push(ringCard(d.pct, d.color, d.center, d.label, d.sub, d.onclick));
    else tiles.push(`<button class="mini-tile" onclick="${d.onclick}"><span class="mt-ic">${ic(d.icon, 16)}</span><span class="mt-tx"><span class="mt-l">${d.label}</span><span class="mt-v">${d.val}</span>${d.sub ? `<span class="mt-s">${d.sub}</span>` : ""}</span></button>`);
  });
  const custom = `<button class="today-customize" onclick="M.widgetsOpen()">${ic("sliders", 14)} ${tr("Customize")}</button>`;
  const body = `${rings.length ? `<div class="ring-row">${rings.join("")}</div>` : ""}${tiles.length ? `<div class="mini-row">${tiles.join("")}</div>` : ""}`;
  return `<div class="today-custrow">${custom}</div>${body || `<div class="today-empty2">${tr("No widgets selected. Tap Customize to choose what you see here.")}</div>`}`;
}

// Gentle, contextual in-app reminders on Home — derived from today's own data,
// dismissible for the day. No background push; they simply appear when relevant.
function homeNudgesHTML(){
  const t = todayStr();
  const dismissed = (S.nudgeDismissed && S.nudgeDismissed.date === t) ? S.nudgeDismissed.ids : [];
  const hour = new Date().getHours();
  const n = [];
  const ci = (typeof todayCheckin === "function") ? todayCheckin() : null;
  if (!ci && hour >= 8) n.push({id: "checkin", icon: "smile", t: "You haven't done today's wellness check-in.", go: "M.goWellness()"});
  const glasses = S.water[t] || 0, goalGl = Math.max(1, Math.ceil((S.settings.waterGoal || 2500) / 250));
  if (glasses < goalGl && hour >= 15){ const left = goalGl - glasses; n.push({id: "water", icon: "droplet", t: `${left} more glass${left === 1 ? "" : "es"} to reach your water goal today.`, go: "M.goTab('food')"}); }
  const foods = (typeof dayFoods === "function") ? dayFoods(t) : [];
  if (!foods.length && hour >= 12) n.push({id: "food", icon: "plus", t: "Nothing in your food diary yet today.", go: "M.qa('food')"});
  const age = (typeof backupAgeDays === "function") ? backupAgeDays() : null;
  const hasData = (S.foods.length + ((S.convs || []).length)) > 3;
  if (hasData && (age === null || age >= 14)) n.push({id: "backup", icon: "database", t: age === null ? "Back up your data so nothing is lost." : `It's been ${age} days since your last backup.`, go: "M.goBackup()"});
  const show = n.filter(x => !dismissed.includes(x.id)).slice(0, 2);
  return show.map(x => `<div class="nudge">
    <span class="nz-i">${ic(x.icon, 18)}</span>
    <span class="nz-t">${esc(x.t)}</span>
    <button class="nz-go" onclick="${x.go}">${tr("Open")}</button>
    <button class="nz-x" aria-label="Dismiss" onclick="M.nudgeDismiss('${x.id}')">${ic("x", 16)}</button>
  </div>`).join("");
}

/* ---------------- weekly review (cross-domain) ---------------- */
function last7Dates(){
  const out = [];
  for (let k = 6; k >= 0; k--) out.push(new Date(Date.now() - k * 864e5).toLocaleDateString("en-CA"));
  return out;   // oldest first
}
// Aggregate the last 7 days across every domain. Every figure comes from logged data;
// categories with nothing logged are marked so, never faked as zero progress.
function weekStats(){
  const days = last7Dates();
  const from = days[0];
  const t = todayStr();
  const inRange = d => d && d >= from && d <= t;
  const tg = S.settings.targets || {};

  // Nutrition
  const foodDates = [...new Set((S.foods || []).filter(f => inRange(f.date)).map(f => f.date))];
  let kcalSum = 0, pSum = 0, proteinHitDays = 0;
  foodDates.forEach(d => { const tt = dayTotals(d); kcalSum += tt.kcal; pSum += tt.p; if (tg.protein && tt.p >= tg.protein * 0.9) proteinHitDays++; });
  const nDaysFood = foodDates.length;

  // Hydration
  let waterHitDays = 0, waterDaysLogged = 0;
  days.forEach(d => { const g = S.water[d] || 0; if (g){ waterDaysLogged++; if (g * 250 >= S.settings.waterGoal) waterHitDays++; } });

  // Training
  const ws = (S.workouts || []).filter(w => inRange(w.date));
  const trainDays = new Set(ws.map(w => w.date)).size;
  let sets = 0; ws.forEach(w => (w.items || []).forEach(it => sets += (it.sets || []).length));

  // Sleep
  const sl = (S.sleep || []).filter(e => inRange(e.date));
  const avgSleep = sl.length ? sl.reduce((a, e) => a + (+e.hours || 0), 0) / sl.length : null;

  // Fasting (completed sessions ending this week)
  const fasts = (((S.fasting || {}).log) || []).filter(f => f.end && new Date(f.end).toLocaleDateString("en-CA") >= from);
  const avgFast = fasts.length ? fasts.reduce((a, f) => a + (+f.hours || 0), 0) / fasts.length : null;

  // Tasks (state now; completion date isn't stored, so we report live state honestly)
  const openN = (S.tasks || []).filter(x => !x.done).length;
  const overdueN = (S.tasks || []).filter(x => !x.done && x.due && x.due < t).length;
  const totalTasks = (S.tasks || []).length;
  const doneN = totalTasks - openN;

  // Habits
  let habTotal = 0, habDone = 0;
  if ((S.habits || []).length) days.forEach(d => { const set = new Set(S.habitLog[d] || []); habTotal += S.habits.length; S.habits.forEach(h => { if (set.has(h.id)) habDone++; }); });

  // Focus
  const focusN = (S.focusLog || []).filter(f => inRange(f.date)).length;

  // Mood / energy
  const md = (S.mood || []).filter(e => inRange(e.date));
  const avgMood = md.length ? md.reduce((a, e) => a + (+e.mood || 0), 0) / md.length : null;
  const avgEnergy = md.length ? md.reduce((a, e) => a + (+e.energy || 0), 0) / md.length : null;

  // Budget (this calendar month)
  const ym = t.slice(0, 7);
  const spent = (S.expenses || []).filter(e => e.date && e.date.slice(0, 7) === ym).reduce((a, e) => a + (+e.amount || 0), 0);
  const income = (S.budget || {}).income || 0;

  return {days, from, tg, nDaysFood, avgKcal: nDaysFood ? kcalSum / nDaysFood : null, avgP: nDaysFood ? pSum / nDaysFood : null, proteinHitDays,
    waterHitDays, waterDaysLogged, ws: ws.length, trainDays, sets, sl: sl.length, avgSleep,
    fasts: fasts.length, avgFast, openN, overdueN, doneN, totalTasks, habTotal, habDone, focusN,
    md: md.length, avgMood, avgEnergy, spent, income};
}
