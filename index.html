    {t: "Hard days are part of the story, not the whole story. You've made it through every one so far."},
    {t: "This too shall pass.", by: "Proverb"},
    {t: "Fall seven times, stand up eight.", by: "Japanese proverb"},
    {t: "The wound is the place where the Light enters you.", by: "Rumi"},
    {t: "Be gentle with yourself today — you're doing the best you can with what you have right now."},
    {t: "You don't have to feel okay to be worthy of care. Rest counts as progress."},
    {t: "Even showing up here and checking in on yourself is a real step. That matters."},
  ],
  okay: [
    {t: "Every day may not be great, but there's usually something good in it — even a small thing."},
    {t: "Steady is underrated. A calm, ordinary day is a solid foundation."},
    {t: "Progress isn't always loud. Keep going, gently."},
    {t: "You showed up and checked in — that's a quiet win worth counting."},
  ],
};
function pickLift(mood){
  const bucket = mood <= 2 ? MOOD_LIFTS.low : MOOD_LIFTS.okay;
  return bucket[Math.floor(Math.random() * bucket.length)];
}
const CI_FACTORS = ["Work", "Sleep", "Exercise", "Health", "Family", "Friends", "Money", "Stress", "Food", "Weather"];
function todayCheckin(){ const t = todayStr(); return (S.checkins || []).find(c => c.date === t); }
function checkinScore(ci){
  if (!ci) return null;
  const parts = [];
  if (ci.mood) parts.push(ci.mood / 5 * 100);
  const sl = (S.sleep || []).find(s => s.date === ci.date); if (sl && sl.quality) parts.push(sl.quality / 5 * 100);
  const md = (S.mood || []).find(m => m.date === ci.date); if (md && md.energy) parts.push(md.energy / 5 * 100);
  return parts.length ? Math.round(parts.reduce((a, b) => a + b, 0) / parts.length) : null;
}
function scoreBasis(ci){
  const b = [];
  if (ci && ci.mood) b.push("mood");
  if ((S.sleep || []).some(s => s.date === ci.date && s.quality)) b.push("sleep quality");
  if ((S.mood || []).some(m => m.date === ci.date && m.energy)) b.push("energy");
  return b.join(" + ");
}

    ${d.mood && d.mood <= 3 && R.ciQuote ? `<div class="mood-lift">

      <div class="ml-tx">
        <div class="ml-q" dir="auto">${esc(R.ciQuote.t)}</div>
        ${R.ciQuote.by ? `<div class="ml-by">— ${esc(R.ciQuote.by)}</div>` : ""}
        ${d.mood === 1 ? `<div class="ml-note">If today feels heavy, you don't have to carry it alone — talking to someone you trust, or a professional, can genuinely help.</div>` : ""}

}

/* ---------------- weekly meal planner + grocery list ----------------
   Plan meals across a week from the recipe box and saved meals, see per-day
   macro totals against targets, log any planned item into the food log, and
   roll every planned recipe's ingredients into one consolidated grocery list. */
function planWeekDates(off){
  const base = new Date(); base.setHours(0, 0, 0, 0);
  const dow = (base.getDay() + 6) % 7;                 // 0 = Monday
  const mon = new Date(base.getTime() - (dow - (off || 0) * 7) * 864e5);
  const o = []; for (let k = 0; k < 7; k++) o.push(new Date(mon.getTime() + k * 864e5).toLocaleDateString("en-CA"));
  return o;
}
function planItems(date, meal){ const d = S.mealPlan[date]; return (d && d[meal]) || []; }
function planDayTotals(date){ const d = S.mealPlan[date] || {}; let k = 0, p = 0, n = 0; FOOD_MEALS.forEach(([m]) => (d[m] || []).forEach(it => { k += num(it.kcal); p += num(it.p); n++; })); return {k, p, n}; }
function planWeekLabel(off){ return off === 0 ? "This week" : off === 1 ? "Next week" : off === -1 ? "Last week" : (off > 0 ? `In ${off} weeks` : `${-off} weeks ago`); }

function plannerHTML(){
  if (R.groceryOpen) return groceryHTML();
  const off = R.planWeek || 0;
  const week = planWeekDates(off);
  const tg = S.settings.targets || {};
  const today = todayStr();
  const anyPlanned = week.some(d => planDayTotals(d).n > 0);
  return `
    <button class="cat-back" onclick="M.backToHome('health')">${ic("back", 18)} Home</button>
    <div class="cat-title"><div class="ch-nm">${t("Meal planner")}</div>
      <div class="ch-ds">Plan your week from recipes & saved meals, then build a grocery list</div></div>
    <div class="plan-weeknav">
      <button class="btn sm sec" aria-label="Previous week" onclick="M.planWeek(-1)">${ic("back", 15)}</button>
      <span class="plan-wk">${t(planWeekLabel(off))}</span>
      <button class="btn sm sec" aria-label="Next week" onclick="M.planWeek(1)">${ic("chevR", 15)}</button>
    </div>
    <div class="row" style="gap:8px;margin-bottom:12px">
      <button class="btn sec" style="flex:1" onclick="M.groceryShow()">${ic("list", 15)} ${t("Grocery list")}</button>
      ${anyPlanned ? `<button class="btn sm sec" onclick="M.planClearWeek()">${ic("trash", 14)} Clear week</button>` : ""}
    </div>
    ${week.map(date => {
      const dt = new Date(date + "T00:00:00");
      const tot = planDayTotals(date);
      const isToday = date === today;
      return `<div class="plan-day ${isToday ? "today" : ""}">
        <div class="plan-day-h">
          <span class="pd-dow">${dt.toLocaleDateString("en-GB", {weekday: "short"})}${isToday ? " · today" : ""}</span>
          <span class="pd-date">${dt.toLocaleDateString("en-GB", {day: "numeric", month: "short"})}</span>
          ${tot.n ? `<span class="pd-tot">${n0(tot.k)} kcal · ${n1(tot.p)}P${tg.kcal ? ` <span class="pd-tg">/ ${n0(tg.kcal)}</span>` : ""}</span>` : ""}
        </div>
        ${FOOD_MEALS.map(([m, ml]) => {
          const items = planItems(date, m);
          return `<div class="plan-slot">
            <div class="ps-h"><span class="ps-nm">${ml}</span><button class="ps-add" aria-label="Add ${ml}" onclick="M.planPick('${date}','${m}')">${ic("plus", 14)}</button></div>
            ${items.length ? `<div class="ps-items">${items.map((it, i) => `<div class="ps-it">
                <span class="pi-nm" dir="auto">${esc(it.name)}${it.kcal ? ` <span class="pi-mac">${n0(it.kcal)} kcal · ${n1(it.p)}P</span>` : ""}</span>
                <span class="pi-act">
                  <button aria-label="Log" title="Log to today" onclick="M.planLog('${date}','${m}',${i})">${ic("check", 13)}</button>
                  <button aria-label="Remove" onclick="M.planRemove('${date}','${m}',${i})">${ic("x", 13)}</button>
                </span></div>`).join("")}</div>` : ""}
          </div>`;
        }).join("")}
      </div>`;
    }).join("")}
    <div class="tiny" style="text-align:center;color:var(--txt2);margin:6px 0 2px">Macros shown are per planned serving from your recipes & saved meals — estimates where the source didn't publish exact values.</div>
    ${R.planPick ? planPickSheetHTML() : ""}`;
}

function planPickSheetHTML(){
  const {date, meal} = R.planPick;
  const ml = mealLabel(meal);
  const dt = new Date(date + "T00:00:00").toLocaleDateString("en-GB", {weekday: "long", day: "numeric", month: "short"});
  const recipes = S.recipes || [];
  const meals = S.meals || [];
  return `<div class="sheet-mask show" onclick="M.planPickClose()"></div>
    <div class="sheet show plan-pick" onclick="event.stopPropagation()">
      <div class="grab"></div>
      <h3 style="margin:0 0 4px">Add to ${ml} <span class="tiny" style="font-weight:400">· ${dt}</span></h3>
      <div class="field" style="margin:10px 0"><label>Quick add (name)</label>
        <input id="planFree" placeholder="e.g. Grilled chicken salad" dir="auto" onkeydown="if(event.key==='Enter')M.planAddFree()">
        <button class="btn sm" style="margin-top:8px;width:100%" onclick="M.planAddFree()">${ic("plus", 14)} Add name only</button></div>
      ${recipes.length ? `<div class="set-group-label" style="margin:6px 0 4px">From your recipes</div>
        <div class="plan-pick-list">${recipes.slice(0, 40).map(r => `<button class="ppl-it" onclick="M.planPickRecipe('${r.id}')">
          <span class="ppl-nm" dir="auto">${esc(r.name)}</span><span class="ppl-mac">${n0(r.per.kcal)} kcal · ${n1(r.per.p)}P</span></button>`).join("")}</div>` : ""}
      ${meals.length ? `<div class="set-group-label" style="margin:12px 0 4px">From saved meals</div>
        <div class="plan-pick-list">${meals.map((ml2, i) => { const tt = ml2.items.reduce((a, x) => ({k: a.k + num(x.kcal), p: a.p + num(x.p)}), {k: 0, p: 0}); return `<button class="ppl-it" onclick="M.planPickMeal(${i})">
          <span class="ppl-nm" dir="auto">${esc(ml2.name)}</span><span class="ppl-mac">${n0(tt.k)} kcal · ${n1(tt.p)}P</span></button>`; }).join("")}</div>` : ""}
      ${!recipes.length && !meals.length ? `<div class="muted" style="margin:8px 0">No recipes or saved meals yet — add a name above, or build your recipe box first.</div>` : ""}
      <button class="btn sec" style="width:100%;margin-top:12px" onclick="M.planPickClose()">Done</button>
    </div>`;
}

// Consolidate every planned recipe / saved-meal ingredient across the week into
// one de-duplicated checklist. Free-text items (no ingredients) are listed by name.
function groceryBuild(){
  const week = planWeekDates(R.planWeek || 0);
  const map = new Map();                       // key -> {label, count}
  week.forEach(date => FOOD_MEALS.forEach(([m]) => planItems(date, m).forEach(it => {
    const lines = (it.ing && it.ing.length) ? it.ing : [it.name];
    lines.forEach(raw => {
      const line = String(raw || "").trim(); if (!line) return;
      const key = line.toLowerCase();
      if (map.has(key)) map.get(key).count++;
      else map.set(key, {label: line, count: 1});
    });
  })));
  return [...map.values()].sort((a, b) => a.label.localeCompare(b.label));
}
function groceryHTML(){
  const items = groceryBuild();
  return `
    <button class="cat-back" onclick="M.groceryHide()">${ic("back", 18)} ${t("Meal planner")}</button>
    <div class="cat-title"><div class="ch-nm">${t("Grocery list")}</div>
      <div class="ch-ds">${t(planWeekLabel(R.planWeek || 0))} · ${items.length} item${items.length === 1 ? "" : "s"} from your plan</div></div>
    ${items.length ? `
      <div class="row" style="gap:8px;margin-bottom:12px">
        <button class="btn sec" style="flex:1" onclick="M.groceryShare()">${ic("share", 15)} Share</button>
        <button class="btn sec" style="flex:1" onclick="M.groceryCopy()">${ic("copy", 15)} Copy</button>
      </div>
      <div class="card"><div class="grocery">${items.map((g, i) => {
        const on = R.groceryChecked.has(g.label.toLowerCase());
        return `<button class="groc-it ${on ? "on" : ""}" onclick="M.groceryTick('${esc(g.label.toLowerCase()).replace(/'/g, "\\'")}')">
          <span class="gk">${on ? ic("check", 14) : ""}</span>
          <span class="gl" dir="auto">${esc(g.label)}${g.count > 1 ? ` <span class="gc">×${g.count}</span>` : ""}</span></button>`;
      }).join("")}</div></div>
      <div class="tiny" style="text-align:center;color:var(--txt2);margin-top:4px">Rolled up from the recipes & meals you planned this week. Ticks are just for shopping — they reset when you leave.</div>`
      : `<div class="empty-state"><b>Nothing planned yet</b>Add recipes or meals to your week and their ingredients gather here as one shopping list.</div>`}`;
}
function groceryText(){
  const items = groceryBuild();
  const head = `Grocery list — ${planWeekLabel(R.planWeek || 0)} (MIRA)`;
  return head + "\n\n" + items.map(g => `• ${g.label}${g.count > 1 ? ` ×${g.count}` : ""}`).join("\n");
}

<script>

  {k: "PP", n: "Production Planning", d: "MRP, BOMs, routings, discrete/process manufacturing."},
  {k: "PM", n: "Plant Maintenance", d: "Work orders, notifications, preventive maintenance."},
  {k: "QM", n: "Quality Management", d: "Inspection lots, quality notifications, certificates."},

/* open tasks sorted by priority then due date */

function workNoteEditorHTML(){

/* ---- Pomodoro focus timer ---- */
let pomoIv = null;
const pomoRemaining = () => Math.max(0, Math.ceil((R.pomo.endsAt - Date.now()) / 1000));
const fmtMS = s => Math.floor(s / 60) + ":" + String(s % 60).padStart(2, "0");
function pomoTodayCount(){ return S.focusLog.filter(f => f.date === todayStr()).length; }
function pomoTodayMinutes(){ return S.focusLog.filter(f => f.date === todayStr()).reduce((a, f) => a + f.minutes, 0); }
function ensurePomo(){
  if (R.pomo.mode && !pomoIv){
    pomoIv = setInterval(() => {
      const el = document.getElementById("pomoTime"), f = document.getElementById("pomoFill");
      const rem = pomoRemaining();
      if (el) el.textContent = fmtMS(rem);
      if (f){ const total = (R.pomo.mode === "work" ? S.settings.focusLen : S.settings.breakLen) * 60; f.style.width = (100 * (1 - rem / total)) + "%"; }
      if (rem <= 0) pomoComplete();
    }, 500);
  }
  if (!R.pomo.mode && pomoIv){ clearInterval(pomoIv); pomoIv = null; }
}
function pomoComplete(){
  clearInterval(pomoIv); pomoIv = null;
  const wasWork = R.pomo.mode === "work";
  if (wasWork){
    const task = R.pomo.taskId ? (S.tasks.find(t => t.id === R.pomo.taskId) || {}).title || "" : "";
    S.focusLog.push({id: uid(), date: todayStr(), minutes: S.settings.focusLen, task});
    save();
  }
  R.pomo.mode = null;
  buzz(300);
  if (typeof render === "function") render();
  toast(wasWork ? "Focus session done — take a break." : "Break over — ready to focus?", 3200);
}
function workFocusHTML(){
  const running = !!R.pomo.mode;
  const open = openTasks();
  return `
    <div class="card" style="text-align:center">
      ${running ? `<div class="tiny">${R.pomo.mode === "work" ? "Focus" : "Break"}${R.pomo.taskId ? " · " + esc((S.tasks.find(t => t.id === R.pomo.taskId) || {}).title || "") : ""}</div>
        <div id="pomoTime" style="font-size:44px;font-weight:700;color:var(--acc);font-variant-numeric:tabular-nums;margin:4px 0">${fmtMS(pomoRemaining())}</div>
        <div class="rest-track" style="margin:6px 0 14px"><i id="pomoFill" style="width:0%"></i></div>
        <button class="btn sec danger" onclick="M.pomoStop()">Stop</button>`
      : `<div class="tiny">Pomodoro — focus in blocks</div>
        <div style="font-size:20px;font-weight:600;margin:6px 0 10px">${S.settings.focusLen} min focus · ${S.settings.breakLen} min break</div>
        <div class="seg" style="margin-bottom:10px">${[[25,5],[50,10],[15,3]].map(([w, b]) => `<button class="${S.settings.focusLen === w ? "on" : ""}" onclick="M.pomoPreset(${w},${b})">${w}/${b}</button>`).join("")}</div>
        ${open.length ? `<div class="field" style="text-align:start"><label>Focus on (optional)</label>
          <select onchange="R.pomo.taskId=this.value"><option value="">— no task —</option>${open.map(t => `<option value="${t.id}" ${R.pomo.taskId === t.id ? "selected" : ""}>${esc(t.title)}</option>`).join("")}</select></div>` : ""}
        <button class="btn" onclick="M.pomoStart('work')">${ic("play", 15)} Start focus</button>`}
    </div>
    <div class="card">
      <h3>${ic("timer", 16)} Today</h3>
      <div class="rev-grid"><div class="rev-stat"><div class="rv">${pomoTodayCount()}</div><div class="rl">Sessions</div></div>
        <div class="rev-stat"><div class="rv">${pomoTodayMinutes()}</div><div class="rl">Focus min</div></div>
        <div class="rev-stat"><div class="rv">${S.focusLog.length}</div><div class="rl">All-time</div></div></div>
    </div>`;
}

          <span class="fc-ar">${ic("chevR", 16)}</span></button>`).join("")}

<script>

/* ---------------- Budget ---------------- */
const EXP_CATS = ["Food","Transport","Housing","Shopping","Health","Bills","Entertainment","Other"];
const EXP_COLORS = {Food: "#3bb273", Transport: "#4c9fd8", Housing: "#b57edc", Shopping: "#e0864d", Health: "#e06b6b", Bills: "#d8a24c", Entertainment: "#6fb6a8", Other: "#8a94a8"};
function donutSVG(entries, total){
  const cx = 62, cy = 62, r = 46, sw = 17, C = 2 * Math.PI * r;
  let acc = 0, segs = "";
  entries.forEach(([cat, val]) => {
    const frac = total ? val / total : 0, len = frac * C;
    segs += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${EXP_COLORS[cat] || "#8a94a8"}" stroke-width="${sw}" stroke-dasharray="${len.toFixed(1)} ${(C - len).toFixed(1)}" stroke-dashoffset="${(-acc * C).toFixed(1)}" transform="rotate(-90 ${cx} ${cy})"/>`;
    acc += frac;
  });
  return `<svg viewBox="0 0 124 124" class="donut" aria-hidden="true">${segs || `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--line2)" stroke-width="${sw}"/>`}
    <text x="${cx}" y="${cy - 1}" text-anchor="middle" class="d-c">${cur(total)}</text>
    <text x="${cx}" y="${cy + 15}" text-anchor="middle" class="d-l">spent</text></svg>`;
}
function budgetHTML(){
  const ym = todayStr().slice(0, 7);
  const monthExp = S.expenses.filter(e => e.date.slice(0, 7) === ym);
  const spent = monthExp.reduce((a, e) => a + num(e.amount), 0);
  const billsMo = S.bills.reduce((a, b) => a + num(b.amount) * (BILL_CYCLES[b.cycle] || BILL_CYCLES.monthly).perMonth, 0);
  const income = num(S.budget.income);
  const totalOut = spent + billsMo;
  const net = income - totalOut;
  const saveRate = income > 0 ? Math.round(net / income * 100) : null;
  const catTot = {};
  monthExp.forEach(e => { catTot[e.category] = (catTot[e.category] || 0) + num(e.amount); });
  if (billsMo) catTot["Bills"] = (catTot["Bills"] || 0) + billsMo;
  const entries = Object.entries(catTot).sort((a, b) => b[1] - a[1]);
  const top = entries[0];
  const saveT = S.budget.saveTarget != null ? S.budget.saveTarget : Math.max(0, Math.round(net));
  const goalAmt = num(S.budget.goalAmount);
  const monthsToGoal = goalAmt > 0 && saveT > 0 ? Math.ceil(goalAmt / saveT) : null;
  const f = R.expForm;
  return `
    <div class="card">
      <div class="field"><label>Monthly income (KWD)</label><input type="number" inputmode="decimal" value="${S.budget.income || ""}" oninput="S.budget.income=num(this.value);save()"></div>
      <div class="rev-grid">
        <div class="rev-stat"><div class="rv">${cur(totalOut)}</div><div class="rl">Out this month</div></div>
        <div class="rev-stat"><div class="rv" style="color:${net >= 0 ? "var(--green)" : "var(--red)"}">${cur(net)}</div><div class="rl">Net left</div></div>
        <div class="rev-stat"><div class="rv">${saveRate != null ? saveRate + "%" : "—"}</div><div class="rl">Savings rate</div></div>
      </div>
    </div>

    ${entries.length ? `<div class="card">
      <h3>${ic("wallet", 16)} Where it goes</h3>
      <div class="budget-dash">
        ${donutSVG(entries, totalOut)}
        <div class="budget-legend">${entries.map(([c, v]) => `<div class="bl-row"><span class="bl-dot" style="background:${EXP_COLORS[c] || "#8a94a8"}"></span><span class="bl-c">${esc(c)}</span><span class="bl-v">${cur(v)}<span class="bl-p">${totalOut ? Math.round(v / totalOut * 100) : 0}%</span></span></div>`).join("")}</div>
      </div>
      ${top ? `<div class="budget-top">${ic("trend", 13)} Most goes to <b>${esc(top[0])}</b> — ${cur(top[1])} KWD (${totalOut ? Math.round(top[1] / totalOut * 100) : 0}% of spending)</div>` : ""}
    </div>` : ""}

    <div class="card">
      <h3>${ic("target", 16)} Savings plan</h3>
      <div class="field"><label>Save each month (KWD)</label><input type="number" inputmode="decimal" value="${saveT || ""}" placeholder="${Math.max(0, Math.round(net))}" oninput="S.budget.saveTarget=num(this.value);save()"></div>
      <div class="save-proj">
        ${[3, 6, 12].map(m => `<div class="sp-cell"><div class="sp-v">${cur(saveT * m)}</div><div class="sp-l">${m === 12 ? "1 year" : m + " months"}</div></div>`).join("")}
      </div>
      <div class="row" style="margin-top:12px;gap:8px">
        <div class="field" style="flex:2;margin:0"><label>Saving toward (optional)</label><input value="${esc(S.budget.goalName || "")}" oninput="S.budget.goalName=this.value;save()" placeholder="e.g. new laptop, Umrah, emergency fund" dir="auto"></div>
        <div class="field" style="flex:1;margin:0"><label>Cost (KWD)</label><input type="number" inputmode="decimal" value="${S.budget.goalAmount || ""}" oninput="S.budget.goalAmount=num(this.value);save()"></div>
      </div>
      ${monthsToGoal ? `<div class="budget-top" style="margin-top:10px">${ic("check", 13)} At ${cur(saveT)} KWD/month you'll reach <b>${esc(S.budget.goalName || "your goal")}</b> in about <b>${monthsToGoal} month${monthsToGoal === 1 ? "" : "s"}</b> (${fmtDate(new Date(Date.now() + monthsToGoal * 30 * 864e5).toLocaleDateString("en-CA"))}).</div>` : goalAmt > 0 ? `<div class="tiny" style="margin-top:8px;color:var(--txt2)">Set a monthly saving amount above to see when you'll reach it.</div>` : ""}
      <button class="btn" style="margin-top:12px" onclick="M.budgetAdvise()">${ic("chat", 16)} Ask MIRA how to save more</button>
    </div>

    <div class="card">
      <h3>${ic("plus", 16)} Add expense</h3>
      <div class="grid2" style="margin-bottom:10px">
        <div class="field"><label>Category</label><select onchange="R.expForm.category=this.value">${EXP_CATS.map(c => `<option ${f.category === c ? "selected" : ""}>${c}</option>`).join("")}</select></div>
        <div class="field"><label>Amount (KWD)</label><input type="number" inputmode="decimal" value="${esc(f.amount)}" oninput="R.expForm.amount=this.value"></div>
      </div>
      <div class="row"><input value="${esc(f.note)}" oninput="R.expForm.note=this.value" placeholder="Note (optional)" dir="auto">
        <button class="btn sm" style="flex:0 0 auto" onclick="M.expAdd()">Add</button></div>
    </div>

    ${monthExp.length ? `<div class="card"><h3>Recent expenses</h3>
      ${[...monthExp].sort((a, b) => b.ts - a.ts).slice(0, 12).map(e => `<div class="set-row">
        <div><div class="k"><span class="bl-dot" style="background:${EXP_COLORS[e.category] || "#8a94a8"};margin-inline-end:7px"></span>${esc(e.category)}${e.note ? ` · ${esc(e.note)}` : ""}</div><div class="desc">${fmtDate(e.date)}</div></div>
        <span class="end"><b>${cur(e.amount)} KWD</b><button class="btn sm danger" aria-label="Delete" onclick="M.expDel('${e.id}')">${ic("trash", 13)}</button></span>
      </div>`).join("")}
    </div>` : `<div class="empty-state"><b>No expenses logged this month</b>Add what you spend and MIRA will show where it goes and how to save.</div>`}`;
}

/* ---------------- Dates & reading list ---------------- */

        <span class="end"><button class="btn sm sec" aria-label="Remind" onclick="M.dateCal('${d.id}')">${ic("calendar", 13)}</button>
          <button class="btn sm danger" aria-label="Delete" onclick="M.dateDel('${d.id}')">${ic("trash", 13)}</button></span>

    </div>
    <div class="card">
      <h3>${ic("book", 16)} Reading list</h3>

/* resize an image to a max dimension and return a JPEG dataURL (keeps storage small) */
function resizeImage(file, max, cb){
  const r = new FileReader();
  r.onload = () => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > max || h > max){ const s = max / Math.max(w, h); w = Math.round(w * s); h = Math.round(h * s); }
      const c = document.createElement("canvas"); c.width = w; c.height = h;
      c.getContext("2d").drawImage(img, 0, 0, w, h);
      try { cb(c.toDataURL("image/jpeg", 0.72)); } catch (e) { toast("Couldn't process that image."); }
    };
    img.onerror = () => toast("Couldn't read that image.");
    img.src = r.result;
  };
  r.readAsDataURL(file);
}

function measuresCardHTML(){
  const sorted = [...S.measures].sort((a, b) => a.date < b.date ? -1 : 1);

  </div>`;

function weightCardHTML(sorted){
  const pts = sorted.filter(e => e.weight !== null && isFinite(+e.weight)).slice(-14);
  let chart = "";
  if (pts.length >= 2){
    const ws = pts.map(e => +e.weight);
    const min = Math.min(...ws), max = Math.max(...ws);
    const span = Math.max(max - min, 0.5);
    const W = 154, H = 40;
    const xy = ws.map((w, i) => `${(i / (ws.length - 1)) * (W - 8) + 4},${H - 6 - ((w - min) / span) * (H - 12)}`);
    const delta = ws[ws.length - 1] - ws[0];
    chart = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:52px;display:block;margin:4px 0 2px">
      <polyline points="${xy.join(" ")}" fill="none" stroke="var(--acc)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${xy[xy.length - 1].split(",")[0]}" cy="${xy[xy.length - 1].split(",")[1]}" r="3" fill="var(--acc)"/>
    </svg>
    <div class="tiny">${n1(ws[0])} → <b>${n1(ws[ws.length - 1])} kg</b> over ${pts.length} entries (${delta > 0 ? "+" : ""}${n1(delta)} kg)</div>`;
  }
  return `<div class="card">
    <h3>${ic("trend", 16)} Weight</h3>
    ${chart}

      <div class="field"><label>Phase angle °</label><input type="number" inputmode="decimal" value="${esc(ibForm.pa)}" oninput="ibForm.pa=this.value"></div>

    </div>
    ${ibReview ? `<div class="review-item">
      <b style="font-size:14px">Review extracted values</b>
      <div class="tiny" style="margin-bottom:8px">Read from your result sheet — check each value before saving. Nothing is ever guessed.</div>
      ${IB_METRICS.map(m => `<div class="row" style="margin-bottom:6px">
        <label style="flex:0 0 150px;font-size:13px;color:var(--txt2)">${m.label}</label>
        <input type="number" inputmode="decimal" value="${esc(ibReview[m.k] ?? "")}" oninput="ibReview.${m.k}=this.value"></div>`).join("")}
      <div class="row" style="margin-bottom:8px">
        <label style="flex:0 0 150px;font-size:13px;color:var(--txt2)">Date</label>

        <button class="btn sm" onclick="M.ibReviewAccept()">Save scan</button>
        <button class="btn sm sec" onclick="ibReview=null;render()">Discard</button>
      </div>
    </div>` : ""}
  </div>

  ${sorted.length ? [...sorted].reverse().map((e, ri) => {
    const idx = sorted.indexOf(e);
    const prev = idx > 0 ? sorted[idx - 1] : null;
    return `<div class="ib-entry">
      <div class="hd"><span class="d">${fmtDate(e.date)} <span class="tiny">${e.date}</span></span>
        <button class="del" aria-label="Delete scan" onclick="M.ibDel('${e.id}')">✕</button></div>
      <div class="ib-grid">
        ${IB_METRICS.map(m => {
          const v = e[m.k];
          if (v === null || v === undefined || v === "") return `<div class="ib-cell"><div class="k">${m.label}</div><div class="v">—</div></div>`;
          let dv = "";
          if (prev && isFinite(+prev[m.k]) && prev[m.k] !== "" && prev[m.k] !== null){
            const d = +v - +prev[m.k];
            if (Math.abs(d) > 0.001){
              const good = m.goodDir === 0 ? "neu" : (d * m.goodDir > 0 ? "good" : "bad");
              dv = `<div class="dv ${good}">${d > 0 ? "▲" : "▼"} ${n1(Math.abs(d))}</div>`;
            } else dv = `<div class="dv neu">—</div>`;
          }
          return `<div class="ib-cell"><div class="k">${m.label}</div><div class="v">${n1(+v)}${m.unit ? `<span class="tiny"> ${m.unit}</span>` : ""}</div>${dv}</div>`;
        }).join("")}
      </div>
    </div>`;
  }).join("") : `<div class="card" style="text-align:center;padding:28px 18px">
    <div style="color:var(--txt3);margin-bottom:10px">${ic("weight", 30)}</div>
    <div class="muted">No scans yet. Add your first InBody scan above — or photograph the result sheet and MIRA will read the values for you.</div>
  </div>`}`;
}

function ibSaveEntry(src){
  const vals = {};
  for (const m of IB_METRICS){
    const v = src[m.k];
    vals[m.k] = v === "" || v === null || v === undefined ? null : num(v);
  }
  if (Object.values(vals).every(v => v === null)){ toast("Enter at least one value."); return false; }
  if (vals.weight !== null && (vals.weight < 20 || vals.weight > 400)){ toast("Weight looks impossible — check it."); return false; }
  if (vals.pa !== null && (vals.pa < 1 || vals.pa > 20)){ toast("Phase angle out of plausible range (1–20°)."); return false; }
  S.inbody.push({id: uid(), date: src.date || todayStr(), ...vals});
  save();
  toast("Scan saved ✓");
  return true;
}

async function ibPhoto(){
  if (!S.settings.apiKey){ toast("Add your API key in Settings first."); return; }
  pickFile(async file => {
    ibBusy = true; render();
    try {
      const block = file.kind === "pdf"
        ? {type: "document", source: {type: "base64", media_type: "application/pdf", data: file.data}}
        : {type: "image", source: {type: "base64", media_type: file.media_type, data: file.data}};
      const txt = await llmJsonCall(`You read InBody body-composition result sheets. Extract ONLY values you can actually read — never guess. Reply with ONLY JSON: {"date":"YYYY-MM-DD"|null,"weight":num|null,"score":num|null,"bfm":num|null(body fat mass kg),"smm":num|null(skeletal muscle mass kg),"vfa":num|null(visceral fat area cm²),"pa":num|null(phase angle degrees)}. Use null for anything unreadable or absent.`,
        [block, {type: "text", text: "Extract the InBody values."}], 700);
      const j = tryParseJson(txt);
      ibReview = {date: j.date || todayStr(), weight: j.weight ?? "", score: j.score ?? "", bfm: j.bfm ?? "", smm: j.smm ?? "", vfa: j.vfa ?? "", pa: j.pa ?? ""};
    } catch (e) { toast("Could not read the sheet: " + e.message, 4000); }
    ibBusy = false; render();
  });
}

async function backup(){
  S.lastBackup = Date.now();
  let data, encrypted = false;
  if (R._dek && R._enc){
    // export the encrypted envelope — safe to store anywhere, needs the passphrase
    const d = await SEC.encData(R._dek, JSON.stringify(S));
    const w = {mira_enc: 1, v: 2, passSalt: R._enc.passSalt, iter: SEC.ITER, passWrap: R._enc.passWrap, data: d};
    if (R._enc.prf) w.prf = R._enc.prf;
    localStorage.setItem("mira.data", JSON.stringify(w));
    data = JSON.stringify(w, null, 2); encrypted = true;
  } else {
    save();
    data = JSON.stringify(S, null, 2);
  }
  const blob = new Blob([data], {type: "application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `mira-backup-${todayStr()}${encrypted ? "-encrypted" : ""}.json`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 4000);
  toast(encrypted ? "Encrypted backup exported ✓ (needs your passphrase)" : "Backup exported ✓ (includes your API key — keep it private)");
  render();
}
// Rough on-device storage picture for the Settings meter.
function storageInfo(){
  let bytes = 0;
  try { bytes = new Blob([localStorage.getItem("mira.data") || ""]).size; } catch (e) { bytes = (JSON.stringify(S) || "").length; }
  const LIMIT = 5 * 1024 * 1024;                 // typical ~5 MB localStorage budget
  return {bytes, kb: bytes / 1024, pct: Math.min(100, Math.round((bytes / LIMIT) * 100))};
}
function backupAgeDays(){
  if (!S.lastBackup) return null;
  return Math.floor((Date.now() - S.lastBackup) / 864e5);
}
function restore(){
  const inp = $("#fileBackup");
  inp.value = "";
  inp.onchange = () => {
    const f = inp.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const j = JSON.parse(r.result);
        if (j && j.mira_enc === 1){
          // encrypted backup — store it and unlock with the passphrase
          if (!confirm("Restore this ENCRYPTED backup? You'll unlock it with its passphrase.")) return;
          localStorage.setItem("mira.data", JSON.stringify(j));
          _encWrapper = j; R._dek = null; R._enc = null; R._faceTried = false; R.tab = "home";
          render();
          toast("Encrypted backup loaded — enter its passphrase to unlock.", 4200);
          return;
        }
        if (!j || typeof j !== "object" || !("foods" in j) || !("settings" in j)) throw new Error("not a MIRA backup");
        if (!confirm("Replace everything on this device with this backup?")) return;
        S = Object.assign(BLANK(), j);
        window.S = S;
        migrateChats();
        applyTheme();
        R.mode = S.domains[0]?.id || "work";
        R.convId = null; R.sheet = null;
        save(); render();
        toast("Backup restored ✓");
      } catch (e) { toast("That file is not a valid MIRA backup."); }
    };
    r.readAsText(f);
  };
  inp.click();
}

  // Rescale an extracted label item to the amount the user actually had
  // (e.g. label is per 100 ml, they drank the whole 320 ml can).
  reviewScale(i, val){
    const it = reviewItems[i];
    if (!it || !it.basis || !it.baseMacros) return;
    it.had = String(val);
    const had = Math.max(0, parseFloat(val) || 0);
    const k = it.basis > 0 ? had / it.basis : 1;
    it.kcal = Math.round(it.baseMacros.kcal * k);
    it.p = +(it.baseMacros.p * k).toFixed(1);
    it.c = +(it.baseMacros.c * k).toFixed(1);
    it.f = +(it.baseMacros.f * k).toFixed(1);
    it.amount = (had ? n0(had) : "0") + " " + it.unit;
    // Patch the affected fields in place — a full render() here would rebuild the
    // DOM mid-keystroke, drop keyboard focus and make the page jump on iOS.
    const set = (id, v) => { const el = document.getElementById(id + i); if (el && document.activeElement !== el) el.value = v; };
    set("rvK", it.kcal); set("rvP", it.p); set("rvC", it.c); set("rvF", it.f); set("rvAmt", it.amount);
    // "Whole pack" is a button, not the focused input — reflect it on the had field too.
    const had2 = document.getElementById("rvHad" + i);
    if (had2 && document.activeElement !== had2) had2.value = it.had;
  },

/* ---------------- fresh-build detection ----------------
   The app is one self-contained index.html, so "a new version" simply means
   the deployed file now carries a different BUILD than the copy currently
   running. We fetch the live index.html (bypassing every cache), read its
   BUILD constant, and if it differs, offer a one-tap reload. This works no
   matter how the service worker is versioned, and needs nothing from the user
   beyond tapping Reload. Guarded to http(s) so file:// / tests stay quiet. */
let _updateShownFor = null;
async function checkForUpdate(){
  if (!location.protocol.startsWith("http")) return;
  try {
    const res = await fetch("./index.html?_=" + Date.now(), {cache: "no-store"});
    if (!res.ok) return;
    const html = await res.text();
    const m = html.match(/BUILD\s*=\s*"([^"]+)"/);
    const live = m && m[1];
    if (live && live !== BUILD && live !== _updateShownFor){
      _updateShownFor = live;
      showUpdateBanner();
    }
  } catch (e) { /* offline or blocked — try again next time */ }
}
function showUpdateBanner(){
  let bar = document.getElementById("updBar");
  if (!bar){
    bar = document.createElement("div");
    bar.id = "updBar"; bar.className = "upd-bar";
    bar.innerHTML = `<span class="um">${t("A new version is ready")}</span>
      <button class="ub" onclick="location.reload()">${t("Reload")}</button>
      <button class="ux" aria-label="${t("Dismiss")}" onclick="this.parentElement.classList.remove('show')">✕</button>`;
    document.body.appendChild(bar);
  }
  requestAnimationFrame(() => bar.classList.add("show"));
}

/* ---------------- boot ---------------- */
applyTheme();
bindViewport();
/* Offline launch: register the service worker when served over http(s).
   Skipped on file:// (opening the raw file), where SWs aren't allowed. */
if ("serviceWorker" in navigator && location.protocol.startsWith("http")){
  window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
}
/* Check for a newer deploy shortly after launch, and again whenever the app is
   brought back to the foreground (throttled to once every 10 min). */
if (location.protocol.startsWith("http")){
  setTimeout(checkForUpdate, 4000);
  let lastCheck = Date.now();
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible" && Date.now() - lastCheck > 6e5){
      lastCheck = Date.now(); checkForUpdate();
    }
  });
}
/* start on a fresh chat each launch — previous conversations stay in the log */
R.convId = null;
render();
/* Strava OAuth return: exchange the code, clean the URL, run the first sync. */
(function(){
  const q = new URLSearchParams(location.search);
  if (q.get("state") === "mira-strava" && q.get("code") && S.settings.strava && S.settings.strava.cid){
    const code = q.get("code");
    history.replaceState(null, "", location.pathname);
    (async () => {
      try {
        await stravaExchange(code);
        R.tab = "train"; R.trainTab = "today"; render();
        toast(`Strava connected${S.settings.strava.athlete ? " — " + S.settings.strava.athlete : ""} ✓ Syncing…`);
        await M.stravaSync(true);
      } catch (e) { toast((e && e.message) || "Strava connection failed — check the Client ID/Secret and callback domain.", 6000); }
    })();
  } else if (q.get("state") === "mira-strava" && q.get("error")){
    history.replaceState(null, "", location.pathname);
    toast("Strava authorization was declined.", 5000);
  }
  /* quiet background sync at most every 6 h while connected */
  if (stravaConnected() && Date.now() - (S.settings.strava.lastSync || 0) > 6 * 3600e3){
    setTimeout(() => M.stravaSync(false), 2500);
  }
})();
</script>
